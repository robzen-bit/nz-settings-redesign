    // Minimal CSV parser — handles quoted fields with embedded commas.
    function parseCSV(text) {
      const rows = [];
      let row = [], field = '', inQuotes = false;
      const str = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
      for (let i = 0; i < str.length; i++) {
        const ch = str[i];
        if (inQuotes) {
          if (ch === '"') {
            if (str[i + 1] === '"') { field += '"'; i++; }
            else inQuotes = false;
          } else { field += ch; }
        } else {
          if (ch === '"') { inQuotes = true; }
          else if (ch === ',') { row.push(field); field = ''; }
          else if (ch === '\n') {
            row.push(field); field = '';
            if (row.some(v => v.trim())) rows.push(row);
            row = [];
          } else { field += ch; }
        }
      }
      row.push(field);
      if (row.some(v => v.trim())) rows.push(row);
      return rows;
    }

    // Detect the base field type for a CSV column (header + preview signal).
    // includeRole: also detect "Role" columns (used when option 3 is selected).
    const detectFieldType = (header, preview, includeRole) => {
      const h = header.toLowerCase();
      const p = (preview || '').toLowerCase();
      if (h.includes('email') || p.includes('@')) return 'Email';
      if ((h.includes('first') && h.includes('name')) || h === 'first name') return 'First Name';
      if ((h.includes('last') && h.includes('name')) || h === 'last name') return 'Last Name';
      if ((h.includes('full') && h.includes('name')) || h === 'full name' || h === 'fullname') return 'Full Name';
      if (h.includes('phone') || h.includes('mobile') || h.includes('cell')) return 'Mobile Phone';
      if (includeRole && h.includes('role')) return 'Role';
      return null;
    };

    // Build auto-mappings from real csvRows. includeRole enables Role column detection.
    const buildAutoMappings = (rows, includeRole) => {
      const m = {};
      const counts = {};
      rows.forEach(r => {
        const type = detectFieldType(r.header, r.preview, includeRole);
        if (type) {
          counts[type] = (counts[type] || 0) + 1;
          m[r.header] = `${type} (${counts[type]})`;
        } else {
          m[r.header] = '';
        }
      });
      return m;
    };

    const generateFieldOptions = (mappings, includeRole) => {
      const types = includeRole ? [...BASE_FIELD_TYPES, 'Role'] : BASE_FIELD_TYPES;
      const maxCounts = {};
      Object.values(mappings).forEach(v => {
        const match = v && v.match(/^(.+) \((\d+)\)$/);
        if (match) {
          const type = match[1];
          const n = parseInt(match[2]);
          maxCounts[type] = Math.max(maxCounts[type] || 0, n);
        }
      });
      return types.map(type => {
        const max = Math.min((maxCounts[type] || 0) + 1, 10);
        return { type, options: Array.from({ length: max }, (_, i) => `${type} (${i + 1})`) };
      });
    };

        if (!csvRawRows || csvRawRows.length === 0) return [];

          const headers = csvRawRows[0];

            .map((h, i) => ({ header: h.trim(), preview: (dataRow[i] || '').trim() }))

        } else {
          const dataRow = csvRawRows[0];
          const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
          return dataRow
            .map((val, i) => ({
              header: 'Column ' + (i < 26 ? letters[i] : 'A' + letters[i - 26]),
              preview: val.trim()
            }))
            .filter(r => r.preview.length > 0);
        }
      }, [csvRawRows, hasHeaders]);

      const BUILTIN_NAMES = new Set(['General', 'Guest', 'Client']);
      const everyone = roles.find(r => r.id === 'everyone');
      const otherRoles = roles.filter(r => r.id !== 'everyone');
      // Custom roles = roles not named General/Guest/Client
      const customInGallery = roles.filter(r => !BUILTIN_NAMES.has(r.name));
      const customLimit = viewMode === 'basic' ? 0 : viewMode === 'professional' ? 2 : 10;
      const atCustomLimit = customInGallery.length >= customLimit;

      // Build the unified list of role options for import dropdowns
      const systemRoleOptions = [
        { id: 'everyone',   name: 'General' },
        { id: '__guest__',  name: 'Guest'   },
        { id: '__client__', name: 'Client'  },
      ];
      const galleryCustomOptions = viewMode === 'basic' ? [] :
        customInGallery.map(r => ({ id: r.id, name: r.name }));

      // Saved roles not currently active in this gallery (shown as a separate optgroup)
      // AC 6a: gallery-level surface — show only roles currently in the gallery features table (no saved-but-not-active roles)

      const RadioDot = ({ active }) => (
        <span className="flex items-center justify-center rounded-full border-2 transition-all shrink-0 mt-0.5"
          style={{ width: 18, height: 18, borderColor: active ? 'var(--brand)' : 'var(--line)', background: '#fff' }}>
          {active && <span style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--brand)', display: 'block' }} />}
        </span>
      );

      const isSystemId = (id) => id === 'everyone' || id === '__guest__' || id === '__client__';
      const pickedCustomInPerCol = Object.values(emailRoles)
        .filter(rs => rs.checked && !isSystemId(rs.roleId))
        .map(rs => rs.roleId)[0] || null;

      const getPerColOptions = () => [...systemRoleOptions];

      const emailMapped = Object.values(mappings).some(v => v.startsWith('Email ('));
      const canImport = emailMapped && !importing && !importDone;

      const toggleEmailRole = (header, checked) => {
        if (checked) {
          // Checking any email row checks all email rows, defaulting each to everyone
          setEmailRoles(prev => {
            const next = { ...prev };
            FAKE_CSV_ROWS.forEach(r => {
              if (mappings[r.header]?.startsWith('Email (')) {
                next[r.header] = { checked: true, roleId: prev[r.header]?.roleId || (everyone ? everyone.id : roles[0].id) };
              }
            });
            return next;
          });
        } else {
          setEmailRoles(prev => ({ ...prev, [header]: { ...prev[header], checked: false } }));
        }
      };
      const setEmailRoleId = (header, roleId) =>
        setEmailRoles(prev => ({ ...prev, [header]: { ...prev[header], roleId } }));

      const buildContactGroups = () => {
        if (!csvRawRows || csvRawRows.length === 0) return [];

        // Build column metadata: header → { type, groupNum, colIdx }
        const headerRow = hasHeaders ? csvRawRows[0] : csvRows.map(r => r.header);
        const headerToIdx = {};
        headerRow.forEach((h, i) => { headerToIdx[h.trim()] = i; });

        const colMeta = {};
        csvRows.forEach(row => {
          const val = mappings[row.header];
          if (!val) return;
          const match = val.match(/^(.+) \((\d+)\)$/);
          if (!match) return;
          const idx = headerToIdx[row.header];
          if (idx === undefined) return;
          colMeta[row.header] = { type: match[1], groupNum: parseInt(match[2]), colIdx: idx };
        });

        // Iterate every data row and build contact groups
        const dataRows = hasHeaders ? csvRawRows.slice(1) : csvRawRows;
        const allContacts = [];
        dataRows.forEach(dataRow => {
          const groups = {};
          csvRows.forEach(col => {
            const meta = colMeta[col.header];
            if (!meta) return;
            const val = (dataRow[meta.colIdx] || '').trim();
            const n = meta.groupNum;
            if (!groups[n]) groups[n] = { emailHeader: null };
            if (meta.type === 'Email') { groups[n].email = val; groups[n].emailHeader = col.header; }
            else if (meta.type === 'First Name') groups[n].first = val;
            else if (meta.type === 'Last Name') groups[n].last = val;
            else if (meta.type === 'Full Name') groups[n].fullName = val;
            else if (meta.type === 'Mobile Phone') groups[n].mobile = val;
            else if (meta.type === 'Role') groups[n].csvRoleName = val;
          });
          Object.values(groups).forEach(g => { if (g.email) allContacts.push(g); });
        });
        return allContacts;
      };

      const handleImport = () => {
        setImporting(true);
        setTimeout(() => {
          const toCreate = {};
          const ts = Date.now();
          const resolveRoleId = (rawId) => {
            if (!rawId || rawId === 'everyone') return everyone?.id || 'everyone';
            if (rawId === '__guest__') {
              const ex = roles.find(r => r.name === 'Guest');
              if (ex) return ex.id;
              if (!toCreate['__guest__']) toCreate['__guest__'] = { id: `role-${ts}-g`, name: 'Guest', presetId: 'guest' };
              return toCreate['__guest__'].id;
            }
            if (rawId === '__client__') {
              const ex = roles.find(r => r.name === 'Client');
              if (ex) return ex.id;
              if (!toCreate['__client__']) toCreate['__client__'] = { id: `role-${ts}-c`, name: 'Client', presetId: 'client' };
              return toCreate['__client__'].id;
            }
            if (rawId.startsWith('__saved__:')) {
              const sid = rawId.replace('__saved__:', '');
              const saved = savedRoles.find(s => s.id === sid);
              if (!saved) return everyone?.id || 'everyone';
              if (!toCreate[rawId]) toCreate[rawId] = { id: `role-${ts}-${Object.keys(toCreate).length}`, name: saved.name, presetId: 'custom', perRoleState: saved.perRoleState };
              return toCreate[rawId].id;
            }
            return rawId;
          };

          const groups = buildContactGroups();
          const contactsToAdd = [];

          // csvColumn: match to system roles and existing gallery roles only; unrecognized → General
          let csvRoleMap = {};
          if (roleConfigOption === 'csvColumn') {
            const systemMap = { 'general': 'everyone', 'guest': '__guest__', 'client': '__client__' };
            const uniqueCsvVals = [...new Set(
              groups.map(g => (g.csvRoleName || '').trim().toLowerCase()).filter(Boolean)
            )];
            uniqueCsvVals.forEach(val => {
              if (systemMap[val]) { csvRoleMap[val] = systemMap[val]; return; }
              const existing = roles.find(r => r.name.toLowerCase() === val);
              csvRoleMap[val] = existing ? existing.id : 'everyone';
            });
          }

          groups.forEach(g => {
            if (!g.email) return;
            const first = g.first || (g.fullName ? g.fullName.split(' ')[0] : '');
            const last = g.last || (g.fullName ? g.fullName.split(' ').slice(1).join(' ') : '');
            let roleId;
            if (roleConfigOption === 'same') {
              roleId = resolveRoleId(bulkRoleId);
            } else if (roleConfigOption === 'perColumn') {
              const rs = g.emailHeader ? emailRoles[g.emailHeader] : null;
              roleId = resolveRoleId((rs && rs.roleId) || 'everyone');
            } else {
              const csvVal = (g.csvRoleName || '').trim().toLowerCase();
              roleId = resolveRoleId(csvRoleMap[csvVal] || 'everyone');
            }
            contactsToAdd.push({ first, last, email: g.email, mobile: g.mobile || '', roleId });
          });

          const roleDefs = Object.values(toCreate);
          if (roleDefs.length && onEnsureRoles) onEnsureRoles(roleDefs);
          contactsToAdd.forEach(c => onAdd(c));
          setImporting(false);
          setImportDone(true);
          setTimeout(() => onClose(), 900);
        }, 1400);
      };

      const handleFileUpload = (file) => {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          const rows = parseCSV(e.target.result);
          if (rows.length === 0) return;
          setCsvRawRows(rows);
          setCsvFilename(file.name);
          setCsvUploaded(true);
        };
        reader.readAsText(file);
      };

      return ReactDOM.createPortal(
        <div className="fixed inset-0 bg-white flex flex-col" style={{ zIndex: 8000 }}>
          {/* Header */}
          <div className="flex items-center px-6 py-4 border-b" style={{ borderColor: 'var(--card-border)', position: 'relative' }}>
            {step === 'upload' ? (
              <button onClick={onClose} className="flex items-center gap-1.5 text-[13px] font-medium"
                style={{ color: 'var(--text-secondary)' }}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
                Back to gallery
              </button>
            ) : (
              <div style={{ width: 120 }} />
            )}

            <h2 className="absolute left-1/2 -translate-x-1/2 text-[14px] font-bold tracking-wider" style={{ color: 'var(--text-primary)' }}>IMPORT CONTACTS</h2>
            <button onClick={onClose} className="ml-auto kebab-btn rounded p-1" style={{ color: 'var(--text-tertiary)' }}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M3 3l10 10M13 3L3 13"/></svg>
            </button>
          </div>

          {/* Tabs — only on upload step */}
          {step === 'upload' && (
            <div className="flex items-center gap-6 px-6 border-b" style={{ borderColor: 'var(--card-border)' }}>
              {[
                { id: 'contacts', label: 'Contacts', disabled: true },
                { id: 'csv', label: 'CSV', active: true },
              ].map(t => (
                <div key={t.id} className="relative py-3 text-[13px] cursor-default"
                  style={{ fontWeight: t.active ? 700 : 500, color: t.active ? 'var(--text-primary)' : 'var(--text-tertiary)' }}>
                  {t.label}
                  {t.active && <span style={{ position: 'absolute', left: 0, right: 0, bottom: -1, height: 2, background: 'var(--brand)' }} />}
                </div>
              ))}
            </div>
          )}

          {/* Body */}
          <div className="flex-1 overflow-y-auto">
          <div className="px-6 py-6" style={{ maxWidth: 780, width: '100%', margin: '0 auto' }}>
            {step === 'upload' ? (
              <>
                <h2 className="text-[20px] font-bold mb-8" style={{ color: 'var(--text-primary)' }}>Add via CSV</h2>

                {/* Gallery Role Configuration */}
                <div className="mb-8">
                  <h3 className="text-[15px] font-bold mb-1.5" style={{ color: 'var(--text-primary)' }}>Gallery Role Configuration</h3>
                  <p className="text-[13px] mb-4 leading-relaxed" style={{ color: 'var(--text-secondary)' }}>
                    How would you like to assign roles to the contacts you are importing?
                  </p>
                  {viewMode !== 'basic' && (
                    <p className="text-[12px] mb-5 leading-relaxed" style={{ color: '#86868B' }}>
                      You can use our system roles — General, Guest, and Client — as well as any custom roles you have added to this gallery or saved for later use.{' '}
                      <a href="#" onClick={e => e.preventDefault()} style={{ color: '#F26B3A', textDecoration: 'underline', textUnderlineOffset: '2px' }}>Learn more</a>
                    </p>
                  )}
                  <div className="flex flex-col gap-2.5">
                    {/* Option 1: same role */}
                    <label className="flex items-center gap-3 cursor-pointer" onClick={() => setRoleConfigOption('same')}>
                      <RadioDot active={roleConfigOption === 'same'} />
                      <div className="flex items-center gap-2 flex-wrap">
                        <span className="text-[14px]" style={{ color: 'var(--text-primary)' }}>
                          Assign the same role to all imported contacts.
                        </span>
                        <select value={bulkRoleId}
                          onChange={e => { setBulkRoleId(e.target.value); setRoleConfigOption('same'); }}
                          onClick={e => e.stopPropagation()}
                          className="text-[13px] px-2 py-1.5 rounded-md border bg-white outline-none"
                          style={{ borderColor: 'var(--card-border)', color: 'var(--text-primary)' }}>
                          {viewMode === 'basic' ? (
                            systemRoleOptions.map(r => <option key={r.id} value={r.id}>{r.name}</option>)
                          ) : (
                            <>
                              <optgroup label="System Roles">
                                {systemRoleOptions.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
                              </optgroup>
                              {galleryCustomOptions.length > 0 && (
                                <optgroup label="Gallery Roles">
                                  {galleryCustomOptions.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
                                </optgroup>
                              )}
                            </>
                          )}
                        </select>
                      </div>
                    </label>
                    {/* Option 2: assign during matching */}
                    <label className="flex items-start gap-3 cursor-pointer" onClick={() => setRoleConfigOption('perColumn')}>
                      <RadioDot active={roleConfigOption === 'perColumn'} />
                      <span className="text-[14px]" style={{ color: 'var(--text-primary)' }}>
                        I would like to assign roles during the data matching phase.
                      </span>
                    </label>
                  </div>
                </div>

                {/* Drop zone */}
                <div className="flex items-center justify-between mb-2">
                  <h3 className="text-[15px] font-bold" style={{ color: 'var(--text-primary)' }}>Import CSV File</h3>
                  <button className="text-[13px] font-medium flex items-center gap-1.5" style={{ color: 'var(--brand)' }}>
                    Download CSV template
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                  </button>
                </div>
                <div
                  onDragOver={e => { e.preventDefault(); setIsDragOver(true); }}
                  onDragLeave={() => setIsDragOver(false)}
                  onDrop={e => { e.preventDefault(); setIsDragOver(false); handleFileUpload(e.dataTransfer.files[0]); }}
                  className="rounded-lg mb-6 flex flex-col items-center justify-center py-12 gap-3"
                  style={{
                    border: `2px dashed ${csvUploaded ? '#22c55e' : isDragOver ? 'var(--brand)' : 'var(--card-border)'}`,
                    background: csvUploaded ? '#f0fdf4' : isDragOver ? 'var(--brand-cream)' : '#fafafa',
                    minHeight: 160,
                  }}>
                  {csvUploaded ? (
                    <>
                      <span className="text-[13px] font-medium" style={{ color: '#16a34a' }}>{csvFilename} uploaded</span>
                      <button onClick={() => fileInputRef.current?.click()}
                        className="flex items-center gap-2 text-[13px] font-bold tracking-wider px-5 py-2.5 rounded-full text-white"
                        style={{ background: '#1a1a1a' }}>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
                        Replace File
                      </button>
                      <span className="text-[12px]" style={{ color: 'var(--text-tertiary)' }}>or Drag and Drop to replace</span>
                    </>
                  ) : (
                    <>
                      <button onClick={() => fileInputRef.current?.click()}
                        className="flex items-center gap-2 text-[13px] font-bold tracking-wider px-5 py-2.5 rounded-full text-white"
                        style={{ background: '#1a1a1a' }}>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
                        Browse Files
                      </button>
                      <span className="text-[12px]" style={{ color: 'var(--text-tertiary)' }}>or Drag and Drop to upload</span>
                    </>
                  )}
                  <input ref={fileInputRef} type="file" accept=".csv" className="hidden" onChange={e => handleFileUpload(e.target.files[0])} />
                </div>

                {/* Header radio */}
                <div className="flex flex-col gap-1.5 mb-8">
                  {[
                    { val: true,  label: 'My CSV file includes headers' },
                    { val: false, label: 'My CSV file does not include headers' },
                  ].map(opt => (
                    <label key={String(opt.val)} className="flex items-center gap-2.5 cursor-pointer text-[13px]" style={{ color: 'var(--text-primary)' }}>
                      <span onClick={() => setHasHeaders(opt.val)}
                        className="flex items-center justify-center rounded-full border-2 transition-all shrink-0"
                        style={{ width: 18, height: 18, borderColor: hasHeaders === opt.val ? 'var(--brand)' : 'var(--line)', background: '#fff' }}>
                        {hasHeaders === opt.val && <span style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--brand)', display: 'block' }} />}
                      </span>
                      {opt.label}
                    </label>
                  ))}
                </div>

                {/* Import Behavior */}
                <div className="mb-8">
                  <h3 className="text-[15px] font-bold mb-4" style={{ color: 'var(--text-primary)' }}>Import Behavior</h3>
                  <div className="flex flex-col gap-1.5">
                    {[
                      { val: 'overwrite', label: 'Overwrite current gallery contacts' },
                      { val: 'append',   label: 'Append with current gallery contacts' },
                    ].map(opt => (
                      <label key={opt.val} className="flex items-center gap-2.5 cursor-pointer text-[13px]" style={{ color: 'var(--text-primary)' }}
                        onClick={() => setImportMode(opt.val)}>
                        <RadioDot active={importMode === opt.val} />
                        {opt.label}
                      </label>
                    ))}
                  </div>
                </div>
              </>
            ) : (
              /* ── Data Matching step ── */
              <>
                <h2 className="text-[20px] font-bold mb-2 text-center" style={{ color: 'var(--text-primary)' }}>Data Matching</h2>
                <p className="text-[13px] mb-8 text-center" style={{ color: 'var(--text-secondary)' }}>
                  Select which fields in Zenfolio we should copy the information into. Email matching is required.
                </p>
                {/* Column headers */}
                <div className="grid mb-2" style={{ gridTemplateColumns: '28px 180px 1fr 220px 56px' }}>
                  {['', 'CSV HEADER', 'PREVIEW', 'ZENFOLIO HEADER MATCH', ''].map((h, i) => (
                    <span key={i} className="text-[11px] font-bold tracking-wider pb-2" style={{ color: 'var(--text-tertiary)' }}>{h}</span>
                  ))}
                </div>
                {csvRows.filter(row => {
                  const isRole = detectFieldType(row.header, row.preview, true) === 'Role';
                  return !isRole || roleConfigOption === 'csvColumn';
                }).map((row) => {
                  const val = mappings[row.header] || '';
                  const matched = !!val;
                  const isEmailField = val.startsWith('Email (');
                  const showRoleOption = isEmailField && roleConfigOption === 'perColumn';
                  const roleState = emailRoles[row.header] || { checked: false, roleId: 'everyone' };
                  return (
                    <div key={row.header} className="flex flex-col py-3 border-t" style={{ borderColor: 'var(--card-border)' }}>
                      {/* Main row */}
                      <div className="grid" style={{ gridTemplateColumns: '28px 180px 1fr 220px 56px', alignItems: 'center' }}>
                        <div className="flex items-center justify-center">
                          {showRoleOption && (
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="var(--text-primary)" style={{ flexShrink: 0 }}>
                              <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
                            </svg>
                          )}
                        </div>
                        <span className="text-[13px]" style={{ color: 'var(--text-primary)' }}>{row.header}</span>
                        <div className="flex items-center gap-2 min-w-0 pr-3">
                          <span className="shrink-0">
                            {matched
                              ? <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#22c55e" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20,6 9,17 4,12"/></svg>
                              : <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2.5" strokeLinecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
                            }
                          </span>
                          <span className="text-[13px] truncate" style={{ color: 'var(--text-secondary)' }} title={row.preview}>{row.preview}</span>
                        </div>
                        <div className="pr-3">
                          <select value={val} onChange={e => setMappings(m => ({ ...m, [row.header]: e.target.value }))}
                            className="w-full text-[13px] px-3 py-2 rounded-md border bg-white outline-none"
                            style={{ borderColor: 'var(--card-border)', color: val ? 'var(--text-primary)' : 'var(--text-tertiary)' }}>
                            <option value="">Select Column</option>
                            {generateFieldOptions(mappings, roleConfigOption === 'csvColumn').map(group => (
                              <optgroup key={group.type} label={group.type}>
                                {group.options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                              </optgroup>
                            ))}
                          </select>
                        </div>
                        <div>
                          {val && (
                            <button onClick={() => { setMappings(m => ({ ...m, [row.header]: '' })); toggleEmailRole(row.header, false); }}
                              className="text-[13px]" style={{ color: 'var(--brand)', textDecoration: 'underline' }}>
                              Clear
                            </button>
                          )}
                        </div>
                      </div>
                      {/* Role row */}
                      {showRoleOption && (() => {
                        const colOpts = getPerColOptions();
                        const colRoleId = roleState.roleId || 'everyone';
                        return (
                          <div className="grid mt-2" style={{ gridTemplateColumns: '28px 180px 1fr 220px 56px', alignItems: 'center' }}>
                            <div /><div /><div />
                            <div className="pr-3 flex items-center gap-2">
                              <span className="text-[11px] font-semibold shrink-0" style={{ color: 'var(--text-primary)' }}>Role</span>
                              <select value={colRoleId}
                                onChange={e => setEmailRoleId(row.header, e.target.value)}
                                className="flex-1 text-[12px] px-2 py-1 rounded border bg-white outline-none"
                                style={{ borderColor: 'var(--card-border)', color: 'var(--text-primary)', minWidth: 100 }}>
                                {viewMode === 'basic' ? (
                                  colOpts.map(r => <option key={r.id} value={r.id}>{r.name}</option>)
                                ) : (
                                  <>
                                    <optgroup label="System Roles">
                                      {systemRoleOptions.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
                                    </optgroup>
                                    {galleryCustomOptions.length > 0 && (
                                      <optgroup label="Gallery Roles">
                                        {galleryCustomOptions.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
                                      </optgroup>
                                    )}
                                  </>
                                )}
                              </select>
                            </div>
                            <div />
                          </div>
                        );
                      })()}
                    </div>
                  );
                })}
              </>
            )}
          </div>
          </div>

          {/* Footer */}
          <div className="flex items-center px-6 py-4 border-t" style={{ borderColor: 'var(--card-border)', background: '#1a1a1a', minHeight: 64 }}>
            {step === 'upload' ? (
              <>
                <div className="ml-auto" />
                <button onClick={() => {
                  if (!csvUploaded) return;
                  const includeRole = roleConfigOption === 'csvColumn';
                  const newMappings = buildAutoMappings(csvRows, includeRole);
                  setMappings(newMappings);
                  const next = {};
                  if (roleConfigOption === 'perColumn') {
                    csvRows.forEach(r => {
                      next[r.header] = { checked: !!newMappings[r.header]?.startsWith('Email ('), roleId: everyone?.id || 'everyone' };
                    });
                  } else {
                    csvRows.forEach(r => { next[r.header] = { checked: false, roleId: everyone?.id || 'everyone' }; });
                  }
                  setEmailRoles(next);
                  setStep('matching');
                }} disabled={!csvUploaded}
                  className="text-[13px] font-bold tracking-wider px-6 py-2.5 rounded-full text-white transition-all disabled:opacity-40"
                  style={{ background: csvUploaded ? 'var(--brand)' : '#555', cursor: csvUploaded ? 'pointer' : 'not-allowed' }}>
                  Next
                </button>
              </>
            ) : (
              <>
                <button onClick={() => setStep('upload')}
                  className="text-[13px] font-medium mr-auto" style={{ color: '#aaa', textDecoration: 'underline' }}>
                  Back
                </button>
                <button disabled={!canImport && !importing && !importDone}
                  onClick={() => { if (canImport) handleImport(); }}
                  className="flex items-center gap-2 text-[13px] font-bold tracking-wider px-5 py-2.5 rounded-full text-white"
                  style={{ background: canImport || importing || importDone ? 'var(--brand)' : '#555' }}>
                  {importing ? (
                    <><svg className="animate-spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><path d="M21 12a9 9 0 1 1-6.219-8.56" strokeLinecap="round"/></svg>Importing...</>
                  ) : importDone ? (
                    <><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20,6 9,17 4,12"/></svg>Imported</>
                  ) : 'Import'}
                </button>
              </>
            )}
          </div>
        </div>,
        document.body
      );
    };

    // ===== Apply Preset Modal =====
    const GALLERY_PRESETS = ['Sports', 'Wedding', 'Portrait'];

    // Per-role feature state for each preset at each plan level.
    // Keys match FEATURE_DEFS ids. Omitted features default to off / default values.
    const mkState = (overrides) => {
      const base = {};
      ['photo-downloads','video-downloads','screenshot-protection','keyword-search',
       'face-finder','favorites','commenting','sharing','watermark','video-previews'].forEach(id => {
        base[id] = { enabled: false, values: {} };
      });
      Object.entries(overrides).forEach(([id, val]) => { base[id] = { ...base[id], ...val }; });
      return base;
    };

    // Named role states — reused across plan tiers so lower tiers inherit identical settings
    // for any role name they share with the advanced tier.
    const _sportsGeneral    = mkState({ 'screenshot-protection': { enabled: true, values: {} }, 'face-finder': { enabled: true, values: {} }, 'favorites': { enabled: true, values: {} }, 'sharing': { enabled: true, values: {} } });
    const _sportsParent     = mkState({ 'photo-downloads': { enabled: true, values: { 'download-type': 'All photos and individual download', 'gallery-resolutions': ['Original'], 'individual-resolution': 'Original' } }, 'video-downloads': { enabled: true, values: { 'video-download-type': 'Specific amount download', 'video-specific-amount': 2 } }, 'face-finder': { enabled: true, values: {} }, 'favorites': { enabled: true, values: {} }, 'commenting': { enabled: true, values: {} }, 'sharing': { enabled: true, values: {} } });
    const _sportsPlayer     = mkState({ 'photo-downloads': { enabled: true, values: { 'download-type': 'Individual download only', 'individual-resolution': 'Low' } }, 'face-finder': { enabled: true, values: {} }, 'favorites': { enabled: true, values: {} } });
    const _sportsCoach      = mkState({ 'photo-downloads': { enabled: true, values: { 'download-type': 'Specific amount download', 'specific-amount': 5 } }, 'video-downloads': { enabled: true, values: { 'video-download-type': 'Specific amount download', 'video-specific-amount': 2 } } });
    const _sportsLeagueAdmin = mkState({ 'photo-downloads': { enabled: true, values: { 'download-type': 'All photos and individual download', 'gallery-resolutions': ['Original'], 'individual-resolution': 'Original' } }, 'video-downloads': { enabled: true, values: { 'video-download-type': 'All videos and individual download', 'video-resolutions': ['Original'], 'video-individual-resolution': 'Original' } } });

    const _weddingGeneral      = mkState({ 'screenshot-protection': { enabled: true, values: {} }, 'face-finder': { enabled: true, values: {} } });
    const _weddingBrideGroom   = mkState({ 'photo-downloads': { enabled: true, values: { 'download-type': 'All photos and individual download', 'gallery-resolutions': ['High'], 'individual-resolution': 'High' } }, 'video-downloads': { enabled: true, values: { 'video-download-type': 'All videos and individual download', 'video-resolutions': ['Original'], 'video-individual-resolution': 'Original' } }, 'face-finder': { enabled: true, values: {} }, 'favorites': { enabled: true, values: {} }, 'commenting': { enabled: true, values: {} }, 'sharing': { enabled: true, values: {} } });
    const _weddingBridesMother = mkState({ 'face-finder': { enabled: true, values: {} }, 'favorites': { enabled: true, values: {} }, 'commenting': { enabled: true, values: {} }, 'sharing': { enabled: true, values: {} } });
    const _weddingPlannerFlorist = mkState({ 'photo-downloads': { enabled: true, values: { 'download-type': 'Specific amount download', 'specific-amount': 10 } } });

    const _portraitGeneral    = mkState({});
    const _portraitClient     = mkState({ 'photo-downloads': { enabled: true, values: { 'download-type': 'All photos and individual download', 'gallery-resolutions': ['Original'], 'individual-resolution': 'Original' } }, 'video-downloads': { enabled: true, values: { 'video-download-type': 'All videos and individual download', 'video-resolutions': ['Original'], 'video-individual-resolution': 'Original' } }, 'keyword-search': { enabled: true, values: {} }, 'face-finder': { enabled: true, values: {} }, 'favorites': { enabled: true, values: {} }, 'commenting': { enabled: true, values: {} }, 'sharing': { enabled: true, values: {} } });
    const _portraitBestFriend = mkState({ 'screenshot-protection': { enabled: true, values: {} } });
    const _portraitMom        = mkState({ 'screenshot-protection': { enabled: true, values: {} }, 'photo-downloads': { enabled: true, values: { 'download-type': 'Specific amount download', 'specific-amount': 5 } } });

    const PRESET_ROLE_STATES = {
      Sports: {
        advanced:     { General: _sportsGeneral, Parent: _sportsParent, Player: _sportsPlayer, Coach: _sportsCoach, 'League Admin': _sportsLeagueAdmin },
        professional: { General: _sportsGeneral, Parent: _sportsParent, Player: _sportsPlayer },
        basic:        { General: _sportsGeneral },
      },
      Wedding: {
        advanced:     { General: _weddingGeneral, Bride: _weddingBrideGroom, Groom: _weddingBrideGroom, "Bride's Mother": _weddingBridesMother, 'Wedding Planner': _weddingPlannerFlorist, Florist: _weddingPlannerFlorist },
        professional: { General: _weddingGeneral, Bride: _weddingBrideGroom, Groom: _weddingBrideGroom },
        basic:        { General: _weddingGeneral },
      },
      Portrait: {
        advanced:     { General: _portraitGeneral, Client: _portraitClient, 'Best Friend': _portraitBestFriend, Mom: _portraitMom },
        professional: { General: _portraitGeneral, Client: _portraitClient, 'Best Friend': _portraitBestFriend },
        basic:        { General: _portraitGeneral, Client: _portraitClient },
      },
    };

    const GALLERY_PRESET_ROLES = {
      Sports: {
        basic:        ['Client', 'Guest'],
        professional: ['Parent', 'Player'],
        advanced:     ['Parent', 'Player', 'Coach', 'League Admin'],
      },
      Wedding: {
        basic:        ['Client', 'Guest'],
        professional: ['Guest', 'Bride', 'Groom'],
        advanced:     ['Bride', 'Groom', "Bride's Mother", 'Wedding Planner', 'Florist'],
      },
      Portrait: {
        basic:        ['Client'],
        professional: ['Client', 'Best Friend'],
        advanced:     ['Client', 'Best Friend', 'Mom'],
      },
    };

    const ApplyPresetModal = ({ currentPreset, onClose, onApply }) => {
      const [selected, setSelected] = useState(currentPreset || GALLERY_PRESETS[0]);
      return (
        <div className="fixed inset-0 flex items-center justify-center" style={{ zIndex: 2000, background: 'rgba(0,0,0,0.45)' }}
          onClick={onClose}>
          <div className="bg-white rounded-2xl shadow-xl flex flex-col" style={{ width: 580, maxHeight: '80vh' }}
            onClick={e => e.stopPropagation()}>
            {/* Header */}
            <div className="flex items-center justify-between px-6 py-4 border-b" style={{ borderColor: 'var(--card-border)' }}>
              <div style={{ width: 24 }} />
              <span className="text-[14px] font-bold tracking-widest uppercase" style={{ color: 'var(--text-primary)' }}>Presets</span>
              <button onClick={onClose} style={{ color: 'var(--text-secondary)' }}><CloseIcon size={18} /></button>
            </div>
            {/* Warning */}
            <p className="text-[13px] font-semibold text-center px-6 pt-4 pb-2" style={{ color: 'var(--brand)' }}>
              Changing this preset may affect your visitors' shopping cart.
            </p>
            {/* Preset list */}
            <div className="flex-1 overflow-y-auto px-6 pb-4">
              {GALLERY_PRESETS.map((preset, i) => (
                <div key={preset}>
                  <label className="flex items-center gap-4 py-4 cursor-pointer" onClick={() => setSelected(preset)}>
                    <span className="flex items-center justify-center rounded-full border-2 shrink-0 transition-all"
                      style={{ width: 22, height: 22, borderColor: selected === preset ? 'var(--brand)' : '#ccc', background: '#fff' }}>
                      {selected === preset && <span style={{ width: 11, height: 11, borderRadius: '50%', background: 'var(--brand)', display: 'block' }} />}
                    </span>
                    <span className="text-[15px] font-medium" style={{ color: 'var(--text-primary)' }}>{preset}</span>
                  </label>
                  {i < GALLERY_PRESETS.length - 1 && <div style={{ borderTop: '1px solid var(--card-border)' }} />}
                </div>
              ))}
            </div>
            {/* Footer */}
            <div className="flex items-center justify-end gap-3 px-6 py-4 border-t" style={{ borderColor: 'var(--card-border)' }}>
              <button onClick={onClose} className="text-[13px] font-semibold px-5 py-2 rounded-lg"
                style={{ color: 'var(--text-primary)', textDecoration: 'underline' }}>Cancel</button>
              <button onClick={() => { onApply(selected); onClose(); }}
                className="text-[13px] font-bold px-6 py-2 rounded-full text-white"
                style={{ background: 'var(--brand)' }}>Apply</button>
            </div>
          </div>
        </div>
      );
    };

    // ===== Gallery Presets View =====
    const PresetsView = ({ activeSection, onSelectSection, viewMode = 'basic', onApplyPreset, contactsCount = 0 }) => {
      const [showApplyModal, setShowApplyModal] = useState(false);
      const [appliedPreset, setAppliedPreset] = useState(null);

      const handleApply = (presetName) => {
        setAppliedPreset(presetName);
        const roleNames = GALLERY_PRESET_ROLES[presetName]?.[viewMode] || [];
        if (onApplyPreset) onApplyPreset(roleNames, presetName);
      };

      return (
        <main className="main-pane flex-1 px-6 pt-6 pb-12" style={{ maxWidth: 900 }}>
          <MobileSectionNav activeSection={activeSection} onSelectSection={onSelectSection} contactsCount={contactsCount} />
          <h1 className="text-[18px] font-extrabold tracking-tight uppercase mb-1" style={{ color: 'var(--brand)', letterSpacing: '0.02em' }}>Gallery Preset</h1>
          <p className="text-[13px] mb-6" style={{ color: 'var(--text-secondary)' }}>
            Applying a preset will update your gallery settings.{' '}
            <a href="#" onClick={e => e.preventDefault()} style={{ color: 'var(--brand)' }}>Learn more</a> about presets.
          </p>
          {appliedPreset && (
            <p className="text-[13px] mb-4 font-medium" style={{ color: 'var(--text-secondary)' }}>
              Current preset: <strong style={{ color: 'var(--text-primary)' }}>{appliedPreset}</strong>
            </p>
          )}
          <div className="flex items-center gap-3 mb-8">
            <button onClick={() => setShowApplyModal(true)}
              className="text-[13px] font-bold px-6 py-2.5 rounded-lg text-white"
              style={{ background: 'var(--brand)' }}>Apply a New Preset</button>
            <button className="text-[13px] font-bold px-6 py-2.5 rounded-lg border-2"
              style={{ borderColor: 'var(--text-primary)', color: 'var(--text-primary)', background: '#fff' }}>Save New Preset</button>
          </div>
          <div style={{ borderTop: '1px solid var(--card-border)' }} className="mb-8" />
          <p className="text-[13px] mb-3" style={{ color: 'var(--text-secondary)' }}>Manage all available gallery presets.</p>
          <button className="text-[13px] font-bold px-6 py-2.5 rounded-lg border-2"
            style={{ borderColor: 'var(--text-primary)', color: 'var(--text-primary)', background: '#fff' }}>Manage Presets</button>
          {showApplyModal && (
            <ApplyPresetModal
              currentPreset={appliedPreset}
              onClose={() => setShowApplyModal(false)}
              onApply={handleApply}
            />
          )}
        </main>
      );
    };

    // ===== Organize Tab — Photo Grid =====
    const OrganizeGrid = ({ photos, photoOverrides, roles, onOpenPermissions }) => {
      const isInvalid = (photoId) => {
        const ov = photoOverrides[photoId];
        if (!ov || ov.accessLevel !== 'selectedRoles') return false;
        return ov.selectedRoleIds.filter(id => roles.some(r => r.id === id)).length === 0;
      };
      return (
        <div style={{ flex: 1, overflowY: 'auto', background: '#fff', padding: '16px 20px' }}>
          {/* Toolbar */}
          <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
            <span className="text-[13px] font-semibold" style={{ color: 'var(--text-secondary)' }}>
              All Media <span style={{ color: 'var(--text-tertiary)' }}>(Photos {photos.length})</span>
            </span>
            <button className="flex items-center gap-1.5 text-[12px] font-bold tracking-wider px-4 py-2 rounded-full text-white"
              style={{ background: 'var(--brand)' }}>
              ADD MEDIA
            </button>
          </div>
          {/* Grid */}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(130px, 1fr))', gap: 10 }}>
            {photos.map(photo => {
              const ov = photoOverrides[photo.id];
              const hasOverride = !!ov;
              const invalid = isInvalid(photo.id);
              return (
                <div key={photo.id}>
                  <div style={{ position: 'relative', paddingBottom: '75%', borderRadius: 6, overflow: 'hidden', background: '#e5e7eb', cursor: 'default' }}>
                    {/* Photo fill — dimmed when invalid */}
                    <div style={{ position: 'absolute', inset: 0, backgroundImage: `url(${photo.src})`, backgroundSize: 'cover', backgroundPosition: 'center', opacity: invalid ? 0.35 : 1, filter: invalid ? 'grayscale(60%)' : 'none', transition: 'opacity 0.2s, filter 0.2s' }} />
                    {/* Hover zoom icon (top-left, non-interactive decoration) */}
                    <div className="organize-hover-overlay" style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'flex-start', justifyContent: 'flex-start', padding: 6, pointerEvents: 'none', opacity: 0 }}>
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35M11 8v6M8 11h6"/></svg>
                    </div>
                    {/* Badge — bottom-left */}
                    {hasOverride && (
                      <div style={{ position: 'absolute', bottom: 5, left: 5, zIndex: 2, width: 22, height: 22, borderRadius: 5, display: 'flex', alignItems: 'center', justifyContent: 'center', background: invalid ? 'var(--danger)' : 'var(--brand)' }}>
                        {invalid
                          ? <WarningIcon size={13} color="#fff" />
                          : <span style={{ color: '#fff', display: 'flex' }}><GearIcon size={12} /></span>
                        }
                      </div>
                    )}
                    {/* Check Access Level overlay — invalid only */}
                    {invalid && (
                      <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 3 }}>
                        <button type="button" onClick={() => onOpenPermissions(photo.id)}
                          style={{ background: 'rgba(255,255,255,0.93)', borderRadius: 6, padding: '4px 9px', fontSize: 11, fontWeight: 700, color: 'var(--danger)', border: '1.5px solid var(--danger)', cursor: 'pointer', lineHeight: 1.4, textAlign: 'center', boxShadow: '0 1px 6px rgba(0,0,0,0.18)' }}>
                          Custom Permission Issue
                        </button>
                      </div>
                    )}
                  </div>
                  <div style={{ fontSize: 10, color: 'var(--text-tertiary)', marginTop: 4, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', textAlign: 'center' }}>
                    {photo.label}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    };

    // ===== Custom Permissions Modal =====
    const PHOTO_ACCESS_LEVELS = [
      { id: 'public',        label: 'PUBLIC',               desc: 'Anyone with the link has access.',          Icon: PeopleIcon },
      { id: 'password',      label: 'PASSWORD PROTECTED',   desc: 'Requires password for access.',             Icon: LockIcon   },
      { id: 'selectedRoles', label: 'SELECTED ROLES ONLY',  desc: 'Restricted to people you invite.',          Icon: LockIcon   },
      { id: 'offline',       label: 'OFFLINE',              desc: 'Only visible to you, no one else can access.', Icon: BlockIcon },
    ];
    const CustomPermissionsModal = ({ photoId, photoOverrides, roles, onClose, onSave, onReset }) => {
      const isMobile = useIsMobile();
      const existingOv = photoOverrides[photoId] || { accessLevel: 'public', selectedRoleIds: [] };
      const [activeTab, setActiveTab] = useState('access');
      const [selectedLevel, setSelectedLevel] = useState(existingOv.accessLevel);
      const [selectedRoleIds, setSelectedRoleIds] = useState(
        (existingOv.selectedRoleIds || []).filter(id => roles.some(r => r.id === id))
      );
      const canSave = selectedLevel !== 'selectedRoles' || selectedRoleIds.length > 0;
      const toggleRole = (id) => setSelectedRoleIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
      const handleSave = () => { onSave(photoId, { accessLevel: selectedLevel, selectedRoleIds }); onClose(); };
      const handleReset = () => { onReset(photoId); onClose(); };

      const body = (
        <div style={{ display: 'flex', flexDirection: 'column', maxHeight: isMobile ? '88vh' : 'calc(100vh - 80px)' }}>
          {/* Header */}
          <div className="flex items-center justify-between px-6 py-4 border-b shrink-0" style={{ borderColor: 'var(--card-border)' }}>
            <h3 className="text-[15px] font-bold" style={{ color: 'var(--text-primary)' }}>Custom Permissions for 1 Item</h3>
            <button onClick={onClose} style={{ color: 'var(--text-tertiary)', background: 'none', border: 'none', cursor: 'pointer', padding: 4 }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
          {/* Tabs */}
          <div className="flex border-b shrink-0" style={{ borderColor: 'var(--card-border)' }}>
            {['access','download'].map(t => (
              <button key={t} onClick={() => setActiveTab(t)}
                className="px-5 py-3 text-[13px] font-semibold relative"
                style={{ color: activeTab === t ? 'var(--text-primary)' : 'var(--text-secondary)', background: 'none', border: 'none', cursor: 'pointer' }}>
                {t === 'access' ? 'Access Level' : 'Download'}
                {activeTab === t && <span style={{ position: 'absolute', bottom: 0, left: 0, right: 0, height: 2, background: 'var(--brand)', borderRadius: 2 }} />}
              </button>
            ))}
          </div>
          {/* Body */}
          <div style={{ flex: 1, overflowY: 'auto', padding: '16px 20px' }}>
            {activeTab === 'access' ? (
              <>
                {/* OR SET A CUSTOM OVERRIDE divider */}
                <div className="flex items-center gap-3 mb-4">
                  <div style={{ flex: 1, height: 1, background: 'var(--card-border)' }} />
                  <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.07em', color: 'var(--text-tertiary)', whiteSpace: 'nowrap' }}>OR SET A CUSTOM OVERRIDE</span>
                  <div style={{ flex: 1, height: 1, background: 'var(--card-border)' }} />
                </div>
                {/* Access level cards */}
                <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                  {PHOTO_ACCESS_LEVELS.map(lvl => {
                    const selected = selectedLevel === lvl.id;
                    return (
                      <React.Fragment key={lvl.id}>
                        <button type="button" onClick={() => setSelectedLevel(lvl.id)}
                          style={{ display: 'flex', alignItems: 'center', gap: 14, padding: '12px 14px', borderRadius: 8, border: `1.5px solid ${selected ? 'var(--brand)' : 'var(--card-border)'}`, background: selected ? 'var(--brand-cream, #FFF3EC)' : '#fff', cursor: 'pointer', textAlign: 'left', width: '100%', transition: 'border-color 0.15s, background 0.15s' }}>
                          <div style={{ width: 40, height: 40, borderRadius: 8, background: selected ? 'var(--brand)' : 'var(--soft-bg)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                            <span style={{ color: selected ? '#fff' : 'var(--text-secondary)' }}><lvl.Icon size={20} /></span>
                          </div>
                          <div>
                            <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: '0.04em', color: selected ? 'var(--brand)' : 'var(--text-primary)', marginBottom: 2 }}>{lvl.label}</div>
                            <div style={{ fontSize: 12, color: 'var(--text-secondary)' }}>{lvl.desc}</div>
                          </div>
                        </button>
                        {/* Role checkboxes — only under Selected Roles Only when it's selected */}
                        {lvl.id === 'selectedRoles' && selected && (
                          <div style={{ marginLeft: 14, marginTop: -2, marginBottom: 4, display: 'flex', flexDirection: 'column', gap: 6 }}>
                            {roles.map(r => (
                              <label key={r.id} style={{ display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer', padding: '4px 0' }}>
                                <button type="button" onClick={() => toggleRole(r.id)}
                                  style={{ width: 18, height: 18, borderRadius: 4, border: `2px solid ${selectedRoleIds.includes(r.id) ? 'var(--brand)' : 'var(--card-border)'}`, background: selectedRoleIds.includes(r.id) ? 'var(--brand)' : '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, cursor: 'pointer' }}>
                                  {selectedRoleIds.includes(r.id) && <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20,6 9,17 4,12"/></svg>}
                                </button>
                                <span style={{ fontSize: 13, color: 'var(--text-primary)', fontWeight: 500 }}>{r.name}</span>
                              </label>
                            ))}
                            {roles.length === 0 && <p style={{ fontSize: 12, color: 'var(--text-tertiary)', fontStyle: 'italic' }}>No roles on this gallery yet.</p>}
                          </div>
                        )}
                      </React.Fragment>
                    );
                  })}
                </div>
              </>
            ) : (
              <div style={{ padding: '20px 0', textAlign: 'center', color: 'var(--text-tertiary)', fontSize: 13 }}>Download permissions settings coming soon.</div>
            )}
          </div>
          {/* Inline warning — shown when Selected Roles Only but no role checked */}
          {selectedLevel === 'selectedRoles' && selectedRoleIds.length === 0 && (
            <div style={{ margin: '0 20px 12px', padding: '10px 12px', borderRadius: 8, background: 'var(--danger-soft)', border: '1px solid var(--danger)', display: 'flex', alignItems: 'flex-start', gap: 8 }}>
              <WarningIcon size={14} color="var(--danger)" />
              <span style={{ fontSize: 12, color: 'var(--danger)', fontWeight: 500, lineHeight: 1.5 }}>
                To use Selected Roles Only, at least one role must be selected.
              </span>
            </div>
          )}
          {/* Footer */}
          <div className="flex items-center justify-between px-5 py-4 border-t shrink-0" style={{ borderColor: 'var(--card-border)' }}>
            <button type="button" onClick={handleReset} style={{ fontSize: 13, fontWeight: 600, color: 'var(--brand)', background: 'none', border: 'none', cursor: 'pointer', padding: '4px 0' }}>Reset all Overrides</button>
            <div style={{ display: 'flex', gap: 10 }}>
              <button type="button" onClick={onClose} style={{ padding: '8px 18px', borderRadius: 9999, border: '1.5px solid var(--card-border)', background: '#fff', fontSize: 13, fontWeight: 600, color: 'var(--text-secondary)', cursor: 'pointer' }}>Cancel</button>
              <button type="button" onClick={handleSave} disabled={!canSave}
                style={{ padding: '8px 18px', borderRadius: 9999, background: canSave ? 'var(--brand)' : 'var(--soft-bg)', color: canSave ? '#fff' : 'var(--text-tertiary)', fontSize: 13, fontWeight: 700, border: 'none', cursor: canSave ? 'pointer' : 'not-allowed', opacity: canSave ? 1 : 0.6 }}>
                Save Changes
              </button>
            </div>
          </div>
        </div>
      );

      if (isMobile) return <MobileSheetModal onClose={onClose} zIndex={300}>{body}</MobileSheetModal>;
      return ReactDOM.createPortal(
        <div onClick={onClose} style={{ position: 'fixed', inset: 0, zIndex: 300, background: 'rgba(27,28,31,0.45)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '0 16px' }}>
          <div onClick={e => e.stopPropagation()} className="bg-white rounded-2xl border shadow-xl" style={{ borderColor: 'var(--card-border)', width: '100%', maxWidth: 520, overflow: 'hidden' }}>
            {body}
          </div>
        </div>,
        document.body

      // Resolve an ID to a display name for the locked state
      const resolveRoleName = (id) => {
        const sys = systemRoles.find(r => r.id === id);
        if (sys) return sys.name;
        const custom = roles.find(r => r.id === id);
        if (custom) return custom.name;
        const saved = savedRoles.find(s => s.id === id);
        if (saved) return saved.name;
        return 'General';

      const galleryName = 'Sample Gallery';

      const openAddModal = (type, blockId = null) => {
        setAddFieldMenuOpen(false);
        setBlockAddMenuOpen(null);
        setAddFieldTarget(blockId);
        setModalLabel('');
        setModalOptions('');
        setModalRequired(false);
        setAddFieldModal(type);
      };
      const closeModal = () => { setAddFieldModal(null); setAddFieldTarget(null); };
      const confirmAddField = () => {
        if (!modalLabel.trim()) return;
        const newField = { id: `cf-${modalLabel}-${Date.now()}`, label: modalLabel.trim(), type: addFieldModal, options: modalOptions, required: modalRequired };
        if (addFieldTarget === null) {
          if (customFields.length >= 15) return;
          setCustomFields(prev => [...prev, newField]);
        } else if (addFieldTarget === '__questions__') {
          if (customQuestions.length >= 15) return;
          setCustomQuestions(prev => [...prev, newField]);
        } else {
          setAdditionalBlocks(prev => prev.map(b => {
            if (b.id !== addFieldTarget || b.customFields.length >= 15) return b;
            return { ...b, customFields: [...b.customFields, newField] };
          }));
        }
        closeModal();
      };
      const removeCustomField = (id) => setCustomFields(prev => prev.filter(f => f.id !== id));

      const typeIcons = {
        text: <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4,7 4,4 20,4 20,7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>,
        dropdown: <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><polyline points="8,10 12,14 16,10"/></svg>,
        date: <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
      };

      const modalTitle = { text: 'ADD TEXT', dropdown: 'ADD DROPDOWN', date: 'ADD DATE PICKER' };

      const addContactBlock = () => {
        const id = `block-${Date.now()}`;
        setAdditionalBlocks(prev => [...prev, {
          id, name: `Contact ${prev.length + 2}`,
          label: '', description: '',
          fieldEnabled: { first_name: true, last_name: true, email: true, phone_number: false },
          fieldRequired: { first_name: false, last_name: false, email: false, phone_number: false },
          emailRole: 'everyone',
          customFields: [],
        }]);
      };
      const removeContactBlock = (blockId) => setAdditionalBlocks(prev => prev.filter(b => b.id !== blockId));
      const moveContactBlock = (blockId, dir) => {
        setAdditionalBlocks(prev => {
          const idx = prev.findIndex(b => b.id === blockId);
          if (dir === 'up' && idx === 0) return prev;
          if (dir === 'down' && idx === prev.length - 1) return prev;
          const next = [...prev];
          const si = dir === 'up' ? idx - 1 : idx + 1;
          [next[idx], next[si]] = [next[si], next[idx]];
          return next;
        });
      };
      const commitRenameBlock = () => {
        if (!renameBlockValue.trim()) { setRenameBlockId(null); return; }
        setAdditionalBlocks(prev => prev.map(b => b.id === renameBlockId ? { ...b, name: renameBlockValue.trim() } : b));

      const removeCustomQuestion = (id) => setCustomQuestions(prev => prev.filter(q => q.id !== id));

                    </div>

                  {(fieldEnabled.first_name || fieldEnabled.last_name) && (
                    <div className="flex gap-2 mb-3">
                      {fieldEnabled.first_name && <input readOnly placeholder={`First Name${fieldRequired.first_name ? '*' : ''}`} className="flex-1 px-3 py-2 rounded border text-[13px]" style={{ borderColor: 'var(--card-border)' }} />}
                      {fieldEnabled.last_name && <input readOnly placeholder={`Last Name${fieldRequired.last_name ? '*' : ''}`} className="flex-1 px-3 py-2 rounded border text-[13px]" style={{ borderColor: 'var(--card-border)' }} />}
                    </div>
                  )}
                  {fieldEnabled.email && <input readOnly placeholder={`Email${fieldRequired.email ? '*' : ' (optional)'}`} className="w-full px-3 py-2 rounded border text-[13px] mb-3" style={{ borderColor: 'var(--card-border)' }} />}
                  {fieldEnabled.phone_number && (
                    <div className="flex items-center gap-2 mb-3">

                        <span>🇺🇸</span><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6,9 12,15 18,9"/></svg>

                      <input readOnly placeholder={`Mobile${fieldRequired.phone_number ? '*' : ' (optional)'}`} className="flex-1 px-3 py-2 rounded border text-[13px]" style={{ borderColor: 'var(--card-border)' }} />
                    </div>
                  )}
                  {customFields.map(cf => {

                      <div key={cf.id} className="w-full px-3 py-2 rounded border text-[13px] mb-3 flex items-center justify-between" style={{ borderColor: 'var(--card-border)', color: 'var(--text-tertiary)' }}>

                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6,9 12,15 18,9"/></svg>

                          </div>
                        );
                        return <input key={cf.id} readOnly placeholder={`${cf.label}${cf.required ? '*' : ''}`} className="w-full px-3 py-2 rounded border text-[13px] mb-3" style={{ borderColor: 'var(--card-border)' }} />;
                      })}
                    </div>
                  ))}
                  {customQuestions.length > 0 && (
                    <div className="pt-4 mt-3" style={{ borderTop: '1px solid var(--card-border)' }}>
                      {customQuestions.map(q => {
                        if (q.type === 'dropdown') return (
                          <div key={q.id} className="w-full px-3 py-2 rounded border text-[13px] mb-3 flex items-center justify-between" style={{ borderColor: 'var(--card-border)', color: 'var(--text-tertiary)' }}>
                            <span>{q.label}{q.required ? '*' : ''}</span>
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6,9 12,15 18,9"/></svg>
                          </div>
                        );
                        if (q.type === 'date') return (
                          <div key={q.id} className="w-full px-3 py-2 rounded border text-[13px] mb-3 flex items-center justify-between" style={{ borderColor: 'var(--card-border)', color: 'var(--text-tertiary)' }}>
                            <span>{q.label}{q.required ? '*' : ''}</span>
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                          </div>
                        );
                        return <input key={q.id} readOnly placeholder={`${q.label}${q.required ? '*' : ''}`} className="w-full px-3 py-2 rounded border text-[13px] mb-3" style={{ borderColor: 'var(--card-border)' }} />;
                      })}
                    </div>
                  )}
                  {accessFeeEnabled && (
                    <div className="text-center mt-3 mb-2">
                      <p className="text-[13px] font-semibold" style={{ color: 'var(--text-primary)' }}>Access Fee: $0.00</p>
                      <p className="text-[12px] mt-0.5" style={{ color: 'var(--text-secondary)' }}>By filling out the form and clicking 'Continue', you will be prompted to pay a one time Access Fee.</p>
                      <p className="text-[12px] mt-1" style={{ color: 'var(--text-secondary)' }}>Already paid? <span style={{ color: 'var(--brand)', fontWeight: 600, cursor: 'pointer' }}>Click Here</span></p>

                    {submitLabel || 'Submit'}
                  </button>
                </div>
              </div>
            </div>
          </div>
        );

      return (
        <div className={`flex flex-col ${isMobile ? '' : 'flex-1 min-h-screen'}`} style={{ background: '#fff' }} onClick={() => { addFieldMenuOpen && setAddFieldMenuOpen(false); blockMenuOpen && setBlockMenuOpen(null); blockAddMenuOpen && setBlockAddMenuOpen(null); }}>
          {/* Header */}
          <div className={`flex items-center px-4 py-3 border-b shrink-0 ${isMobile ? '' : 'justify-center px-6 py-4'}`} style={{ borderColor: 'var(--card-border)', position: 'relative' }}>
            <button onClick={onBack} className={`flex items-center gap-1.5 text-[13px] font-semibold ${isMobile ? '' : 'absolute left-6'}`}
              style={{ color: 'var(--text-secondary)' }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15,18 9,12 15,6"/></svg>
              Back to Gallery Settings
            </button>
            {!isMobile && <h1 className="text-[13px] font-bold tracking-wider" style={{ color: 'var(--text-primary)' }}>EDIT CUSTOM FORM</h1>}
          </div>

          {/* Two-column layout */}
          <div className={`flex ${isMobile ? '' : 'flex-1 overflow-hidden'}`}>
            {/* Left — builder */}
            <div className={`flex-1 ${isMobile ? 'px-4 py-4' : 'overflow-y-auto px-8 py-6'}`} style={isMobile ? { paddingBottom: 72 } : { maxWidth: 580, borderRight: '1px solid var(--card-border)' }}>

              {/* Title */}
              <div className="mb-5">
                <label className="block text-[12px] font-semibold mb-1.5" style={{ color: 'var(--text-primary)' }}>Title</label>
                <input value={useCustomTitle ? customTitle : galleryName} readOnly={!useCustomTitle}
                  onChange={e => setCustomTitle(e.target.value)}
                  className="w-full px-3 py-2 rounded border text-[14px] outline-none"
                  style={{ borderColor: 'var(--card-border)', color: useCustomTitle ? 'var(--text-primary)' : 'var(--text-tertiary)', background: useCustomTitle ? '#fff' : 'var(--soft-bg)' }} />
                <label className="flex items-center gap-2 mt-2 cursor-pointer">
                  <button type="button" onClick={() => setUseCustomTitle(v => !v)}

              <div className="mb-5">

                    const enabled = fieldEnabled[f.id];
                    const required = fieldRequired[f.id];
                    const isDisabledField = !f.canDisable;
                    const row = (
                      <div key={f.id} className="flex items-center px-4 py-3 gap-4"

                                      {savedNotInGallery.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}

                      </button>

                                <button key={opt.type} type="button" onClick={() => openAddModal(opt.type, block.id)}

                                  <span style={{ color: 'var(--brand)' }}>{opt.icon}</span>{opt.label}

                              {opt.label}

                <div className="text-[11px] mt-1" style={{ color: 'var(--text-tertiary)' }}>{submitLabel.length}/50</div>

              <div>

                />
              </div>

                        <input readOnly placeholder={`Last Name${fieldRequired.last_name ? '*' : ''}`} className="flex-1 px-3 py-2 rounded border text-[13px]" style={{ borderColor: 'var(--card-border)' }} />

              </label>
              <div style={{ display: 'flex', gap: 8 }}>
                <button onClick={onClose} style={{ padding: '7px 16px', borderRadius: 9999, border: '1px solid var(--card-border)', background: '#fff', fontSize: 13, color: 'var(--text-primary)', cursor: 'pointer' }}>Cancel</button>
                <button disabled={checked.size === 0} onClick={() => onSelect([...checked])}
                  style={{ padding: '7px 20px', borderRadius: 9999, border: 'none', background: checked.size > 0 ? 'var(--brand)' : 'var(--line)', color: '#fff', fontSize: 13, fontWeight: 700, cursor: checked.size > 0 ? 'pointer' : 'default', opacity: checked.size === 0 ? 0.5 : 1 }}>
                  Next
                </button>
              </div>

          </div>
