<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sample Gallery — Gallery Features (RV1)</title>
  <script>
    document.title = location.hostname.includes('github.io')
      ? 'GitHub Sample Gallery'
      : 'Local Sample Gallery';
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* =====================================================================
       v5 — Zenfolio design tokens (synced with style-guide + ui-component-library).
       The original v1–v4 prototype variables (--brand, --page-bg, --text-primary, …)
       are kept but RE-POINTED to the new style guide values so every existing
       reference in the file picks up the new palette automatically.
       New style guide tokens (--orange*, --teal*, --bg*, --line*, --text*, --r-*,
       --shadow-*) are added alongside for new/refined components.
    ===================================================================== */
    :root {
      /* Brand — orange */
      --orange: #F26B3A;
      --orange-soft: #FFF1E9;
      --orange-deep: #D9521F;
      --orange-darker: #B84115;

      /* Accent — teal */
      --teal: #2DB3A6;
      --teal-soft: #E3F5F2;
      --teal-deep: #1FA294;

      --yellow: #F4C430;
      --yellow-soft: #FFF6DC;

      /* Neutrals */
      --bg: #F5F5F7;
      --bg-2: #FBFBFD;
      --surface: #FFFFFF;
      --surface-elev: #FFFFFF;
      --sidebar: #1D1F23;
      --line: #E8E8ED;
      --line-2: #F0F0F3;
      --line-subtle: rgba(0,0,0,0.06);
      --bg-subtle: rgba(0,0,0,0.04);
      --bg-hover: #EFEFF1;
      --bg-active: #E5E5EA;
      --text: #1D1D1F;
      --text-2: #424247;
      --text-3: #86868B;
      --text-4: #B0B0B6;
      --on-text: #FFFFFF;
      --on-brand: #FFFFFF;

      /* Soft semantic backgrounds */
      --success-soft: #E8F5F1;
      --danger-soft: #FFE4E4;
      --info-soft: #EEF1FF;
      --warning-soft: #FFF6DC;

      /* Disabled fills */
      --orange-disabled: #FBC4A8;
      --teal-disabled: #B5E3DC;
      --danger-disabled: #F4B4B4;

      /* Semantic */
      --success: #0D7567;
      --warning: #B8860B;
      --info: #3D4FB8;

      /* Radii */
      --r-xs: 6px;
      --r-sm: 10px;
      --r-md: 14px;
      --r-lg: 20px;
      --r-xl: 28px;

      /* Shadows */
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04), 0 1px 1px rgba(0,0,0,0.02);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
      --shadow-lg: 0 14px 32px rgba(0,0,0,0.06), 0 4px 8px rgba(0,0,0,0.03);
      --shadow-xl: 0 30px 60px rgba(0,0,0,0.10), 0 8px 16px rgba(0,0,0,0.04);

      /* ---- Legacy v1–v4 aliases mapped to the new tokens.
              Every var(--brand) / var(--page-bg) / var(--text-primary) … reference
              throughout the file is preserved and now picks up the new palette. ---- */
      --brand: var(--orange);
      --brand-hover: var(--orange-deep);
      --brand-deep: var(--orange-darker);
      --brand-cream: var(--orange-soft);
      --brand-cream-deep: #FBE0CC;
      --page-bg: var(--bg);
      --card-bg: var(--surface);
      --card-border: var(--line);
      --soft-bg: var(--bg-2);
      --row-hover: var(--bg-hover);
      --text-primary: var(--text);
      --text-secondary: var(--text-2);
      --text-tertiary: var(--text-3);
      --off-bg: #E5E5EA;
      --off-text: var(--text-3);
      --green: var(--success);
      --danger: #DC2626;
      --nav-bg: var(--sidebar);
      --nav-text: #B0B0B6;
      --nav-active-bg: rgba(242,107,58,0.14);

      color-scheme: light;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: -0.01em;
      background: var(--bg);
      color: var(--text);
      margin: 0;
    }
    .toggle-track { transition: background-color 0.2s ease; }
    .toggle-thumb { transition: transform 0.2s ease; }
    .pp-row .pp-shared-action { opacity: 0; transition: opacity 0.15s; }
    .pp-row:hover .pp-shared-action { opacity: 1; }
    .modal-backdrop { animation: fadeIn 0.15s ease-out; }
    .modal-card { animation: popIn 0.18s ease-out; }
    .menu-pop { animation: popIn 0.12s ease-out; transform-origin: top right; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes popIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
    /* ============ Bottom-sheet drawer ============ */
    @keyframes sheet-slide-up  { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes backdrop-fade-in { from { opacity: 0; } to { opacity: 1; } }
    .sheet-backdrop { animation: backdrop-fade-in 0.2s ease-out; }
    .sheet-panel { animation: sheet-slide-up 0.25s cubic-bezier(0.32, 0.72, 0, 1); overscroll-behavior: contain; }
    .sheet-item { transition: background-color 0.12s; }
    .sheet-item:active { background-color: #F4F3EF; }
    .role-card-hover:hover:not(.is-disabled) { border-color: var(--brand) !important; background: var(--brand-cream) !important; }
    .role-card-hover:hover:not(.is-disabled) .role-card-icon { color: var(--brand); }
    .role-card-hover.is-disabled { opacity: 0.5; cursor: not-allowed; }
    .menu-item:hover { background: var(--soft-bg); }
    .menu-item-danger:hover { background: #FDF0F0; }
    .add-role-btn { background: var(--brand); transition: background 0.15s; }
    .add-role-btn:hover { background: var(--brand-hover); }
    .feature-row { transition: background-color 0.15s; }
    .feature-row.is-collapsible:not(.is-open):hover { background: var(--row-hover); }
    .info-tooltip-icon:hover { color: var(--brand); }
    .kebab-btn:hover { background: rgba(0,0,0,0.06); color: var(--text-secondary); }
    /* Matrix horizontal scroll — kicks in once total grid width exceeds the panel width
       (e.g. advanced setups with many roles). Thin, subtle scrollbar so it doesn't dominate. */
    .matrix-scroll { border-radius: 12px; }
    .matrix-scroll::-webkit-scrollbar { height: 8px; }
    .matrix-scroll::-webkit-scrollbar-track { background: transparent; }
    .matrix-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.18); border-radius: 4px; }
    .matrix-scroll::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.28); }
    .compare-roles-btn:hover { background: var(--brand-cream) !important; }
    .compare-all-btn:hover { background: var(--brand-cream) !important; }
    /* Compare-roles modal — uses the same scrollbar styling as the matrix when the grid
       grows wider than the modal viewport (many roles). */
    .compare-grid-scroll { overflow-x: auto; overflow-y: visible; }
    .compare-grid-scroll::-webkit-scrollbar { height: 8px; }
    .compare-grid-scroll::-webkit-scrollbar-track { background: transparent; }
    .compare-grid-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.18); border-radius: 4px; }
    .compare-grid-scroll::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.28); }
    .modal-card.compare-all-fullscreen { border-radius: 0 !important; box-shadow: none !important; }
    .compare-feature-header-expandable:hover { background: #f5f5f5 !important; }
    .compare-feature-header-expandable:hover .compare-feature-header-sticky { background: #f5f5f5 !important; }
    /* Compare cells — make controls inside them fit the column width so long
       option labels don't overflow into the next column. (Selects are now expanded
       to radio lists inside the Compare-All modal, but if any survive, they flex.) */
    .compare-cell > .relative.inline-block,
    .compare-cell > .v5-select-wrap { display: block; width: 100%; }
    .compare-cell input[type="number"] { width: 100% !important; }
    /* Access mode picker grid — collapse to 2 cols on narrow screens, 1 col on phones. */
    @media (max-width: 900px) {
      .access-grid { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
    }
    @media (max-width: 540px) {
      .access-grid { grid-template-columns: 1fr !important; }
    }
    /* ===== Side-nav items — match the style guide's sidebar treatment.
       Active uses an orange-soft gradient + inset orange ring; the icon picks up the orange. */
    .nav-item {
      transition: color 0.15s, background 0.15s, box-shadow 0.15s;
      color: var(--nav-text);
    }
    .nav-item:hover { color: #fff; background: rgba(255,255,255,0.05); }
    .nav-item.is-active {
      color: #fff;
      background: linear-gradient(180deg, rgba(242,107,58,0.22), rgba(242,107,58,0.10));
      box-shadow: inset 0 0 0 1px rgba(242,107,58,0.35);
    }
    .nav-item.is-active svg { color: var(--orange); }
    .tab-btn { position: relative; transition: color 0.15s; }
    .tab-btn:hover { color: var(--text-primary); }
    .tab-btn.is-active { color: var(--text-primary); font-weight: 600; }
    .tab-btn.is-active::after {
      content: '';
      position: absolute; left: 12px; right: 12px; bottom: -1px; height: 2px;
      background: var(--brand); border-radius: 2px;
    }
    /* Primary (black) button — synced with style guide .btn-primary */
    .preview-btn {
      background: var(--text);
      color: var(--on-text);
      transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }
    .preview-btn:hover { background: #000; transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .preview-btn:active { background: #000; transform: translateY(0); box-shadow: var(--shadow-sm); }
    .preview-btn:focus-visible { outline: 2px solid var(--orange); outline-offset: 3px; }
    /* Soft disabled button — synced with style guide .btn-soft.is-disabled */
    .share-btn {
      background: var(--bg);
      color: var(--text-4);
      cursor: not-allowed;
      transition: none;
    }
    .share-btn:disabled { cursor: not-allowed; }
    /* Outline brand button hover — used by OutlineCtaBtn */
    .outline-cta-btn:hover { background: var(--orange-soft) !important; border-color: var(--orange-deep) !important; color: var(--orange-deep) !important; }
    .outline-cta-btn:active { transform: translateY(0); }
    /* ===== Radio button — synced with style guide (.radio-dot 18px) ===== */
    .radio-dot {
      width: 18px; height: 18px; border-radius: 999px;
      border: 1.5px solid var(--text-4); background: var(--surface);
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: border-color .15s, background-color .15s, box-shadow .15s;
    }
    .radio-dot:hover:not(.is-on) { border-color: var(--text-3); }
    .radio-dot.is-on {
      background: var(--orange);
      border-color: var(--orange);
    }
    .radio-dot.is-on::after {
      content: ''; width: 8px; height: 8px; border-radius: 999px; background: var(--on-brand);
    }
    .radio-dot.is-focus,
    label:focus-within .radio-dot,
    .radio-dot:focus-visible { box-shadow: 0 0 0 3px rgba(242,107,58,0.22); outline: none; }
    .radio-dot-sm { width: 13px; height: 13px; }
    .radio-dot-sm.is-on::after { width: 5px; height: 5px; }
    /* ===== Checkbox — synced with style guide (.check-box 18px, 5px radius) ===== */
    .check-box {
      width: 18px; height: 18px; border-radius: 5px;
      border: 1.5px solid var(--text-4);
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--surface); flex-shrink: 0;
      transition: border-color .15s, background-color .15s, box-shadow .15s;
    }
    .check-box:hover:not(.is-on) { border-color: var(--text-3); }
    .check-box.is-on { background: var(--orange); border-color: var(--orange); }
    .check-box.is-on::after {
      content: ''; width: 9px; height: 5px; border-left: 2px solid var(--on-brand); border-bottom: 2px solid var(--on-brand);
      transform: rotate(-45deg) translate(1px, -1px);
    }
    .check-box.is-focus,
    label:focus-within .check-box,
    .check-box:focus-visible { box-shadow: 0 0 0 3px rgba(242,107,58,0.22); outline: none; }
    .role-row.is-off { opacity: 0.55; }

    /* ===== v5 polish — buttons, inputs, selects, focus rings ===== */
    /* Brand "Add Role" / primary actions use pill radius + soft drop shadow on hover */
    .add-role-btn {
      background: var(--orange);
      color: var(--on-brand);
      transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
      box-shadow: var(--shadow-sm);
    }
    .add-role-btn:hover {
      background: var(--orange-deep);
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(242,107,58,0.30);
    }
    .add-role-btn:active { background: var(--orange-darker); transform: translateY(0); }
    /* Compare button — outline pill with subtle hover */
    .compare-all-btn {
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .compare-all-btn:hover {
      background: var(--orange-soft) !important;
      border-color: var(--orange) !important;
      color: var(--orange-deep) !important;
    }
    .compare-roles-btn:hover { background: var(--orange-soft) !important; color: var(--orange-deep) !important; }
    /* Inputs / selects — focus ring */
    select:focus, input:focus, textarea:focus { outline: none; }
    .v5-input,
    select.v5-select,
    input.v5-input,
    textarea.v5-input {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      padding: 9px 14px;
      font-size: 13.5px;
      color: var(--text);
      transition: border-color .15s, box-shadow .15s, background .15s;
    }
    .v5-input:hover:not(:disabled):not(:focus),
    select.v5-select:hover:not(:disabled):not(:focus) { border-color: var(--text-4); }
    .v5-input:focus,
    select.v5-select:focus,
    input.v5-input:focus,
    textarea.v5-input:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(242,107,58,0.18);
    }
    /* Restyle all native selects in the prototype to match the style guide */
    select {
      font-family: inherit;
      transition: border-color .15s, box-shadow .15s, background .15s;
    }
    select:focus {
      border-color: var(--orange) !important;
      box-shadow: 0 0 0 3px rgba(242,107,58,0.18);
    }
    /* Number inputs */
    input[type="number"], input[type="text"], input[type="email"], input[type="search"], textarea {
      font-family: inherit;
      transition: border-color .15s, box-shadow .15s, background .15s;
    }
    input[type="number"]:focus,
    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="search"]:focus,
    textarea:focus {
      border-color: var(--orange) !important;
      box-shadow: 0 0 0 3px rgba(242,107,58,0.18);
    }
    /* Subtle focus ring on icon buttons */
    .kebab-btn:focus-visible { outline: 2px solid var(--orange); outline-offset: 2px; }
    /* Status pill helper (used in the multi-role panel) */
    .v5-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 10px; border-radius: 999px;
      font-size: 11.5px; font-weight: 500;
    }
    .v5-pill.success { background: var(--success-soft); color: var(--success); }
    .v5-pill.warning { background: var(--warning-soft); color: var(--warning); }
    .v5-pill.paused  { background: var(--bg-subtle);    color: var(--text-3); }
    .v5-pill.brand   { background: var(--orange-soft);  color: var(--orange-deep); }
    /* Card / panel surface */
    .v5-panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-sm);
    }
    /* Modal card refinements — picked up by the existing modal-card class */
    .modal-card {
      border-radius: var(--r-xl) !important;
      box-shadow: var(--shadow-xl);
    }
    /* Underline tab — already keyed off .tab-btn.is-active, but harmonize the underline weight */
    .tab-btn.is-active::after { background: var(--orange) !important; height: 2px !important; bottom: -1px !important; }

    /* ===== Select / dropdown — synced with ui-component-library §02 =====
       Custom (not native) so we can render the popover, hover, selected highlight,
       and check icon exactly as specified. */
    .v5-select-wrap { position: relative; }
    .v5-select-btn {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      padding: 9px 12px 9px 14px;
      font: inherit;
      font-size: 13.5px;
      font-family: inherit;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s, background .15s;
    }
    .v5-select-btn:hover:not(:disabled):not(.is-open) { border-color: var(--text-4); }
    .v5-select-btn:focus,
    .v5-select-btn.is-open {
      border-color: var(--orange) !important;
      box-shadow: 0 0 0 3px rgba(242,107,58,0.18);
      outline: none;
    }
    .v5-select-btn:disabled {
      background: var(--bg);
      color: var(--text-4);
      cursor: not-allowed;
      border-color: var(--line-2);
    }
    /* Value text — truncate with ellipsis so long labels don't cover the chevron */
    .v5-select-value {
      flex: 1 1 auto; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .v5-select-chev {
      flex: 0 0 auto;
      display: inline-flex; align-items: center; justify-content: center;
      width: 14px; height: 14px;
      color: var(--text-3);
      transition: transform .2s, opacity .15s;
    }
    .v5-select-chev.is-open { transform: rotate(180deg); }
    .v5-select-btn:disabled .v5-select-chev { opacity: 0.5; }
    /* Popover menu — matches §02 spec.
       Rendered through a React portal at document.body with position:fixed so it
       escapes overflow:hidden ancestors (e.g. the rounded per-role settings card). */
    .v5-select-menu {
      background: var(--surface-elev);
      border: 1px solid var(--line);
      border-radius: var(--r-md);
      padding: 6px;
      box-shadow: var(--shadow-lg);
      max-height: 320px;
      overflow-y: auto;
      animation: popIn 0.12s ease-out;
      transform-origin: top center;
    }
    .v5-select-option {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 10px;
      border-radius: var(--r-xs);
      font-size: 13px; color: var(--text-2);
      cursor: pointer;
      transition: background-color .12s, color .12s;
    }
    .v5-select-option-label {
      flex: 1 1 auto; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .v5-select-option-check {
      flex: 0 0 auto;
      width: 14px; height: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      margin-left: auto;
    }
    .v5-select-option:hover { background: var(--bg-hover); color: var(--text); }
    .v5-select-option.is-selected {
      background: var(--orange-soft);
      color: var(--orange-deep);
      font-weight: 500;
    }
    .v5-select-option.is-selected:hover { background: var(--orange-soft); color: var(--orange-deep); }
    /* In the Compare-All modal, selects collapse to radio lists, so the wrap is
       rarely used there — but if it appears, keep it flexing to fill the column */
    .compare-cell .v5-select-wrap { display: block; width: 100%; min-width: 0 !important; }
    .compare-cell .v5-select-btn { width: 100%; }

    /* Per-role rows have a uniform height on desktop so cells line up regardless
       of which control (dropdown vs. checkboxes vs. toggle) they contain. */
    .per-role-row { min-height: 55px; }

    /* ============ Mobile responsive (<= 768px) ============ */
    .mobile-only { display: none; }
    .gallery-header-mobile { display: none; }
    @media (max-width: 768px) {
      .mobile-only { display: flex !important; }
      .desktop-only { display: none !important; }
      .zenfolio-nav { display: none !important; }
      /* Desktop top bar is replaced on mobile by the black gallery header */
      .top-bar { display: none !important; }
      .gallery-header { display: none !important; }
      .gallery-header-mobile { display: block !important; }
      .tabs-row {
        padding-left: 16px !important; padding-right: 16px !important;
        overflow-x: auto; -webkit-overflow-scrolling: touch;
        flex-wrap: nowrap !important;
        gap: 16px !important;
        justify-content: space-between;
      }
      .tabs-row .tab-btn { font-size: 16px !important; padding: 14px 4px !important; }
      .tabs-row .tab-btn.is-active { color: var(--brand) !important; font-weight: 700 !important; }
      .tabs-row .tab-btn.is-active::after { left: 0 !important; right: 0 !important; height: 3px !important; }
      .tabs-row::-webkit-scrollbar { display: none; }
      .role-pills-scroll::-webkit-scrollbar { display: none; }
      .role-pills-scroll { -ms-overflow-style: none; scrollbar-width: none; }
      html::-webkit-scrollbar { display: none; }
      html { -ms-overflow-style: none; scrollbar-width: none; }
      .layout-pane { flex-direction: column !important; }
      .inner-sidebar { display: none !important; }
      .main-pane {
        padding: 12px !important;
        max-width: 100% !important;
      }
      .gallery-features-header { align-items: center !important; }
      .gallery-features-desc { display: none !important; }
      .compare-all-btn { display: none !important; }
      .contact-fields-grid { grid-template-columns: 1fr !important; }
      /* Feature row on mobile uses card stack instead of grid */
      .feature-row-mobile {
        display: flex !important;
        align-items: center !important;
        gap: 8px !important;
        padding: 16px 14px !important;
        background: transparent !important;
        cursor: pointer;
      }
      .feature-row-mobile.is-open { background: var(--soft-bg) !important; }
      /* Multi-role panel padding */
      .multi-panel-strip { padding-left: 14px !important; padding-right: 14px !important; }
      .multi-panel-body { padding-left: 14px !important; padding-right: 14px !important; }
      /* Per-role table rows: stack label/control */
      .per-role-row {
        grid-template-columns: 1fr !important;
        gap: 8px !important;

    const isSettingVisibleForRole = (setting, roleId, featureId, perRole, allSettings = []) => {
      if (!setting.dependsOn) return true;
      const dep = setting.dependsOn;
      const allowed = Array.isArray(dep.values)
        ? dep.values
        : (dep.value !== undefined ? [dep.value] : null);
      // dependsOn without a value constraint is purely structural — used so the child
      // setting nests under its parent in the rendered UI without affecting visibility.
      if (allowed === null) return true;
      let depVal = perRole[roleId]?.[featureId]?.values?.[dep.settingId];
      // When no value is stored yet, fall back to the parent setting's declared default
      // or its first option — this is what SettingControl displays visually.
      if (depVal === undefined && allSettings.length) {
        const parent = allSettings.find(s => s.id === dep.settingId);
        if (parent) depVal = parent.def ?? parent.options?.[0];

    // ===== Per-role summary helper =====
    // Generates a short, human-readable summary of how a feature is configured for a

    const SHORT_SELECT_LABELS = {
      'All photos and individual download': 'All + Individual',
      'All photos': 'All photos',
      'Specific amount download': 'Limited',
      'Individual download only': 'Individual only',
      'All videos and individual download': 'All + Individual',
      'All videos': 'All videos',

    // Per-feature verb phrases for the dynamic status sentences shown under each feature title.
    // Each feature defines an "on with summary" prefix, an "on without summary" fallback,
    // and a negative phrase used when the feature is off for the role group.
    const FEATURE_VERBS = {
      'photo-downloads': { onWith: 'can download', onBare: 'can download photos', off: 'cannot download photos' },
      'video-downloads': { onWith: 'can download videos:', onBare: 'can download videos', off: 'cannot download videos' },
      'keyword-search':  { onWith: 'can search by keyword', onBare: 'can search by keyword', off: 'cannot search by keyword' },
      'favorites':       { onWith: 'can mark favorites', onBare: 'can mark favorites', off: 'cannot use favorites' },
      'commenting':      { onWith: 'can comment',       onBare: 'can comment',         off: 'cannot comment' },
      'sharing':         { onWith: 'can share',         onBare: 'can share',           off: 'cannot share' },
      'face-finder':     { onWith: 'can use Face Finder', onBare: 'can use Face Finder', off: 'cannot use Face Finder' },

    const joinNames = (names) => {
      if (names.length === 0) return '';
      if (names.length === 1) return names[0];
      if (names.length === 2) return `${names[0]} & ${names[1]}`;
      return names.slice(0, -1).join(', ') + ' & ' + names[names.length - 1];

    const getCompareAllDescText = (featureId, roleId, perRole) => {
      const values = perRole[roleId]?.[featureId]?.values || {};
      if (featureId === 'photo-downloads') {
        const dt = values['download-type'];
        if (dt === 'All photos and individual download') return 'All & ind.';

        if (dt === 'Specific amount download') return `${values['specific-amount'] ?? 10} photos`;
        if (dt === 'Individual download only') return 'Ind. only';

      if (featureId === 'video-downloads') {
        const dt = values['video-download-type'];
        if (dt === 'All videos and individual download') return 'All & ind.';
        if (dt === 'All videos') return 'All videos';
        if (dt === 'Specific amount download') return `${values['video-specific-amount'] ?? 5} videos`;
        if (dt === 'Individual download only') return 'Ind. only';
      }
      if (featureId === 'screenshot-protection') {
        const cfg = values['screenshot-config'] || {};
        if (cfg.desktop && cfg.mobile) return 'Desk. & Mob.';
        if (cfg.desktop) return 'Desktop';
        if (cfg.mobile) return 'Mobile';
      }
      return null;
    };

    const buildFeatureStatusLines = (feature, roles, perRole) => {
      const groups = new Map();
      roles.forEach(r => {
        const enabled = !!perRole[r.id]?.[feature.id]?.enabled;
        if (!enabled) return;
        const summary = summarizeFeatureForRole(feature, r.id, perRole);
        const key = `on:${summary}`;
        if (!groups.has(key)) groups.set(key, { summary, names: [] });
        groups.get(key).names.push(r.name);
      });
      const verbs = FEATURE_VERBS[feature.id] || { onWith: 'can use', onBare: 'can use' };
      const ordered = Array.from(groups.values()).sort((a, b) => (a.summary ? 0 : 1) - (b.summary ? 0 : 1));
      return ordered.map(g => {
        const names = joinNames(g.names);
        return g.summary ? `${names} ${verbs.onWith} ${g.summary}` : `${names} ${verbs.onBare}`;

    const summarizeFeatureForRole = (feature, roleId, perRole) => {
      const data = perRole[roleId]?.[feature.id];
      if (!data || !data.enabled) return '';
      const values = data.values || {};
      const parts = [];
      feature.settings.forEach(s => {
        if (s.optional) return;
        if (s.type === 'multicheck') return; // skip resolutions/multi-check lists from the summary

        const v = values[s.id];
        if (v === undefined || v === null || v === '') return;

          parts.push(SHORT_SELECT_LABELS[v] || v);

          const unit = s.id.includes('video') ? 'videos' : 'photos';

          if (v) parts.push(s.label.replace(/\s*\(OPTIONAL\)\s*/i, ''));

    // Mobile-aware select: bottom sheet on mobile, native <select> on desktop.
    const MobileSelect = ({ value, options, onChange, disabled, className, style: styleProp, sheetTitle }) => {

    const V5Select = ({ value, options, onChange, disabled, minWidth = 220, fullWidth, label, sheetTitle }) => {
      const isMobile = useIsMobile();
      const [open, setOpen] = useState(false);
      const [pos, setPos] = useState(null); // { top, left, width, openUp }
      const wrapRef = React.useRef(null);
      const btnRef = React.useRef(null);
      const menuRef = React.useRef(null);

      const measure = React.useCallback(() => {
        const btn = btnRef.current;
        if (!btn) return;
        const rect = btn.getBoundingClientRect();
        const menuMaxH = 320; // matches CSS max-height
        const spaceBelow = window.innerHeight - rect.bottom;
        const openUp = spaceBelow < Math.min(menuMaxH, 240) && rect.top > spaceBelow;
        setPos({

      const basicLock           = viewMode === 'basic';
      const remaining           = basicLock ? 0 : Math.max(0, planCustomRoleLimit - customRoleCount);
      const selectedCustomCount = [...selectedCards].filter(id => savedRoles.some(r => r.id === id)).length;
      // atLimit: no more custom role slots available (either gallery already full, or selection fills the allowance)
      const atLimit             = !basicLock && planCustomRoleLimit > 0 && selectedCustomCount >= remaining;
      const overallLimitReached = !basicLock && planCustomRoleLimit > 0 && customRoleCount >= planCustomRoleLimit;
      // ─────────────────────────────────────────────────────────────────────

      const toggleCard = (id) => {
        const isCustomRole = savedRoles.some(r => r.id === id);
        setSelectedCards(prev => {
          if (!prev.has(id) && isCustomRole) {
            const curCustom = [...prev].filter(sid => savedRoles.some(r => r.id === sid)).length;
            if (curCustom >= remaining) return prev; // cap at remaining allowance
          }
          const next = new Set(prev);
          next.has(id) ? next.delete(id) : next.add(id);
          return next;
        });
      };

      const savedIds = new Set(savedRoles.map(r => r.id));
      // Delete is only enabled when every selected card is a saved custom role
      const canDelete = selectedCards.size > 0 && [...selectedCards].every(id => savedIds.has(id));

      const handleAddRoles = () => {
        const ids = Array.from(selectedCards);
        if (ids.length === 1) {
          const id = ids[0];
          if (id === 'guest' || id === 'client') { goDetail(id); return; }
          const saved = savedRoles.find(r => r.id === id);
          if (saved) { selectSaved(saved); return; }
        }
        const selections = [];
        if (selectedCards.has('guest'))  selections.push({ presetId: 'guest' });
        if (selectedCards.has('client')) selections.push({ presetId: 'client' });
        if (!basicLock) {
          savedRoles.filter(r => selectedCards.has(r.id))
            .forEach(r => selections.push({ presetId: 'custom', customName: r.name, perRoleState: r.perRoleState || null }));
        }
        if (selections.length) onSelectBulk(selections);
      };

      const handleDelete = () => {
        setPendingDelete([...selectedCards].filter(id => savedIds.has(id)));
      };

      const confirmDelete = () => {
        onDeleteSaved(pendingDelete);
        setSelectedCards(new Set());
        setPendingDelete(null);
      };

      const goDetail = (id) => { setPresetId(id); setStep('detail'); };
      const roleDisplayName =
        presetId === 'guest' ? 'Guest'
        : presetId === 'client' ? 'Client'
        : presetId === 'custom' ? trimmed
        : '';

      const selectSaved = (saved) => {
        setCustomName(saved.name);
        setPresetId('custom');
        setSavedPerRoleState(saved.perRoleState || null);
        setStep('detail');
      };

      const submit = () => {
        const contact = contactEmail.trim()
          ? { firstName: firstName.trim(), lastName: lastName.trim(), email: contactEmail.trim(), mobile: contactMobile.trim() }

        onSelect(presetId, presetId === 'custom' ? trimmed : undefined, contact, savedPerRoleState);

                <button onClick={confirmDelete}
                  style={{ flex: 1, padding: '12px', borderRadius: 9999, border: 'none', background: '#e53935', color: '#fff', fontSize: 14, fontWeight: 700, cursor: 'pointer' }}>
                  Delete {count === 1 ? 'Role' : `${count} Roles`}
                </button>
              </div>
            </MobileSheetModal>
          ) : (
            <div className="fixed inset-0 flex items-center justify-center px-4"
              style={{ background: 'rgba(27,28,31,0.55)', zIndex: 9000 }}
              onClick={() => setPendingDelete(null)}>
              <div className="modal-card bg-white rounded-2xl border shadow-xl w-full max-w-[480px] p-6"
                style={{ borderColor: 'var(--card-border)' }} onClick={e => e.stopPropagation()}>
                {/* Header */}
                <div className="flex items-start justify-between mb-4">
                  <div className="flex items-center gap-2">
                    <span className="flex items-center justify-center rounded-full" style={{ width: 32, height: 32, background: '#FEE2E2' }}>
                      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#e53935" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14a2,2,0,0,1-2,2H8a2,2,0,0,1-2-2L5,6"/><path d="M10,11v6"/><path d="M14,11v6"/><path d="M9,6V4a1,1,0,0,1,1-1h4a1,1,0,0,1,1,1v2"/>
                      </svg>
                    </span>
                    <h3 className="text-[13px] font-bold tracking-wider" style={{ color: 'var(--text-primary)' }}>
                      DELETE {count === 1 ? 'SAVED ROLE' : `${count} SAVED ROLES`}
                    </h3>
                  </div>
                  <button onClick={() => setPendingDelete(null)} aria-label="Close"
                    style={{ color: 'var(--text-tertiary)' }} className="kebab-btn rounded p-1">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M3 3l10 10M13 3L3 13"/></svg>
                  </button>
                </div>
                {/* Role name(s) */}
                <div className="mb-3 px-3 py-2 rounded-lg text-[12px] font-medium" style={{ background: 'var(--soft-bg)', color: 'var(--text-secondary)' }}>
                  {names.join(', ')}
                </div>
                {/* Explanation */}
                <p className="text-[13px] leading-relaxed mb-2" style={{ color: 'var(--text-secondary)' }}>
                  {count === 1
                    ? 'This will permanently remove this role from your saved custom roles.'
                    : 'This will permanently remove these roles from your saved custom roles.'}
                </p>
                <p className="text-[13px] leading-relaxed mb-5" style={{ color: 'var(--text-secondary)' }}>
                  {count === 1 ? 'This role' : 'These roles'} will <strong>not</strong> be removed from any galleries where {count === 1 ? 'it has' : 'they have'} already been added. To remove {count === 1 ? 'it' : 'them'} from a gallery, you'll need to do that manually in the gallery's features table.
                </p>
                {/* Actions */}
                <div className="flex justify-end gap-3">
                  <button onClick={() => setPendingDelete(null)}
                    className="text-[12px] font-bold tracking-wider px-4 py-2 rounded-full border transition-colors"
                    style={{ borderColor: 'var(--line)', color: 'var(--text-secondary)', background: '#fff' }}>
                    CANCEL
                  </button>
                  <button onClick={confirmDelete}
                    className="text-[12px] font-bold tracking-wider px-4 py-2 rounded-full text-white transition-all"
                    style={{ background: '#e53935' }}>
                    DELETE {count === 1 ? 'ROLE' : `${count} ROLES`}
                  </button>
                </div>
              </div>
            </div>
          );
          return isMobile ? content : ReactDOM.createPortal(content, document.body);
        })()}
        </>
      );
    };

    // Modal shown when clicking a role label in the matrix header — adds a contact to that role.
    const AddContactToRoleModal = ({ role, onClose, onAdd }) => {
      const isMobile = useIsMobile();
      const [first, setFirst] = useState('');
      const [last, setLast] = useState('');
      const [email, setEmail] = useState('');
      const [mobile, setMobile] = useState('');
      const canAdd = email.trim().length > 0;
      const upper = role.name.toUpperCase();
      return (
        <MobileSheetModal onClose={onClose} zIndex={50} maxWidth={600}>
          <div className="p-6">
            <div className="flex items-start justify-between mb-4">
              <h3 className="text-[13px] font-bold tracking-wider flex items-center gap-2" style={{ color: 'var(--text-primary)' }}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                  <circle cx="9" cy="7" r="4" />
                  <line x1="19" y1="8" x2="19" y2="14" />
                  <line x1="22" y1="11" x2="16" y2="11" />
                </svg>
                ADD A {upper} TO THIS GALLERY
              </h3>
              {!isMobile && (
                <button onClick={onClose} aria-label="Close"
                  style={{ color: 'var(--text-tertiary)' }} className="kebab-btn rounded p-1">
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M3 3l10 10M13 3L3 13"/></svg>
                </button>
              )}
            </div>
            <ContactFields
              first={first} setFirst={setFirst}
              last={last} setLast={setLast}
              email={email} setEmail={setEmail}
              mobile={mobile} setMobile={setMobile}
            />
            {isMobile ? (
              <div style={{ display: 'flex', gap: 12, marginTop: 20 }}>
                <button onClick={onClose} style={{ flex: 1, padding: '12px 0', borderRadius: 9999, background: '#1B1C1F', color: '#fff', fontSize: 14, fontWeight: 700, border: 'none', cursor: 'pointer' }}>Cancel</button>
                <button onClick={() => { onAdd({ first, last, email, mobile }); onClose(); }} disabled={!canAdd}
                  style={{ flex: 1, padding: '12px 0', borderRadius: 9999, background: 'var(--brand)', color: '#fff', fontSize: 14, fontWeight: 700, border: 'none', cursor: canAdd ? 'pointer' : 'default', opacity: canAdd ? 1 : 0.4 }}>
                  Add
                </button>
              </div>
            ) : (
              <>
                <div className="my-5" style={{ borderTop: '1px solid var(--card-border)' }} />
                <div className="flex justify-end">
                  <button onClick={() => { onAdd({ first, last, email, mobile }); onClose(); }}
                    disabled={!canAdd}
                    className="text-[12px] font-bold tracking-wider px-5 py-2.5 rounded-full disabled:opacity-40 transition-all"
                    style={{ background: canAdd ? 'var(--brand)' : 'var(--off-bg)', color: canAdd ? '#fff' : 'var(--off-text)', boxShadow: canAdd ? 'var(--shadow-sm)' : 'none' }}>
                    ADD AS {upper}
                  </button>
                </div>
              </>
            )}
          </div>
        </MobileSheetModal>
      );
    };

    // ===== Role Kebab Menu =====
    const RoleMenu = ({ canRemove, presetOnly, onRename, onSaveLater, onDuplicate, onRemove }) => (
      <div className="menu-pop absolute right-0 top-full mt-1.5 z-40 bg-white rounded-md shadow-lg border min-w-[210px] py-1.5"
        style={{ borderColor: 'var(--card-border)' }} onClick={e => e.stopPropagation()}>
        {!presetOnly && (<>
          <button onClick={onRename}
            className="menu-item w-full text-left text-[12px] font-bold tracking-wider px-4 py-2.5"
            style={{ color: 'var(--text-primary)' }}>RENAME</button>
          <button onClick={onSaveLater}
            className="menu-item w-full text-left text-[12px] font-bold tracking-wider px-4 py-2.5"
            style={{ color: 'var(--text-primary)' }}>SAVE FOR LATER USE</button>
          <button onClick={onDuplicate}
            className="menu-item w-full text-left text-[12px] font-bold tracking-wider px-4 py-2.5"
            style={{ color: 'var(--text-primary)' }}>DUPLICATE</button>
        </>)}
        {canRemove && (
          <button onClick={onRemove}
            className="menu-item-danger w-full text-left text-[12px] font-bold tracking-wider px-4 py-2.5"
            style={{ color: 'var(--danger)' }}>REMOVE</button>
        )}
      </div>
    );

    // ===== Role Actions Bottom Sheet (mobile) =====
    // iOS-style action sheet that slides up from the bottom on mobile.
    // Replaces the absolute-positioned RoleMenu dropdown which doesn't work
    // well on small screens (gets clipped, hard to reach with thumb, etc.).
    const RoleActionsSheet = ({ role, onClose, onAddContact, onRename, onSaveLater, onDuplicate, onRemove }) => {
      useEffect(() => {
        lockBodyScroll();
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        return () => { unlockBodyScroll(); window.removeEventListener('keydown', onKey); };
      }, []);
      const Item = ({ icon, label, color, bg, danger, onClick, first }) => (
        <button type="button" onClick={onClick}
          className="w-full flex items-center gap-3 px-4 py-3.5 text-left"
          style={{ borderTop: first ? 'none' : '1px solid var(--card-border)', background: '#fff' }}>
          <span className="flex items-center justify-center rounded-lg shrink-0"
            style={{ width: 32, height: 32, background: bg, color: color }}>
            {icon}
          </span>
          <span className="text-[15px] font-medium"
            style={{ color: danger ? 'var(--danger)' : 'var(--text-primary)' }}>{label}</span>
        </button>
      );
      return (
        <div className="fixed inset-0 z-[60] flex items-end justify-center"
          onClick={onClose}>
          <div className="sheet-backdrop absolute inset-0" />
          <div className="sheet-panel relative w-full"
            style={{ background: '#fff', borderTop: '1px solid var(--card-border)', borderRadius: '20px 20px 0 0', boxShadow: '0 -4px 24px rgba(0,0,0,0.10)', padding: '0 16px 32px', maxHeight: '85vh', overflowY: 'auto' }}
            onClick={(e) => e.stopPropagation()}>
            {/* drag handle */}
            <div style={{ display: 'flex', justifyContent: 'center', padding: '10px 0 4px' }}>
              <div style={{ width: 36, height: 4, borderRadius: 2, background: 'var(--card-border)' }} />
            </div>
            {/* Role name label */}
            <div style={{ textAlign: 'center', fontSize: 13, fontWeight: 600, color: 'var(--text-secondary)', padding: '8px 0 10px' }}>
              {role.name}
            </div>
            {/* Actions card */}
            <div style={{ borderRadius: 14, overflow: 'hidden', border: '1px solid var(--card-border)', background: '#fff', marginBottom: 12 }}>
              <Item first icon={<PlusUserIcon size={18} />} label={`Add contact to ${role.name}`} color="#FFFFFF" bg="var(--brand)" onClick={onAddContact} />
              {role.isCustom && (
                <>
                  <Item icon={<PencilIcon size={18} stroke={1.7} />} label="Rename" color="#FFFFFF" bg="#3B82F6" onClick={onRename} />
                  <Item icon={<BookIcon size={18} stroke={1.7} />} label="Save for later use" color="#FFFFFF" bg="#F59E0B" onClick={onSaveLater} />
                  <Item icon={<CopyIcon size={18} />} label="Duplicate" color="#FFFFFF" bg="#8B5CF6" onClick={onDuplicate} />
                </>
              )}
              {role.removable && (
                <Item icon={<TrashIcon size={18} />} label="Remove" color="#FFFFFF" bg="var(--danger)" danger onClick={onRemove} />
              )}
            </div>
            {/* Cancel button */}
            <div style={{ display: 'flex', padding: '2px 0 4px' }}>
            <button type="button" onClick={onClose}
              style={{ flex: 1, padding: '12px 0', borderRadius: 9999, background: '#1B1C1F', color: '#fff', fontSize: 14, fontWeight: 700, border: 'none', cursor: 'pointer' }}>
              Cancel
            </button>
            </div>
          </div>
        </div>
      );
    };

    const RenameRoleSheet = ({ role, existingNames, onClose, onCommit }) => {
      const [name, setName] = React.useState(role.name);
      const trimmed = name.trim();
      const taken = existingNames.filter(n => n !== role.name.toLowerCase()).includes(trimmed.toLowerCase());
      const canSave = trimmed.length > 0 && !taken && trimmed !== role.name;
      return (
        <MobileSheetModal onClose={onClose} zIndex={120}>
          <div style={{ padding: '8px 20px 0' }}>
            <div style={{ textAlign: 'center', fontSize: 15, fontWeight: 700, color: 'var(--text-primary)', paddingBottom: 16, borderBottom: '1px solid var(--card-border)' }}>
              Rename Role
            </div>
            <div style={{ padding: '20px 0 8px' }}>
              <input type="text" value={name} maxLength={32}
                onChange={e => setName(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter' && canSave) { onCommit(trimmed); } }}
                className="w-full text-[14px] px-3 py-2.5 rounded-[10px] border bg-white outline-none"
                style={{ borderColor: taken ? 'var(--brand)' : 'var(--card-border)', color: 'var(--text-primary)' }} />
              {taken && <p className="text-[12px] mt-2" style={{ color: 'var(--brand-deep)' }}>A role named "{trimmed}" already exists.</p>}
            </div>
          </div>
          <div style={{ display: 'flex', gap: 12, padding: '8px 20px 20px' }}>
            <button onClick={onClose}
              style={{ flex: 1, padding: '12px 0', borderRadius: 9999, background: '#1B1C1F', color: '#fff', fontSize: 14, fontWeight: 700, border: 'none', cursor: 'pointer' }}>
              Cancel
            </button>
            <button disabled={!canSave} onClick={() => { if (canSave) onCommit(trimmed); }}
              style={{ flex: 1, padding: '12px 0', borderRadius: 9999, background: 'var(--brand)', color: '#fff', fontSize: 14, fontWeight: 700, border: 'none', cursor: 'pointer', opacity: canSave ? 1 : 0.4 }}>
              Save
            </button>
          </div>
        </MobileSheetModal>
      );
    };

    // ===== Floating Tooltip =====
    const FloatingTooltip = ({ text, x, y, visible }) => {
      if (!text) return null;
      const offset = -(x / window.innerWidth) * 100;
      return ReactDOM.createPortal(
        <div style={{
          position: 'fixed', left: x, top: y,
          pointerEvents: 'none', zIndex: 9999,
          opacity: visible ? 1 : 0,
          transition: visible ? 'opacity 0.1s ease' : 'opacity 0.18s ease',
        }}>
          {/* Triangle — always anchored at cursor X */}
          <div style={{
            position: 'absolute', left: 0, top: 0,
            transform: 'translateX(-50%)',
            width: 0, height: 0,
            borderLeft: '6px solid transparent',
            borderRight: '6px solid transparent',
            borderBottom: '6px solid rgba(25,25,25,0.88)',
          }} />
          {/* Body — shifts left/right based on edge proximity */}
          <div style={{
            position: 'absolute', left: 0, top: 6,
            transform: `translateX(${offset}%)`,
            background: 'rgba(25,25,25,0.88)',
            color: '#fff', fontSize: 12, fontWeight: 500,
            padding: '5px 10px', borderRadius: 6,
            whiteSpace: 'nowrap',
          }}>{text}</div>
        </div>,
        document.body
      );
    };

    // ===== Column Header =====
    const ColumnHeader = ({ role, contactCount = 0, isMenuOpen, onMenuToggle, isRenaming, onCommitRename, onCancelRename, onRename, onDuplicate, onRemove, onSaveLater, onAddContact }) => {
      const [tempName, setTempName] = useState(role.name);
      const [tipPos, setTipPos] = useState({ x: 0, y: 0 });
      const [tipVisible, setTipVisible] = useState(false);
      const headerRef = React.useRef(null);
      useEffect(() => { if (isRenaming) setTempName(role.name); }, [isRenaming, role.name]);

      return (
        <div className="relative w-full flex items-center justify-center" style={{ color: 'var(--text-secondary)' }}>
          {isRenaming ? (
            <input autoFocus value={tempName}
              onChange={(e) => setTempName(e.target.value)}
              onClick={(e) => e.stopPropagation()}
              onBlur={() => onCommitRename(tempName)}
              onKeyDown={(e) => {
                e.stopPropagation();
                if (e.key === 'Enter') { e.preventDefault(); onCommitRename(tempName); }
                if (e.key === 'Escape') onCancelRename();
              }}
              className="text-[11px] font-bold uppercase tracking-wider w-[88px] text-center border-2 rounded px-1 py-0.5 outline-none"
              style={{ borderColor: 'var(--brand)', color: 'var(--text-primary)' }} maxLength={32} />
          ) : (
            <>
            <FloatingTooltip text={`${role.name} — click to add a contact in this role to the gallery.`} x={tipPos.x} y={tipPos.y} visible={tipVisible} />
            <button type="button" ref={headerRef} onClick={(e) => { e.stopPropagation(); onAddContact && onAddContact(); }}
              className="text-[11px] font-bold uppercase tracking-wider flex items-center gap-1 min-w-0 rounded px-1 py-0.5 hover:bg-black/5 transition-colors"
              style={{ maxWidth: 'calc(var(--role-header-max-w, 110px) - 32px)', color: 'var(--text-secondary)' }}
              onMouseEnter={(e) => { const bottom = headerRef.current ? headerRef.current.getBoundingClientRect().bottom : e.clientY; setTipPos({ x: e.clientX, y: bottom }); setTipVisible(true); }}
              onMouseMove={(e) => setTipPos(prev => ({ ...prev, x: e.clientX }))}
              onMouseLeave={() => setTipVisible(false)}>
              <span className="truncate min-w-0">{role.name}</span>
              <span className="shrink-0" style={{ color: 'var(--text-tertiary)', fontWeight: 600 }}>({contactCount})</span>
            </button>
            </>
          )}
          {!isRenaming && role.removable && (
            <button onClick={(e) => { e.stopPropagation(); onMenuToggle(); }}
              className="kebab-btn rounded p-1"
              style={{ color: 'var(--text-tertiary)', position: 'absolute', right: 0 }}>
              <KebabIcon size={14} />
            </button>
          )}
          {isMenuOpen && role.removable && (
            <RoleMenu
              canRemove={role.removable}
              presetOnly={role.removable && !role.isCustom}
              onRename={onRename}
              onSaveLater={onSaveLater}
              onDuplicate={onDuplicate}
              onRemove={onRemove}
            />
          )}
        </div>
      );
    };

    // ===== Watermark Position Picker =====
    const WATERMARK_POSITIONS = [['tl','tc','tr'],['ml','mc','mr'],['bl','bc','br']];
    const watermarkPositionStyle = (pos) => {
      const map = {
        tl: { top: 12, left: 16, textAlign: 'left' },
        tc: { top: 12, left: '50%', transform: 'translateX(-50%)', textAlign: 'center' },
        tr: { top: 12, right: 16, textAlign: 'right' },
        ml: { top: '50%', left: 16, transform: 'translateY(-50%)', textAlign: 'left' },
        mc: { top: '50%', left: '50%', transform: 'translate(-50%,-50%)', textAlign: 'center' },
        mr: { top: '50%', right: 16, transform: 'translateY(-50%)', textAlign: 'right' },
        bl: { bottom: 12, left: 16, textAlign: 'left' },
        bc: { bottom: 12, left: '50%', transform: 'translateX(-50%)', textAlign: 'center' },
        br: { bottom: 12, right: 16, textAlign: 'right' },
      };
      return map[pos] || map.mc;
    };
    const WatermarkPositionPicker = ({ value, onChange, disabled }) => (
      <div className="watermark-picker w-full flex flex-col items-center"
        style={{ pointerEvents: disabled ? 'none' : 'auto', opacity: disabled ? 0.6 : 1 }}>
        <div className="text-[12px] font-medium mb-2" style={{ color: 'var(--text-primary)' }}>Edit Position</div>
        <div className="watermark-grid" role="radiogroup" aria-label="Watermark position"
          style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 30px)', gridTemplateRows: 'repeat(3, 30px)', gap: 2, marginBottom: 16 }}>
          {WATERMARK_POSITIONS.flat().map(pos => {
            const selected = value === pos;
            return (
              <button key={pos} type="button" role="radio" aria-checked={selected}
                onClick={() => onChange(pos)}
                className="watermark-cell"
                style={{ width: 30, height: 30,
                  background: selected ? 'var(--brand)' : '#fff',
                  border: '1px solid ' + (selected ? 'var(--brand)' : 'var(--card-border)'),
                  cursor: 'pointer', transition: 'background 0.12s, border-color 0.12s', padding: 0 }}
                title={`Position: ${pos}`}
              />
            );
          })}
        </div>
        <div className="watermark-preview" style={{
          width: '100%', maxWidth: 480,
          position: 'relative',
          aspectRatio: '16 / 10',
          borderRadius: 8,
          overflow: 'hidden',
          background: 'linear-gradient(135deg, #3a2f24 0%, #5c4a37 35%, #7e6a52 60%, #6a563f 100%)',
          boxShadow: 'inset 0 0 80px rgba(0,0,0,0.25)',
        }}>
          <svg viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice"
            style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }}>
            <defs>
              <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#6b563f"/>
                <stop offset="100%" stopColor="#3a2f24"/>
              </linearGradient>
              <linearGradient id="board" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stopColor="#f0e3c2"/>
                <stop offset="50%" stopColor="#fff7e2"/>
                <stop offset="100%" stopColor="#e0d2b0"/>
              </linearGradient>
            </defs>
            <rect width="320" height="200" fill="url(#sand)"/>
            {Array.from({ length: 60 }).map((_, i) => (
              <circle key={i} cx={(i * 53) % 320} cy={(i * 31) % 200} r={0.6} fill="rgba(255,255,255,0.05)" />
            ))}
            <ellipse cx="160" cy="115" rx="120" ry="32" fill="url(#board)" opacity="0.9"/>
            <path d="M 50 113 Q 160 95 270 113 Q 160 132 50 113 Z" fill="none" stroke="#9c1f1f" strokeWidth="0.6" opacity="0.6"/>
            <path d="M 60 117 Q 160 100 260 117" fill="none" stroke="#1f3a8c" strokeWidth="0.5" opacity="0.4"/>
          </svg>
          <div style={{
            position: 'absolute',
            ...watermarkPositionStyle(value),
            color: 'rgba(255,255,255,0.78)',
            fontSize: 14, fontWeight: 500,
            letterSpacing: '0.02em',
            textShadow: '0 1px 3px rgba(0,0,0,0.4)',
            pointerEvents: 'none',
            whiteSpace: 'nowrap',
            fontStyle: 'italic',
          }}>
            My Watermark
          </div>
        </div>
        <div className="flex gap-1.5 mt-3 mb-1">
          <span style={{ width: 22, height: 14, background: '#7a7a7e', borderRadius: 2 }} />
          <span style={{ width: 22, height: 14, background: '#c7c7cc', borderRadius: 2 }} />
        </div>
        <div className="text-[11px] mt-1 text-center" style={{ color: 'var(--text-tertiary)', lineHeight: 1.45 }}>
          Image shown is for preview purposes only.<br/>This setting only applies to Photos.
        </div>
      </div>
    );

    // ===== Info Tooltip =====
    const InfoTooltip = ({ content }) => {
      const [coords, setCoords] = React.useState(null);
      const iconRef = React.useRef(null);
      const handleEnter = () => {
        if (iconRef.current) {
          const r = iconRef.current.getBoundingClientRect();
          setCoords({ top: r.top - 8, left: r.left + r.width / 2 });
        }
      };
      return (
        <span style={{ display: 'inline-flex', alignItems: 'center', marginLeft: 5 }}>
          <span ref={iconRef}
            className="info-tooltip-icon"
            onMouseEnter={handleEnter}
            onMouseLeave={() => setCoords(null)}
            style={{ display: 'inline-flex', alignItems: 'center', cursor: 'default', color: 'var(--text-tertiary)' }}>
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <circle cx="8" cy="8" r="7" stroke="currentColor" strokeWidth="1.5"/>
              <text x="8" y="12" textAnchor="middle" fontSize="9" fontWeight="700" fill="currentColor" fontFamily="sans-serif">i</text>
            </svg>
          </span>
          {coords && ReactDOM.createPortal(
            <div style={{
              position: 'fixed',
              top: coords.top,
              left: coords.left,
              transform: 'translate(-50%, -100%)',
              zIndex: 2147483647,
              background: '#1e1e1e',
              color: '#fff',
              borderRadius: 8,
              padding: '10px 14px',
              width: 300,
              fontSize: 12,
              lineHeight: 1.55,
              boxShadow: '0 4px 20px rgba(0,0,0,0.45)',
              pointerEvents: 'none',
              whiteSpace: 'pre-wrap',
            }}>
              {content}
            </div>,
            document.body
          )}
        </span>
      );
    };

    // ===== Setting Control =====
    const SettingControl = ({ s, value, onChange, disabled, compact }) => {
      const isMobile = useIsMobile();
      if (s.type === 'check') {
        return (
          <label className="inline-flex items-center gap-2 text-[13px] cursor-pointer whitespace-nowrap">
            <span className={`check-box ${value ? 'is-on' : ''}`} />
            <input type="checkbox" checked={!!value} disabled={disabled}
              onChange={(e) => onChange(e.target.checked)}
              className="sr-only" />
            <span style={{ color: 'var(--text-primary)' }}>{s.on || 'Enabled'}</span>
          </label>
        );
      }
      if (s.type === 'toggle') {
        return <Toggle checked={!!value} onChange={() => onChange(!value)} disabled={disabled} size="md" />;
      }
      if (s.type === 'text') {
        return (
          <input type="text" value={value || ''} disabled={disabled}
            onChange={(e) => onChange(e.target.value)}
            className={`text-[13px] rounded-md border bg-white px-3 py-2 outline-none${isMobile ? ' w-full' : ''}`}
            style={{ borderColor: 'var(--card-border)', ...(isMobile ? {} : { minWidth: 240 }) }} />
        );
      }
      if (s.type === 'number') {
        return (
          <input type="number" min={s.min ?? 1}
            value={value === undefined || value === null ? '' : value}
            disabled={disabled}
            placeholder={s.placeholder}
            onChange={(e) => {
              const raw = e.target.value;
              if (raw === '') { onChange(''); return; }
              const n = parseInt(raw, 10);
              onChange(Number.isFinite(n) ? n : '');
            }}
            className="text-[13px] rounded-md border bg-white px-3 py-2 outline-none text-right"
            style={{ borderColor: 'var(--card-border)', width: 110 }} />
        );
      }
      if (s.type === 'select') {
        return (
          <V5Select
            value={value || ''}
            options={s.options}
            disabled={disabled}
            onChange={onChange}
            minWidth={compact ? 220 : 240}
            sheetTitle={s.sheetTitle}
          />
        );
      }
      if (s.type === 'multicheck') {
        const hasSubOpts = !!s.subOptions;
        const selectedArr = hasSubOpts
          ? (Array.isArray(value) ? value : (value?.selected || []))
          : (value || []);
        const subSel = hasSubOpts
          ? (Array.isArray(value) ? {} : (value?.sub || {}))
          : {};
        if (hasSubOpts) {
          return (
            <div className="multicheck-opts flex items-start gap-4 flex-wrap">
              {s.options.map(opt => {
                const checked = selectedArr.includes(opt);
                const subs = s.subOptions[opt];
                const currentSub = subSel[opt] || s.subDef?.[opt];
                return (
                  <div key={opt} className="multicheck-opt flex flex-col gap-1.5" style={{ width: 128 }}>
                    <label className="inline-flex items-center gap-2 text-[13px] cursor-pointer">
                      <span className={`check-box ${checked ? 'is-on' : ''}`} />
                      <input type="checkbox" checked={checked} disabled={disabled}
                        onChange={() => {
                          const nextSel = checked ? selectedArr.filter(v => v !== opt) : [...selectedArr, opt];
                          onChange({ selected: nextSel, sub: subSel });
                        }}
                        className="sr-only" />
                      <span style={{ color: 'var(--text-primary)', opacity: checked ? 1 : 0.35 }}>{opt}</span>
                    </label>
                    {subs && (
                      <div className="multicheck-suboption">
                        <MobileSelect
                          value={currentSub || subs[0]}
                          options={subs}
                          disabled={disabled || !checked}
                          onChange={v => onChange({ selected: selectedArr, sub: { ...subSel, [opt]: v } })}
                          className="text-[12px] px-2 py-1 rounded border bg-white outline-none"
                          style={{ borderColor: 'var(--card-border)', color: 'var(--text-primary)', width: '100%' }}
                          sheetTitle="Choose Download Resolution"
                        />
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          );
        }
        return (
          <div className={s.vertical ? 'flex flex-col gap-2' : 'flex items-center gap-5 flex-wrap'}>
            {s.options.map(opt => {
              const checked = (value || []).includes(opt);
              return (
                <label key={opt} className="inline-flex items-center gap-2 text-[13px] cursor-pointer">
                  <span className={`check-box ${checked ? 'is-on' : ''}`} />
                  <input type="checkbox" checked={checked} disabled={disabled}
                    onChange={() => {
                      const next = checked ? value.filter(v => v !== opt) : [...(value || []), opt];
                      onChange(next);
                    }}
                    className="sr-only" />
                  <span style={{ color: 'var(--text-primary)' }}>{opt}</span>
                </label>
              );
            })}
          </div>
        );
      }
      if (s.type === 'radio') {
        return (
          <div className="flex items-center gap-5 flex-wrap">
            {s.options.map(opt => {
              const checked = value === opt;
              return (
                <label key={opt} className="inline-flex items-center gap-2 text-[13px] cursor-pointer">
                  <span className={`radio-dot ${checked ? 'is-on' : ''}`} />
                  <input type="radio" checked={checked} disabled={disabled}
                    onChange={() => onChange(opt)}
                    className="sr-only" />
                  <span style={{ color: 'var(--text-primary)' }}>{opt}</span>
                </label>
              );
            })}
          </div>
        );
      }
      if (s.type === 'position') {
        return <WatermarkPositionPicker value={value || 'mc'} onChange={onChange} disabled={disabled} />;
      }
      if (s.type === 'video-preview-config') {
        const start    = (value && value.start    != null) ? value.start    : '00';
        const duration = (value && value.duration != null) ? value.duration : '15';
        return (
          <div style={{ width: '100%', maxWidth: 520 }}>
            <p className="text-[13px] mb-2" style={{ color: 'var(--text-primary)' }}>
              Set your default for creating previews for <strong>ALL videos</strong> uploaded to this gallery.
            </p>
            <p className="text-[13px] font-bold mb-4" style={{ color: 'var(--text-primary)' }}>
              Set the start time and duration for the video as your preview.
            </p>
            <div className="flex items-end gap-3 mb-5">
              <div>
                <div className="text-[12px] mb-1.5" style={{ color: 'var(--text-secondary)' }}>Start Time (in sec)</div>
                <V5Select value={start} options={['00','05','10','15','30','45']} disabled={disabled}
                  onChange={(v) => onChange({ start: v, duration })} minWidth={110} />
              </div>
              <span className="text-[13px] pb-2" style={{ color: 'var(--text-secondary)' }}>and</span>
              <div>
                <div className="text-[12px] mb-1.5" style={{ color: 'var(--text-secondary)' }}>Duration (in sec)</div>
                <V5Select value={duration} options={['15','30']} disabled={disabled}
                  onChange={(v) => onChange({ start, duration: v })} minWidth={110} />
              </div>
            </div>
            <p className="text-[12px] leading-relaxed" style={{ color: 'var(--text-tertiary)' }}>
              <strong>NOTE:</strong> Enabling or changing this feature will only affect new videos uploaded to your account.
            </p>
          </div>
        );
      }
      if (s.type === 'radio') {
        return (
          <div className="flex items-center gap-5 flex-wrap">
            {s.options.map(opt => {
              const checked = value === opt;
              return (
                <label key={opt} className="inline-flex items-center gap-2 text-[13px] cursor-pointer">
                  <span className={`radio-dot ${checked ? 'is-on' : ''}`} />
                  <input type="radio" checked={checked} disabled={disabled}
                    onChange={() => onChange(opt)} className="sr-only" />
                  <span style={{ color: 'var(--text-primary)' }}>{opt}</span>
                </label>
              );
            })}
          </div>
        );
      }
      if (s.type === 'screenshot-config') {
        const cfg = value || {};
        if (disabled) {
          return (
            <div style={{ width: '100%' }}>
              {[{ label: 'Desktop Deterrence' }, { label: 'Mobile Deterrence' }].map((item, i) => (
                <div key={item.label} className="flex items-center gap-3 px-4 py-3 rounded-lg"
                  style={{ border: '1px solid var(--card-border)', background: '#fff', marginBottom: i === 0 ? 8 : 0 }}>
                  <Toggle size="sm" checked={false} onChange={() => {}} />
                  <span className="text-[13px] font-semibold" style={{ color: 'var(--text-tertiary)' }}>{item.label}</span>
                </div>
              ))}
            </div>
          );
        }
        const desktopOn = !!cfg.desktop;
        const mobileOn  = !!cfg.mobile;
        const desktopTitle   = cfg.desktopTitle   !== undefined ? cfg.desktopTitle   : 'Do Not Screenshot.';
        const desktopMessage = cfg.desktopMessage !== undefined ? cfg.desktopMessage : 'Unauthorized reproduction, distribution, or copying of these images by any means, including screenshots, is strictly prohibited.';
        const mobileScope    = cfg.mobileScope    || 'full';
        const mobileBlurType = cfg.mobileBlurType || 'diagonal';
        const mobileBanner   = !!cfg.mobileBanner;
        const update = (patch) => { if (!disabled) onChange({ ...cfg, ...patch }); };
        const blurOverlay = {
          radial:   { background: 'radial-gradient(circle at 50% 40%, transparent 22%, rgba(190,170,145,0.85) 62%)', backdropFilter: 'blur(10px)', WebkitBackdropFilter: 'blur(10px)' },
          diagonal: { backdropFilter: 'blur(10px)', WebkitBackdropFilter: 'blur(10px)', clipPath: 'polygon(0 0, 72% 0, 100% 28%, 100% 100%, 28% 100%, 0 72%)', background: 'rgba(190,170,145,0.25)' },
          vertical: { top: '15%', bottom: '15%', left: 0, right: 0, backdropFilter: 'blur(10px)', WebkitBackdropFilter: 'blur(10px)', background: 'rgba(190,170,145,0.2)' },
        };
        return (
          <div style={{ width: '100%' }}>
            <div className="flex items-start gap-2 mb-4 rounded-md px-3 py-2.5"
              style={{ background: '#fef2f2', border: '1px solid #fecaca' }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="#dc2626" style={{ flexShrink: 0, marginTop: 1 }}>
                <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
                <line x1="12" y1="9" x2="12" y2="13" stroke="white" strokeWidth="2" strokeLinecap="round"/>
                <line x1="12" y1="17" x2="12.01" y2="17" stroke="white" strokeWidth="2" strokeLinecap="round"/>
              </svg>
              <span className="text-[12px]" style={{ color: '#dc2626' }}>
                <strong>Notice:</strong> This is deterrence only and does not completely prevent screenshots.
              </span>
            </div>
            {/* Desktop Deterrence */}
            <div className="rounded-lg mb-3" style={{ border: '1px solid var(--card-border)', overflow: 'hidden' }}>
              <div className="flex items-center gap-3 px-4 py-3"
                style={{ borderBottom: desktopOn ? '1px solid var(--card-border)' : 'none' }}>
                <Toggle size="sm" checked={desktopOn} onChange={() => update({ desktop: !desktopOn })} />
                <span className="text-[13px] font-semibold" style={{ color: 'var(--text-primary)' }}>Desktop Deterrence</span>
              </div>
              {desktopOn && (
                <div className="px-4 pt-4 pb-4">
                  <div className="mb-4">
                    <label className="block text-[12px] font-bold mb-1.5" style={{ color: 'var(--text-primary)' }}>Title</label>
                    <input type="text" value={desktopTitle} onChange={e => update({ desktopTitle: e.target.value })}
                      className="rounded-md px-3 py-2 text-[13px] w-full outline-none"
                      style={{ border: '1px solid var(--card-border)', color: 'var(--text-primary)', background: '#fff' }} />
                  </div>
                  <div>
                    <label className="block text-[12px] font-bold mb-1.5" style={{ color: 'var(--text-primary)' }}>Protection Message</label>
                    <textarea value={desktopMessage} onChange={e => update({ desktopMessage: e.target.value })} rows={4}
                      style={{ width: '100%', border: '1px solid var(--card-border)', borderRadius: 8, outline: 'none',
                        padding: '10px 12px', fontSize: 12, color: 'var(--text-primary)', lineHeight: 1.6,
                        background: '#fff', fontFamily: 'inherit', resize: 'none', boxSizing: 'border-box' }} />
                  </div>
                </div>
              )}
            </div>
            {/* Mobile Deterrence */}
            <div className="rounded-lg" style={{ border: '1px solid var(--card-border)', overflow: 'hidden' }}>
              <div className="flex items-center gap-3 px-4 py-3"
                style={{ borderBottom: mobileOn ? '1px solid var(--card-border)' : 'none' }}>
                <Toggle size="sm" checked={mobileOn} onChange={() => update({ mobile: !mobileOn })} />
                <span className="text-[13px] font-semibold" style={{ color: 'var(--text-primary)' }}>Mobile Deterrence</span>
              </div>
              {mobileOn && (
                <div className="px-4 pt-4 pb-4 flex flex-col gap-4">
                  <div>
                    <div className="text-[12px] font-bold mb-2" style={{ color: 'var(--text-primary)' }}>Enable blur deterrence:</div>
                    {[{ value: 'full', label: 'On full gallery' }, { value: 'lightbox', label: 'On lightbox only' }].map(opt => (
                      <label key={opt.value} className="flex items-center gap-2 mb-2 cursor-pointer">
                        <span className={`radio-dot ${mobileScope === opt.value ? 'is-on' : ''}`} />
                        <input type="radio" className="sr-only" checked={mobileScope === opt.value}
                          onChange={() => update({ mobileScope: opt.value })} />
                        <span className="text-[13px]" style={{ color: 'var(--text-primary)' }}>{opt.label}</span>
                      </label>
                    ))}
                  </div>
                  <div>
                    <div className="text-[12px] font-bold mb-2" style={{ color: 'var(--text-primary)' }}>Select blur type:</div>
                    {[{ value: 'radial', label: 'Radial blur' }, { value: 'diagonal', label: 'Diagonal blur' }, { value: 'vertical', label: 'Vertical blur' }].map(opt => (
                      <label key={opt.value} className="flex items-center gap-2 mb-2 cursor-pointer">
                        <span className={`radio-dot ${mobileBlurType === opt.value ? 'is-on' : ''}`} />
                        <input type="radio" className="sr-only" checked={mobileBlurType === opt.value}
                          onChange={() => update({ mobileBlurType: opt.value })} />
                        <span className="text-[13px]" style={{ color: 'var(--text-primary)' }}>{opt.label}</span>
                      </label>
                    ))}
                  </div>
                  <div>
                    <div className="text-[10px] font-bold tracking-widest mb-2" style={{ color: 'var(--text-tertiary)' }}>MOBILE BLUR PREVIEW</div>
                    <div className="rounded-lg overflow-hidden" style={{ position: 'relative', height: 160, maxWidth: 260 }}>
                      <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(160deg, #7a6245 0%, #b8956a 25%, #e0c9a0 50%, #9b8260 72%, #5e4430 100%)' }} />
                      <div style={{ position: 'absolute', inset: 0, ...blurOverlay[mobileBlurType] }} />
                    </div>
                    <div className="mt-1.5 text-[11px]" style={{ color: 'var(--text-secondary)' }}>
                      {mobileBlurType === 'radial' ? 'Radial' : mobileBlurType === 'diagonal' ? 'Diagonal' : 'Vertical'} Blur Effect
                    </div>
                  </div>
                  <div>
                    <div className="text-[12px] font-bold mb-2" style={{ color: 'var(--text-primary)' }}>Show banner:</div>
                    <label className="flex items-center gap-2 mb-1 cursor-pointer">
                      <span className={`check-box ${mobileBanner ? 'is-on' : ''}`} />
                      <input type="checkbox" className="sr-only" checked={mobileBanner}
                        onChange={e => update({ mobileBanner: e.target.checked })} />
                      <span className="text-[13px] font-medium" style={{ color: 'var(--text-primary)' }}>
                        Banner Message <span style={{ color: 'var(--text-tertiary)', fontWeight: 400 }}>(optional)</span>
                      </span>
                    </label>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }
      return null;
    };

    // ===== Settings panels =====
    // Single-role flat settings (no Set per role, no diff)
    // Children of dependent settings are rendered inline as indented sub-rows directly under
    // the parent setting they belong to.
    const SimpleSettingsBlock = ({ feature, role, perRole, onUpdate }) => {
      const isMobile = useIsMobile();
      const visibleSettings = feature.settings.filter(s => isSettingVisibleForRole(s, role.id, feature.id, perRole, feature.settings));
      const topLevel = visibleSettings.filter(s => !s.dependsOn);
      const childrenOf = (id) => visibleSettings.filter(s => s.dependsOn?.settingId === id);
      // Mirror the per-role behavior: when the single role has the feature off, dim the
      // controls so they read as inactive without removing context.
      const roleEnabled = !!perRole[role.id]?.[feature.id]?.enabled;
      const disabledStyle = roleEnabled ? null : { opacity: 0.5, pointerEvents: 'none' };
      return (
        <div className="multi-panel-body px-8 py-2" style={{ background: 'var(--soft-bg)', borderTop: '1px solid var(--card-border)' }}>
          {topLevel.map((s, i) => {
            const isToggle = s.type === 'toggle';
            const kids = childrenOf(s.id);
            const showDivider = !!s.optional && i !== 0;
            return (
              <div key={s.id}
                style={{
                  borderTop: showDivider ? '1px solid var(--card-border)' : 'none',
                  marginTop: showDivider ? 6 : 0,
                }}>
                <div className="shared-flat-row grid items-center gap-4 mobile-top-row"
                  style={{
                    gridTemplateColumns: '1fr auto',
                    padding: '14px 0',
                    alignItems: isToggle ? 'flex-start' : 'center',
                  }}>
                  <div style={{ opacity: roleEnabled ? 1 : 0.6 }}>
                    <div className="flex items-center text-[13px] font-medium" style={{ color: 'var(--text-primary)' }}>
                      {s.label}{s.tooltip && <InfoTooltip content={s.tooltip} />}
                    </div>
                    {s.meta && (
                      <div className="text-[12px] mt-1 leading-relaxed" style={{ color: 'var(--text-secondary)', whiteSpace: 'pre-line' }}>
                        {s.meta}
                      </div>
                    )}
                  </div>
                  <div className="control-end flex" style={disabledStyle} aria-disabled={!roleEnabled}>
                    <SettingControl s={s} value={perRole[role.id]?.[feature.id]?.values?.[s.id]} onChange={(v) => onUpdate(role.id, s.id, v)} compact />
                  </div>
                </div>
                {kids.map(c => (
                  c.fullWidth ? (
                    <div key={c.id} style={{ borderTop: '1px solid var(--card-border)', padding: '14px 16px', opacity: roleEnabled ? 1 : 0.5 }}>
                      <SettingControl s={c} value={perRole[role.id]?.[feature.id]?.values?.[c.id]} onChange={(v) => onUpdate(role.id, c.id, v)} compact disabled={!roleEnabled} />
                    </div>
                  ) : (isMobile && c.type === 'number') ? (
                    <div key={c.id} style={{ padding: '6px 0 12px 22px', marginTop: -8, opacity: roleEnabled ? 1 : 0.5 }}>
