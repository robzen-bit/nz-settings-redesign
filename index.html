    };

    const CouponAppliesToModal = ({ onClose, onApply }) => {
      const isMobile = useIsMobile();
      // Galleries first (Options section)
      const [galleriesMode, setGalleriesMode] = useState('all');
      const [selectedGalleries, setSelectedGalleries] = useState([]);
      const [showGalleriesPicker, setShowGalleriesPicker] = useState(false);
      // Roles second (Applies To section)
      const [appliesToMode, setAppliesToMode] = useState('all');
      const [selectedRoles, setSelectedRoles] = useState([]);
      const [showRolesPicker, setShowRolesPicker] = useState(false);
      // Conflict warning
      const [galleryWarning, setGalleryWarning] = useState(null);

      // Roles available based on current gallery selection
      const availableRoles = React.useMemo(() => {
        if (galleriesMode === 'all') return COUPON_SAMPLE_ROLES;
        if (selectedGalleries.length === 0) return [];
        const s = new Set();
        selectedGalleries.forEach(g => (GALLERY_ROLES[g] || []).forEach(r => s.add(r)));
        return COUPON_SAMPLE_ROLES.filter(r => s.has(r));
      }, [galleriesMode, selectedGalleries]);

      // Returns selected roles that would be lost given a new gallery list
      const getRolesToLose = (newGalleries) => {
        if (appliesToMode !== 'selected-roles' || selectedRoles.length === 0) return [];
        const s = new Set();
        newGalleries.forEach(g => (GALLERY_ROLES[g] || []).forEach(r => s.add(r)));
        return selectedRoles.filter(r => !s.has(r));
      };

      // Run onProceed immediately if no conflict; otherwise show warning first
      const withConflictCheck = (newGalleries, onProceed, buildMessage) => {
        const rolesToLose = getRolesToLose(newGalleries);
        if (rolesToLose.length === 0) { onProceed(); return; }
        setGalleryWarning({
          message: buildMessage(rolesToLose),
          onConfirm: () => {
            const s = new Set();
            newGalleries.forEach(g => (GALLERY_ROLES[g] || []).forEach(r => s.add(r)));
            setSelectedRoles(prev => prev.filter(r => s.has(r)));
            onProceed();
            setGalleryWarning(null);
          },
        });
      };

      const handleGalleriesModeChange = (mode) => {
        if (mode === galleriesMode) return;
        if (mode === 'selected' && appliesToMode === 'selected-roles' && selectedRoles.length > 0) {
          const rolesToLose = selectedGalleries.length > 0 ? getRolesToLose(selectedGalleries) : [];
          const msg = rolesToLose.length > 0
            ? `Switching to "Selected Galleries Only" will remove ${rolesToLose.length} selected role${rolesToLose.length > 1 ? 's' : ''} not available in your current galleries: ${rolesToLose.join(', ')}.`
            : `Switching to "Selected Galleries Only" means role availability will be limited to your selected galleries. Your selected role${selectedRoles.length > 1 ? 's' : ''} (${selectedRoles.join(', ')}) may be affected as you add or remove galleries.`;
          setGalleryWarning({
            message: msg,
            onConfirm: () => {
              if (rolesToLose.length > 0) {
                const s = new Set();
                selectedGalleries.forEach(g => (GALLERY_ROLES[g] || []).forEach(r => s.add(r)));
                setSelectedRoles(prev => prev.filter(r => s.has(r)));
              }
              setGalleriesMode(mode);
              setGalleryWarning(null);
            },
          });
        } else {
          setGalleriesMode(mode);
        }
      };

      const handleRemoveGallery = (g) => {
        const newGalleries = selectedGalleries.filter(x => x !== g);
        withConflictCheck(
          newGalleries,
          () => setSelectedGalleries(newGalleries),
          roles => `Removing "${g}" will also remove ${roles.length} selected role${roles.length > 1 ? 's' : ''} only available through this gallery: ${roles.join(', ')}.`
        );
      };

      const handleGalleriesSelect = (gals) => {
        withConflictCheck(
          gals,
          () => { setSelectedGalleries(gals); setShowGalleriesPicker(false); },
          roles => `This gallery selection removes access to ${roles.length} currently selected role${roles.length > 1 ? 's' : ''}: ${roles.join(', ')}.`
        );
        // close picker even when warning is shown; it re-opens if user cancels warning
        if (getRolesToLose(gals).length > 0) setShowGalleriesPicker(false);
      };

      const removeRole = r => setSelectedRoles(p => p.filter(x => x !== r));

      const hasRightCol = !isMobile && (galleriesMode === 'selected' || appliesToMode === 'selected-roles');

      const listBox = { border: '1px solid var(--card-border)', borderRadius: 6, overflow: 'hidden', maxHeight: 205, overflowY: 'auto', minHeight: 38 };
      const addBtn = { display: 'flex', alignItems: 'center', gap: 6, marginBottom: 8, padding: '6px 14px', borderRadius: 9999, background: 'var(--brand)', border: 'none', cursor: 'pointer', color: '#fff', fontSize: 13, fontWeight: 600 };
      const removeCircle = { background: 'none', border: '1.5px solid var(--line)', borderRadius: '50%', width: 20, height: 20, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', color: 'var(--text-secondary)', fontSize: 14, lineHeight: 1, padding: 0 };
      const listRow = { display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '7px 12px', borderBottom: '1px solid var(--card-border)' };

      const GalleriesList = () => (
        <div style={listBox}>
          {selectedGalleries.length === 0
            ? <div style={{ fontSize: 13, color: 'var(--text-tertiary)', padding: '10px 12px' }}>No galleries selected</div>
            : selectedGalleries.map(g => (
              <div key={g} style={listRow}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" strokeWidth="2"><rect x="3" y="8" width="18" height="13" rx="2"/><path d="M1 8l3-5h16l3 5"/></svg>
                  <span style={{ fontSize: 13, color: 'var(--text-primary)' }}>{g}</span>
                </div>
                <button onClick={() => handleRemoveGallery(g)} style={removeCircle}>−</button>
              </div>
            ))
          }
        </div>
      );

      const RolesList = () => (
        <div style={listBox}>
          {selectedRoles.length === 0
            ? <div style={{ fontSize: 13, color: 'var(--text-tertiary)', padding: '10px 12px' }}>No roles selected</div>
            : selectedRoles.map(r => (
              <div key={r} style={listRow}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" strokeWidth="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                  <span style={{ fontSize: 13, color: 'var(--text-primary)' }}>{r}</span>
                </div>
                <button onClick={() => removeRole(r)} style={removeCircle}>−</button>
              </div>
            ))
          }
        </div>
      );

      return (
        <>
          <MobileSheetModal onClose={onClose} zIndex={160} maxWidth={680}>
            <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '14px 24px', borderBottom: '1px solid var(--card-border)', flexShrink: 0 }}>
                <div style={{ width: 24 }} />
                <span style={{ fontSize: 15, fontWeight: 700, letterSpacing: '0.06em', color: 'var(--text-primary)' }}>APPLIES TO</span>
                <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 20, color: 'var(--text-secondary)', lineHeight: 1, width: 24 }}>×</button>
              </div>
              <div style={{ flex: 1, overflowY: 'auto', minHeight: 0, padding: '20px 24px' }}>
                <div style={{ display: 'grid', gridTemplateColumns: hasRightCol ? '1fr 1fr' : '1fr', columnGap: 24, alignItems: 'start' }}>

                  {/* ── Row 1 Col A: Options (galleries) ── */}
                  <div style={{ paddingBottom: 16 }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text-primary)', marginBottom: 10 }}>Options</div>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 6 }}>
                      <RadioBtn checked={galleriesMode === 'all'} onChange={() => handleGalleriesModeChange('all')} label="All Galleries" />
                      <RadioBtn checked={galleriesMode === 'selected'} onChange={() => handleGalleriesModeChange('selected')} label="Selected Galleries Only" />
                    </div>
                    {isMobile && galleriesMode === 'selected' && (
                      <div style={{ marginTop: 12, marginBottom: 4 }}>
                        <button onClick={() => setShowGalleriesPicker(true)} style={addBtn}>
                          <span style={{ fontSize: 17, lineHeight: 1, fontWeight: 300 }}>+</span> Galleries
                        </button>
                        <GalleriesList />
                      </div>
                    )}
                    <p style={{ fontSize: 12, color: 'var(--text-secondary)', marginTop: 8, lineHeight: 1.5 }}>Apply coupon to all galleries, or restrict to specific galleries only.</p>
                  </div>

                  {/* ── Row 1 Col B: Selected Galleries ── */}
                  {hasRightCol && (
                    <div style={{ paddingBottom: 16 }}>
                      {galleriesMode === 'selected' && (
                        <>
                          <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text-primary)', marginBottom: 8 }}>Selected Galleries</div>
                          <button onClick={() => setShowGalleriesPicker(true)} style={addBtn}>
                            <span style={{ fontSize: 17, lineHeight: 1, fontWeight: 300 }}>+</span> Galleries
                          </button>
                          <GalleriesList />
                        </>
                      )}
                    </div>
                  )}

                  {/* ── Divider spanning both columns ── */}
                  <div style={{ gridColumn: '1 / -1', borderTop: '1px solid var(--card-border)', marginBottom: 16 }} />

                  {/* ── Row 2 Col A: Applies to (roles) ── */}
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text-primary)', marginBottom: 10 }}>Applies to</div>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 6 }}>
                      <RadioBtn checked={appliesToMode === 'all'} onChange={() => setAppliesToMode('all')} label="All Contacts and Roles" />
                      <RadioBtn checked={appliesToMode === 'selected-roles'} onChange={() => setAppliesToMode('selected-roles')} label="Selected Roles Only" />
                    </div>
                    {isMobile && appliesToMode === 'selected-roles' && (
                      <div style={{ marginTop: 12, marginBottom: 4 }}>
                        <button onClick={() => setShowRolesPicker(true)} style={addBtn}>
                          <span style={{ fontSize: 17, lineHeight: 1, fontWeight: 300 }}>+</span> Roles
                        </button>
                        <RolesList />
                      </div>
                    )}
                    <p style={{ fontSize: 12, color: 'var(--text-secondary)', marginTop: 8, lineHeight: 1.5 }}>
                      {appliesToMode === 'all'
                        ? 'Coupon applies to all contacts and roles regardless of gallery assignment.'
                        : 'Only contacts with the selected roles can use this coupon.'}
                    </p>
                  </div>

                  {/* ── Row 2 Col B: Selected Roles ── */}
                  {hasRightCol && (
                    <div>
                      {appliesToMode === 'selected-roles' && (
                        <>
                          <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text-primary)', marginBottom: 8 }}>
                            Selected Roles
                            {galleriesMode === 'selected' && availableRoles.length < COUPON_SAMPLE_ROLES.length && (
                              <span style={{ fontSize: 11, fontWeight: 400, color: 'var(--text-secondary)', marginLeft: 6 }}>({availableRoles.length} available from selected galleries)</span>
                            )}
                          </div>
                          <button onClick={() => setShowRolesPicker(true)} style={addBtn}>
                            <span style={{ fontSize: 17, lineHeight: 1, fontWeight: 300 }}>+</span> Roles
                          </button>
                          <RolesList />
                        </>
                      )}
                    </div>
                  )}

                </div>
              </div>
              <div style={{ padding: '12px 24px', borderTop: '1px solid var(--card-border)', background: '#fff', flexShrink: 0 }}>
                {(() => {
                  const disabled =
                    (galleriesMode === 'selected' && selectedGalleries.length === 0) ||
                    (appliesToMode === 'selected-roles' && selectedRoles.length === 0);
                  return (
                    <button
                      disabled={disabled}
                      onClick={() => !disabled && onApply({ appliesToMode, selectedRoles, galleriesMode, selectedGalleries })}
                      style={{ width: '100%', padding: '11px 0', borderRadius: 9999, background: disabled ? 'var(--line)' : 'var(--brand)', color: '#fff', fontSize: 14, fontWeight: 700, border: 'none', cursor: disabled ? 'not-allowed' : 'pointer', opacity: disabled ? 0.6 : 1 }}>
                      Apply
                    </button>
                  );
                })()}
              </div>
            </div>
          </MobileSheetModal>

          {showRolesPicker && (
            <RolesPickerModal
              onClose={() => setShowRolesPicker(false)}
              currentRoles={selectedRoles}
              roles={availableRoles}
              onSelect={r => { setSelectedRoles(r); setShowRolesPicker(false); }}
            />
          )}
          {showGalleriesPicker && (
            <GalleriesPickerModal
              onClose={() => setShowGalleriesPicker(false)}
              currentGalleries={selectedGalleries}
              onSelect={handleGalleriesSelect}
            />
          )}

          {/* ── Gallery/role conflict warning ── */}
          {galleryWarning && (
            isMobile ? (
              <MobileSheetModal onClose={() => setGalleryWarning(null)} zIndex={400}>
                <div style={{ padding: '8px 20px 0' }}>
                  <div style={{ textAlign: 'center', fontSize: 15, fontWeight: 700, color: 'var(--text-primary)', marginBottom: 12 }}>Gallery Dependency</div>
                  <p style={{ fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.6, marginBottom: 8 }}>{galleryWarning.message}</p>
                </div>
                <div style={{ display: 'flex', gap: 12, padding: '8px 20px 20px' }}>
                  <button onClick={() => setGalleryWarning(null)}
                    style={{ flex: 1, padding: '12px', borderRadius: 9999, border: '1px solid var(--card-border)', background: '#fff', fontSize: 14, fontWeight: 600, cursor: 'pointer', color: 'var(--text-primary)' }}>
                    Cancel
                  </button>
                  <button onClick={galleryWarning.onConfirm}
                    style={{ flex: 1, padding: '12px', borderRadius: 9999, border: 'none', background: '#e03f3f', color: '#fff', fontSize: 14, fontWeight: 700, cursor: 'pointer' }}>
                    Confirm
                  </button>
                </div>
              </MobileSheetModal>
            ) : (
              <div style={{ position: 'fixed', inset: 0, zIndex: 400, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'rgba(27,28,31,0.55)', padding: '0 24px' }}>
                <div style={{ background: '#fff', borderRadius: 12, padding: '24px', maxWidth: 400, width: '100%', boxShadow: '0 8px 32px rgba(0,0,0,0.2)' }}>
                  <div style={{ fontSize: 15, fontWeight: 700, color: 'var(--text-primary)', marginBottom: 8 }}>Gallery Dependency</div>
                  <p style={{ fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.6, marginBottom: 20 }}>{galleryWarning.message}</p>
                  <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
                    <button onClick={() => setGalleryWarning(null)}
                      style={{ padding: '8px 18px', borderRadius: 9999, border: '1px solid var(--card-border)', background: '#fff', fontSize: 13, fontWeight: 600, cursor: 'pointer', color: 'var(--text-primary)' }}>
                      Cancel
                    </button>
                    <button onClick={galleryWarning.onConfirm}
                      style={{ padding: '8px 20px', borderRadius: 9999, border: 'none', background: '#e03f3f', color: '#fff', fontSize: 13, fontWeight: 700, cursor: 'pointer' }}>
                      Confirm
                    </button>
                  </div>
                </div>
              </div>
            )
          )}
        </>
      );
    };

    const CreateCouponModal = ({ onClose }) => {
      const [step, setStep] = useState('discount');
      const [discountType, setDiscountType] = useState('% OFF');

      const [useLimit, setUseLimit] = useState('');
      const [limitProducts, setLimitProducts] = useState(false);
      const [limitPackages, setLimitPackages] = useState(false);
      const genCode = () => {

        setCouponCode(Array.from({ length: 8 }, () => c[Math.floor(Math.random() * c.length)]).join(''));
      };
      if (step === 'applies-to') return <CouponAppliesToModal onClose={onClose} onApply={() => onClose()} />;
      return (
        <MobileSheetModal onClose={onClose} zIndex={150} maxWidth={700}>
          <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '14px 24px', borderBottom: '1px solid var(--card-border)', flexShrink: 0 }}>
              <div style={{ width: 24 }} />
              <span style={{ fontSize: 15, fontWeight: 700, letterSpacing: '0.06em', color: 'var(--text-primary)' }}>DISCOUNT TYPE</span>
              <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 20, color: 'var(--text-secondary)', lineHeight: 1, width: 24 }}>×</button>
            </div>
            <div style={{ flex: 1, overflowY: 'auto', minHeight: 0, padding: '20px 24px' }}>
              {/* Top row */}
              <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr 1.4fr', gap: 12, marginBottom: 18 }}>

                  <label style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-secondary)', display: 'block', marginBottom: 5 }}>Discount Type</label>

    function App() {
      const [simulateMobile, setSimulateMobile] = useState(false);
      // useIsMobile() can't read this component's own context, so OR simulateMobile directly
      const isMobile = useIsMobile() || simulateMobile;
      // true only on a real mobile device (not the desktop simulator toggle)
      const realMobile = isMobile && !simulateMobile;
      const [roles, setRoles] = useState([{ id: 'everyone', name: 'General', removable: false }]);
      const [perRole, setPerRole] = useState({ everyone: buildEveryoneState() });
      const [features, setFeatures] = useState(initialFeatures);
      const [openFeatures, setOpenFeatures] = useState(new Set());
      const [showModal, setShowModal] = useState(false);
      const [contactRoleId, setContactRoleId] = useState(null);
      const [openMenuRoleId, setOpenMenuRoleId] = useState(null);
      const [renamingRoleId, setRenamingRoleId] = useState(null);
      const [mobileRenameRoleId, setMobileRenameRoleId] = useState(null);
      const [toast, setToast] = useState(null);
      const [contacts, setContacts] = useState([]);
      const [activeSection, setActiveSection] = useState('features'); // 'access' | 'features' | 'contacts'
      const [activeMainTab, setActiveMainTab] = useState('Settings');
      const [photoOverrides, setPhotoOverrides] = useState(INITIAL_PHOTO_OVERRIDES);
      const [permModalPhotoId, setPermModalPhotoId] = useState(null);
      const [mobileEditFeatureId, setMobileEditFeatureId] = useState(null);
      // Compare-All modal (v4 — opt-in scanning view). Single boolean that opens an
      // almost-full-screen matrix showing every feature × every role at once.
      const [compareAllOpen, setCompareAllOpen] = useState(false);
      const [viewMode, setViewMode] = useState('basic');
      const [modeMenuOpen, setModeMenuOpen] = useState(false);
      const roleHeaderWidth = useMemo(() => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        ctx.font = 'bold 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
        const LETTER_SPACING_EM = 0.05;
        const FONT_SIZE = 11;
        const OVERHEAD = 34; // btn px-1 (8) + gap-1 (4) + kebab p-1+icon (22)
        let max = 120;
        roles.forEach(r => {
          const count = contacts.filter(c => c.roleId === r.id).length;
          const label = r.name.toUpperCase() + ' (' + count + ')';
          const textW = ctx.measureText(label).width + label.length * LETTER_SPACING_EM * FONT_SIZE;
          const needed = Math.ceil(textW) + OVERHEAD;
          if (needed > max) max = needed;
        });
        return Math.min(140, max);
      }, [roles, contacts]);
      useEffect(() => {
        document.documentElement.style.setProperty('--role-header-max-w', roleHeaderWidth + 'px');
      }, [roleHeaderWidth]);
      const [showPlansModal, setShowPlansModal] = useState(false);
      // Access tab — gallery-wide access mode + a couple of toggles. Defaults to public.
      const [accessMode, setAccessMode] = useState('public');
      const [showGalleryRegistration, setShowGalleryRegistration] = useState(false);
      const [accessFeeEnabled, setAccessFeeEnabled] = useState(false);
      const [accessFeeAmount, setAccessFeeAmount] = useState('0.00');
      const [accessFeeRole, setAccessFeeRole] = useState('everyone');
      const [feeBypassRoles, setFeeBypassRoles] = useState([]);
      const [collectEmailEnabled, setCollectEmailEnabled] = useState(false);
      const [collectEmailOptional, setCollectEmailOptional] = useState(false);
      const [customFormEnabled, setCustomFormEnabled] = useState(false);
      const [customFormOptional, setCustomFormOptional] = useState(false);
      const [showEditCustomForm, setShowEditCustomForm] = useState(false);
      const [allowSearchResults, setAllowSearchResults] = useState(false);
      const [activeView, setActiveView] = useState('gallery');

      const addContact = (c) => {
        const id = `contact-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`;
        setContacts(prev => [...prev, { id, ...c }]);
        const role = roles.find(r => r.id === c.roleId);
        showToast(`${c.first || c.email} added${role ? ' as ' + role.name : ''}`);
      };
      const removeContact = (id) => setContacts(prev => prev.filter(c => c.id !== id));
      const clearContacts = () => setContacts([]);

      // Click-outside-to-close for the desktop kebab dropdown only.
      // Mobile uses a bottom-sheet whose backdrop handles closing, and a document-level
      // click listener would race with the open-pill click and immediately re-close it.
      useEffect(() => {
        if (!openMenuRoleId || isMobile) return;
        const handler = () => setOpenMenuRoleId(null);
        document.addEventListener('click', handler);
        return () => document.removeEventListener('click', handler);
      }, [openMenuRoleId, isMobile]);

      useEffect(() => {
        if (!modeMenuOpen) return;
        const handler = () => setModeMenuOpen(false);
        document.addEventListener('click', handler);
        return () => document.removeEventListener('click', handler);
      }, [modeMenuOpen]);

      const selectPlan = (plan) => {
        setViewMode(plan);
        setShowPlansModal(false);
        showToast(`Plan updated to ${plan.charAt(0).toUpperCase() + plan.slice(1)}`);
      };

      const showToast = (msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 2500);
      };

      // Matrix sizing: a fixed-width feature column that never squishes, and consistent
      // role cells. When the total width exceeds the viewport (advanced setups with many
      // roles), the matrix scrolls horizontally inside its container.
      const FEATURE_MIN_WIDTH = 360;
      const gridCols = useMemo(
        () => `minmax(${FEATURE_MIN_WIDTH}px, 1fr) repeat(${roles.length}, ${roleHeaderWidth}px)`,
        [roles.length, roleHeaderWidth]
      );
      const matrixMinWidth = FEATURE_MIN_WIDTH + roles.length * roleHeaderWidth;

      const addRole = (presetId, customName, contact, perRoleState) => {
        const preset = PRESETS[presetId];
        const id = `role-${Date.now()}`;
        const name = customName || preset.name;
        setRoles([...roles, { id, name, removable: true, isCustom: presetId === 'custom' }]);
        setPerRole({ ...perRole, [id]: perRoleState ? JSON.parse(JSON.stringify(perRoleState)) : buildRoleState(presetId) });
        setShowModal(false);
        if (contact && contact.email) {
          const cid = `contact-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`;
          setContacts(prev => [...prev, {
            id: cid,
            first: contact.firstName || '',
            last: contact.lastName || '',
            email: contact.email,
            mobile: contact.mobile || '',
            roleId: id,
          }]);
          showToast(`"${name}" role created and ${contact.firstName || contact.email} added to Contacts`);
        } else {
          showToast(`"${name}" role created`);
        }
      };

      const PRESET_SAVED_ROLE_NAMES = [
        'Immediate Family Members',
        'Senior Portrait Clients',
        'VIP Wedding Party Members',
        'Exclusive Preview Access',
        'Extended Family and Friends',
        'Contracted Event Attendees',
        'Private Collection Viewers',
        'Licensed Media Recipients',
        'Corporate Client Delegates',
        'Authenticated Press Members',
      ];
      const [savedRoles, setSavedRoles] = useState([]);
      useEffect(() => {
        setSavedRoles(prev => {
          const isElevated = viewMode === 'professional' || viewMode === 'advanced';
          const hasPresets = prev.some(r => r.id.startsWith('preset-saved-'));
          if (isElevated && !hasPresets) {
            const presets = PRESET_SAVED_ROLE_NAMES.map((name, i) => ({ id: `preset-saved-${i}`, name, enabledFeatures: [], perRoleState: {} }));
            return [...presets, ...prev];
          }
          if (!isElevated) {
            return prev.filter(r => !r.id.startsWith('preset-saved-'));
          }
          return prev;
        });
      }, [viewMode]);

      const saveRoleForLater = (roleId) => {
        const r = roles.find(x => x.id === roleId);
        if (!r) return;
        if (r.isCustom) {
          if (savedRoles.some(s => s.name.toLowerCase() === r.name.toLowerCase())) {
            showToast(`"${r.name}" is already saved`);
          } else {
            const enabledFeatures = features
              .filter(f => !f.appliesToAll && perRole[r.id]?.[f.id]?.enabled)
              .map(f => f.name);
            const perRoleState = JSON.parse(JSON.stringify(perRole[r.id] || {}));
            setSavedRoles(prev => [...prev, { id: `saved-${Date.now()}`, name: r.name, enabledFeatures, perRoleState }]);
            showToast(`"${r.name}" saved for later use`);
          }
        } else {
          showToast(`"${r.name}" is a built-in role and can always be added`);
        }
      };

      // Bulk-add multiple roles at once (from multi-select in Add Role modal).
      const addRoles = (selections) => {
        const newRoles = [];
        const newPerRole = {};
        selections.forEach((s, i) => {
          const id = `role-${Date.now()}-${i}`;
          const name = s.customName || PRESETS[s.presetId].name;
          newRoles.push({ id, name, removable: true, isCustom: s.presetId === 'custom' });
          newPerRole[id] = s.perRoleState ? JSON.parse(JSON.stringify(s.perRoleState)) : buildRoleState(s.presetId);
        });
        setRoles(prev => [...prev, ...newRoles]);
        setPerRole(prev => ({ ...prev, ...newPerRole }));
        setShowModal(false);
        showToast(newRoles.length === 1
          ? `"${newRoles[0].name}" role added`
          : `${newRoles.length} roles added`);
      };

      // Remove entries from the saved-for-later list.
      const deleteSavedRoles = (ids) => {
        setSavedRoles(prev => prev.filter(r => !ids.includes(r.id)));
      };

      // Batch-create roles that don't yet exist in the gallery (used by ImportCSVModal).
      // roleDefs: Array<{ id, name, presetId, perRoleState? }>
      const ensureRoles = (roleDefs) => {
        if (!roleDefs || !roleDefs.length) return;
        setRoles(prev => {
          const existingIds = new Set(prev.map(r => r.id));
          const toAdd = roleDefs.filter(d => !existingIds.has(d.id));
          return toAdd.length ? [...prev, ...toAdd.map(d => ({ id: d.id, name: d.name, removable: true, isCustom: true }))] : prev;
        });
        setPerRole(prev => {
          const next = { ...prev };
          roleDefs.forEach(d => {
            if (!next[d.id]) next[d.id] = d.perRoleState ? JSON.parse(JSON.stringify(d.perRoleState)) : buildRoleState(d.presetId || 'custom');
          });
          return next;
        });
      };

      const [removeConfirm, setRemoveConfirm] = useState(null); // roleId pending confirmation
      const [presetConfirm, setPresetConfirm] = useState(null); // { roleNames, presetName, rolesToRemove, rolesToAddOrUpdate }

      const applyPreset = (roleNames, presetName) => {
        const generalRole = roles.find(r => r.id === 'everyone');
        const presetStates = PRESET_ROLE_STATES[presetName]?.[viewMode] || {};
        const generalState = presetStates['General'] ? presetStates['General'] : perRole['everyone'];
        const newRoles = [generalRole];
        const newPerRole = { everyone: generalState };
        roleNames.forEach((name, i) => {
          const id = `role-preset-${Date.now()}-${i}`;
          newRoles.push({ id, name, removable: true, isCustom: false });
          newPerRole[id] = presetStates[name]
            ? JSON.parse(JSON.stringify(presetStates[name]))
            : buildRoleState('client');
        });
        // Reassign contacts from removed roles to General (AC 3a)
        const removedIds = roles.filter(r => r.id !== 'everyone' && !roleNames.includes(r.name)).map(r => r.id);
        if (removedIds.length > 0) {
          setContacts(prev => prev.map(c => removedIds.includes(c.roleId) ? { ...c, roleId: 'everyone' } : c));
        }
        setRoles(newRoles);
        setPerRole(newPerRole);
        showToast(`"${presetName}" preset applied`);
      };

      const removeRole = (roleId) => {
        if (roles.length <= 1) return;
        const removed = roles.find(r => r.id === roleId);
        setRoles(roles.filter(r => r.id !== roleId));
        const next = { ...perRole }; delete next[roleId]; setPerRole(next);
        setContacts(prev => prev.map(c => c.roleId === roleId ? { ...c, roleId: 'everyone' } : c));
        if (removed) showToast(`"${removed.name}" removed`);
      };

      const requestRemoveRole = (roleId) => {
        const affected = contacts.filter(c => c.roleId === roleId).length;
        if (affected === 0) {
          removeRole(roleId);
        } else {
          setRemoveConfirm(roleId);
        }
      };

      const renameRole = (roleId, newName) => {
        const trimmed = (newName || '').trim();
        if (!trimmed) { setRenamingRoleId(null); return; }
        if (roles.some(r => r.id !== roleId && r.name.toLowerCase() === trimmed.toLowerCase())) {
          showToast(`A role named "${trimmed}" already exists`);
          setRenamingRoleId(null);
          return;
        }
        setRoles(roles.map(r => r.id === roleId ? { ...r, name: trimmed } : r));
        setRenamingRoleId(null);
      };

      const duplicateRole = (roleId) => {
        const source = roles.find(r => r.id === roleId);
        if (!source) return;
        let newName = `${source.name} (copy)`;
        let counter = 2;
        while (roles.some(r => r.name.toLowerCase() === newName.toLowerCase())) {
          newName = `${source.name} (copy ${counter})`;
          counter++;
        }
        const newId = `role-${Date.now()}`;
        const cloneState = JSON.parse(JSON.stringify(perRole[roleId]));
        setRoles([...roles, { id: newId, name: newName, removable: true, isCustom: !!source.isCustom }]);
        setPerRole({ ...perRole, [newId]: cloneState });
      };

      const toggleEnabled = (featureId, roleId) => {
        // Screenshot Protection: turning ON auto-enables both desktop + mobile deterrence.
        if (featureId === 'screenshot-protection') {
          const wasEnabled = !!perRole[roleId]?.['screenshot-protection']?.enabled;
          if (!wasEnabled) {
            const currentConfig = perRole[roleId]?.['screenshot-protection']?.values?.['screenshot-config'] || {};
            const featureDef = features.find(f => f.id === 'screenshot-protection');
            const defConfig = featureDef?.settings[0]?.def || {};
            const newConfig = { ...defConfig, ...currentConfig, desktop: true, mobile: true };
            setPerRole({
              ...perRole,
              [roleId]: {
                ...perRole[roleId],
                ['screenshot-protection']: { enabled: true, values: { 'screenshot-config': newConfig } },
              },
            });
            setOpenFeatures(prev => { if (prev.has(featureId)) return prev; const s = new Set(prev); s.add(featureId); return s; });
          } else {
            setPerRole({ ...perRole, [roleId]: { ...perRole[roleId], ['screenshot-protection']: { ...perRole[roleId]['screenshot-protection'], enabled: false } } });
          }
          return;
        }
        const wasEnabled = !!perRole[roleId]?.[featureId]?.enabled;
        setPerRole({
          ...perRole,
          [roleId]: {
            ...perRole[roleId],
            [featureId]: { ...perRole[roleId][featureId], enabled: !wasEnabled },
          },
        });
        if (!wasEnabled) {
          const feature = features.find(f => f.id === featureId);
          if (feature && feature.settings && feature.settings.length > 0) {
            setOpenFeatures(prev => {
              if (prev.has(featureId)) return prev;
              const next = new Set(prev);
              next.add(featureId);
              return next;
            });
          }
        }
      };

      const updateValue = (featureId, roleId, settingId, value) => {
        setPerRole({
          ...perRole,
          [roleId]: {
            ...perRole[roleId],
            [featureId]: {
              ...perRole[roleId][featureId],
              values: { ...perRole[roleId][featureId].values, [settingId]: value },
            },
          },
        });
      };

      const updateSharedValue = (featureId, settingId, value) => {
        const next = {};
        Object.keys(perRole).forEach(roleId => {
          next[roleId] = {
            ...perRole[roleId],
            [featureId]: {
              ...perRole[roleId][featureId],
              values: { ...perRole[roleId][featureId].values, [settingId]: value },
            },
          };
        });
        setPerRole(next);
      };

      const toggleOpen = (fId) => {
        // Multiple feature accordions can be open simultaneously. Toggle just the
        // clicked one without affecting others.
        setOpenFeatures(prev => {
          const next = new Set(prev);
          if (next.has(fId)) next.delete(fId); else next.add(fId);
          return next;
        });
      };
      const setFeatureOpen = (fId, open) => {
        setOpenFeatures(prev => {
          const next = new Set(prev);
          if (open) next.add(fId); else next.delete(fId);
          return next;
        });
      };

      const existingNames = roles.map(r => r.name.toLowerCase());
      const isMultiRole = roles.length > 1;

      const _mV = showEditCustomForm ? (
              <EditCustomFormView onBack={() => setShowEditCustomForm(false)} accessFeeEnabled={accessFeeEnabled} accessFeeRole={accessFeeRole} roles={roles} savedRoles={savedRoles} viewMode={viewMode} />
            ) : activeView === 'volume-workflow' ? (
              <VolumeWizardModal onClose={() => setActiveView('gallery')} savedRoles={savedRoles} viewMode={viewMode} />
            ) : activeView === 'qr-code-workflow' ? (
              <QRCodeWorkflowModal onClose={() => setActiveView('gallery')} savedRoles={savedRoles} viewMode={viewMode} />
            ) : activeView === 'selling' ? (
              <SellingView />
            ) : activeView === 'booking' ? (
              <BookingView onBack={() => setActiveView('gallery')} viewMode={viewMode} savedRoles={savedRoles} />
            ) : (
            <div className={`flex-1 flex flex-col bg-white${isMobile ? '' : ' border-l'}`} style={{ borderColor: 'var(--card-border)' }}>
              <GalleryHeader />
              <Tabs activeTab={activeMainTab} onTabChange={setActiveMainTab} />
              {isMobile && <MobileBottomBar />}
              {activeMainTab === 'Organize' ? (
                <OrganizeGrid
                  photos={FAKE_PHOTOS}
                  photoOverrides={photoOverrides}
                  roles={roles}
                  onOpenPermissions={(photoId) => setPermModalPhotoId(photoId)}
                />
              ) : (
              <div className="layout-pane flex flex-1" style={{ background: '#fff', paddingBottom: isMobile ? 140 : 0 }}>
                <InnerSidebar features={features} roles={roles} perRole={perRole}
                  activeSection={activeSection} onSelectSection={setActiveSection}
                  contacts={contacts} accessMode={accessMode} />
                {activeSection === 'contacts' ? (
                  <ContactsView contacts={contacts} roles={roles} viewMode={viewMode}
                    savedRoles={savedRoles} onEnsureRoles={ensureRoles}
                    onAdd={addContact} onRemoveContact={removeContact} onOverwrite={clearContacts}
                    activeSection={activeSection} onSelectSection={setActiveSection}
                    onAddRole={() => setShowModal(true)} />
                ) : activeSection === 'presets' ? (
                  <PresetsView
                    activeSection={activeSection} onSelectSection={setActiveSection}
                    viewMode={viewMode} contactsCount={contacts.length}
                    onApplyPreset={(roleNames, presetName) => {
                      const currentCustomRoles = roles.filter(r => r.id !== 'everyone');
                      const rolesToRemove = currentCustomRoles
                        .filter(r => !roleNames.includes(r.name))
                        .map(r => r.name);
                      const currentRoleNames = new Set(roles.map(r => r.name));
                      // AC 4d: General is never listed — only classify non-General preset roles
                      const rolesToAdd    = roleNames.filter(n => !currentRoleNames.has(n));
                      const rolesToUpdate = roleNames.filter(n => currentRoleNames.has(n));
                      // AC 5b: skip modal when only General base settings change
                      if (rolesToAdd.length === 0 && rolesToUpdate.length === 0 && rolesToRemove.length === 0) {
                        applyPreset(roleNames, presetName);
                        return;
                      }
                      setPresetConfirm({ roleNames, presetName, rolesToRemove, rolesToAdd, rolesToUpdate });
                    }}
                  />
                ) : activeSection === 'store' ? (
                  <main className="main-pane flex-1 px-6 pt-6 pb-12" style={{ maxWidth: 920 }}>
                    <MobileSectionNav activeSection={activeSection} onSelectSection={setActiveSection} contactsCount={contacts.length} />
                    <header className="gallery-features-header mb-5">
                      <h1 className="features-header-h1 text-[18px] font-extrabold tracking-tight uppercase" style={{ color: 'var(--brand)', letterSpacing: '0.02em' }}>Store</h1>
                      <p className="text-[13px] mt-1" style={{ color: 'var(--text-secondary)' }}>Manage your gallery store settings.</p>
                    </header>
                    <div className="flex flex-col gap-3">
                      <div className="bg-white rounded-xl border px-4 py-4 flex items-center justify-between"
                        style={{ borderColor: 'var(--card-border)' }}>
                        <span className="text-[13px] font-semibold" style={{ color: 'var(--text-primary)' }}>Price List</span>
                        <span className="text-[12px]" style={{ color: 'var(--text-tertiary)' }}>None</span>
                      </div>
                    </div>
                  </main>
                ) : activeSection === 'access' ? (
                  <AccessSection
                    mode={accessMode} onSelectMode={setAccessMode}
                    showRegistration={showGalleryRegistration} onToggleRegistration={() => { const next = !showGalleryRegistration; setShowGalleryRegistration(next); if (next) setCollectEmailEnabled(true); }}
                    accessFeeEnabled={accessFeeEnabled} onToggleAccessFee={() => setAccessFeeEnabled(v => !v)}
                    accessFeeAmount={accessFeeAmount} onChangeAccessFeeAmount={setAccessFeeAmount}
                    accessFeeRole={accessFeeRole} onChangeAccessFeeRole={setAccessFeeRole}
                    feeBypassRoles={feeBypassRoles} onChangeFeeBypassRoles={setFeeBypassRoles}
                    roles={roles} savedRoles={savedRoles} viewMode={viewMode}
                    collectEmailEnabled={collectEmailEnabled} onToggleCollectEmail={() => { setCollectEmailEnabled(true); setCustomFormEnabled(false); }}
                    collectEmailOptional={collectEmailOptional} onToggleCollectEmailOptional={() => setCollectEmailOptional(v => !v)}
                    customFormEnabled={customFormEnabled} onToggleCustomForm={() => { setCustomFormEnabled(true); setCollectEmailEnabled(false); }}
                    customFormOptional={customFormOptional} onToggleCustomFormOptional={() => setCustomFormOptional(v => !v)}
                    onEditCustomForm={() => setShowEditCustomForm(true)}
                    allowSearch={allowSearchResults} onToggleSearch={() => setAllowSearchResults(v => !v)}
                    activeSection={activeSection} onSelectSection={setActiveSection}
                    contactsCount={contacts.length} />
                ) : (
                <main className="main-pane flex-1 px-6 pt-6 pb-12" style={{ maxWidth: 1150 }}>
                  <MobileSectionNav activeSection={activeSection}
                    onSelectSection={setActiveSection} contactsCount={contacts.length} />
                  <header className="gallery-features-header mb-4 flex items-start justify-between gap-4">
                    <div>
                      <h1 className="features-header-h1 text-[18px] font-extrabold tracking-tight uppercase" style={{ color: 'var(--brand)', letterSpacing: '0.02em' }}>Gallery Features</h1>
                      <p className="gallery-features-desc text-[13px] mt-1" style={{ color: 'var(--text-secondary)' }}>Control the social features options for this gallery.</p>
                    </div>
                    <div className="flex items-center gap-2">
                      {roles.length > 1 && (
                        <button onClick={() => setCompareAllOpen(true)}
                          className="compare-all-btn flex items-center gap-2 text-[11px] font-bold tracking-wider px-4 py-2 rounded-full whitespace-nowrap border bg-white transition-colors"
                          style={{ color: 'var(--brand)', borderColor: 'var(--brand)', letterSpacing: '0.05em' }}
                          title="Open a side-by-side comparison of every feature across all roles">
                          <CompareIcon size={13} stroke={2} /> COMPARE ALL
                        </button>
                      )}
                      <button onClick={() => setShowModal(true)}
                        className="add-role-btn flex items-center gap-2 text-[11px] font-bold tracking-wider px-4 py-2 rounded-full text-white whitespace-nowrap">
                        <UserIcon size={13} stroke={2} /> ADD ROLE
                      </button>
                    </div>
                  </header>

                  {/* Mobile role strip — single scrollable line */}
                  {isMobile && (
                    <div className="mobile-only mb-3 flex items-center gap-2 overflow-x-auto role-pills-scroll"
                      style={{ WebkitOverflowScrolling: 'touch', flexWrap: 'nowrap' }}>
                      {roles.map(r => (
                        <button key={r.id} type="button"
                          onClick={(e) => { e.stopPropagation(); if (r.id === 'everyone') { setContactRoleId(r.id); } else { setOpenMenuRoleId(r.id); } }}
                          className="relative flex items-center rounded-full border bg-white px-3 py-1.5 whitespace-nowrap shrink-0 text-[11px] font-bold uppercase tracking-wider"
                          style={{ borderColor: 'var(--card-border)', color: 'var(--text-secondary)' }}>
                          {r.name}
                          <span className="ml-1" style={{ color: 'var(--text-tertiary)', fontWeight: 600 }}>({contacts.filter(c => c.roleId === r.id).length})</span>
                        </button>
                      ))}
                    </div>
                  )}
                  {/* Mobile bottom-sheet for role actions — replaces the cramped dropdown. */}
                  {isMobile && mobileRenameRoleId && (() => {
                    const r = roles.find(x => x.id === mobileRenameRoleId);
                    if (!r) return null;
                    return (
                      <RenameRoleSheet
                        role={r}
                        existingNames={roles.map(x => x.name.toLowerCase())}
                        onClose={() => setMobileRenameRoleId(null)}
                        onCommit={(name) => { renameRole(r.id, name); setMobileRenameRoleId(null); }}
                      />
                    );
                  })()}

                  {isMobile && openMenuRoleId && (() => {
                    const r = roles.find(x => x.id === openMenuRoleId);
                    if (!r) return null;
                    return (
                      <RoleActionsSheet
                        role={r}
                        onClose={() => setOpenMenuRoleId(null)}
                        onAddContact={() => { setOpenMenuRoleId(null); setContactRoleId(r.id); }}
                        onRename={() => { setOpenMenuRoleId(null); setMobileRenameRoleId(r.id); }}
                        onSaveLater={() => { saveRoleForLater(r.id); setOpenMenuRoleId(null); }}
                        onDuplicate={() => { duplicateRole(r.id); setOpenMenuRoleId(null); }}
                        onRemove={() => { setOpenMenuRoleId(null); requestRemoveRole(r.id); }}
                      />
                    );
                  })()}

                  <div className="matrix-scroll" style={{ overflowX: 'auto', ...(isMobile ? {} : { overflowY: 'auto', maxHeight: 'calc(100vh - 270px)' }) }}>
                  <div className="bg-white rounded-xl border" style={{ borderColor: 'var(--card-border)', minWidth: !isMobile ? matrixMinWidth : undefined }}>
                    {/* Header row — sticky within the scroll container */}
                    {!isMobile && (
                      <div className="grid items-center" style={{ gridTemplateColumns: gridCols, padding: '14px 0',
                        background: 'var(--soft-bg)', borderTopLeftRadius: 12, borderTopRightRadius: 12,
                        position: 'sticky', top: 0, zIndex: 10 }}>
                        <div className="pl-6 text-[13px]" style={{ color: 'var(--text-secondary)' }}>Feature</div>
                        {roles.map(r => (
                          <ColumnHeader key={r.id} role={r}
                            contactCount={contacts.filter(c => c.roleId === r.id).length}
                            isMenuOpen={openMenuRoleId === r.id}
                            onMenuToggle={() => setOpenMenuRoleId(openMenuRoleId === r.id ? null : r.id)}
                            isRenaming={renamingRoleId === r.id}
                            onCommitRename={(name) => renameRole(r.id, name)}
                            onCancelRename={() => setRenamingRoleId(null)}
                            onRename={() => { setRenamingRoleId(r.id); setOpenMenuRoleId(null); }}
                            onDuplicate={() => { duplicateRole(r.id); setOpenMenuRoleId(null); }}
                            onRemove={() => { setOpenMenuRoleId(null); requestRemoveRole(r.id); }}
                            onSaveLater={() => { saveRoleForLater(r.id); setOpenMenuRoleId(null); }}
                            onAddContact={() => setContactRoleId(r.id)}
                          />
                        ))}
                      </div>
                    )}

                    {features.map(feature => {
                      const hasSettings = feature.settings.length > 0;
                      const isOpen = openFeatures.has(feature.id);

                      return (
                        <React.Fragment key={feature.id}>
                          {feature.sectionStart && (
                            <div className="px-6 py-2.5"
                              style={{ background: 'var(--soft-bg)', borderTop: '1px solid var(--card-border)' }}>
                              <span className="text-[11px] font-bold tracking-widest uppercase"
                                style={{ color: 'var(--text-tertiary)' }}>
                                {feature.sectionStart}
                              </span>
                            </div>
                          )}
                          <MatrixRow
                            feature={feature} roles={roles} perRole={perRole}
                            isOpen={isOpen} onToggleOpen={() => toggleOpen(feature.id)}
                            onToggleEnabled={(rId) => toggleEnabled(feature.id, rId)}
                            onUpdateShared={(sId, v) => updateSharedValue(feature.id, sId, v)}
                            onSetOpen={(open) => setFeatureOpen(feature.id, open)}
                            gridCols={gridCols} hasSettings={hasSettings} isMobile={isMobile}
                            onEditSettings={() => setMobileEditFeatureId(feature.id)}
                          />
                          {/* Inline settings panel only on desktop. On mobile, settings open
                              in MobileFeatureSettingsModal triggered by the EDIT SETTINGS button. */}
                          {!isMobile && isOpen && hasSettings && (
                            isMultiRole ? (
                              <MultiRoleSettingsBlock
                                feature={feature} roles={roles} perRole={perRole}
                                onUpdate={(rId, sId, v) => updateValue(feature.id, rId, sId, v)}
                                onUpdateShared={(sId, v) => {
                                  updateSharedValue(feature.id, sId, v);
                                  if (sId === 'watermark-source' && v === 'None') setFeatureOpen(feature.id, false);
                                }}
                              />
                            ) : (
                              <SimpleSettingsBlock feature={feature} role={roles[0]} perRole={perRole}
                                onUpdate={(rId, sId, v) => {
                                  updateValue(feature.id, rId, sId, v);
                                  if (sId === 'watermark-source' && v === 'None') setFeatureOpen(feature.id, false);
                                }} />
                            )
                          )}
                        </React.Fragment>
                      );
                    })}
                  </div>
                  </div>
                </main>
                )}
              </div>
              )}
            </div>
      );

      // All overlay/modal JSX — passed into IPhoneFrame when simulateMobile so they're
      // scoped to the phone screen (via transform:translateZ(0) containing-block trick),
      // or rendered at App level for desktop.
      const _modals = (
        <>
          {showModal && (
            <AddRoleModal onClose={() => setShowModal(false)}
              onSelect={addRole} onSelectBulk={addRoles} onDeleteSaved={deleteSavedRoles}
              onOpenPlans={() => { setShowModal(false); setShowPlansModal(true); }}
              existingNames={existingNames} viewMode={viewMode}
              customRoleCount={roles.filter(r => r.isCustom).length} savedRoles={savedRoles} />
          )}

          {permModalPhotoId && (
            <CustomPermissionsModal
              photoId={permModalPhotoId}
              photoOverrides={photoOverrides}
              roles={roles}
              onClose={() => setPermModalPhotoId(null)}
              onSave={(photoId, ov) => setPhotoOverrides(prev => ({ ...prev, [photoId]: ov }))}
              onReset={(photoId) => setPhotoOverrides(prev => { const next = { ...prev }; delete next[photoId]; return next; })}
            />
          )}

          {contactRoleId && (() => {
            const r = roles.find(x => x.id === contactRoleId);
            if (!r) return null;
            return (
              <AddContactToRoleModal
                role={r}
                onClose={() => setContactRoleId(null)}
                onAdd={(c) => addContact({ ...c, roleId: r.id })} />
            );
          })()}

          {mobileEditFeatureId && (() => {
            const feature = features.find(f => f.id === mobileEditFeatureId);
            if (!feature) return null;
            return (
              <MobileFeatureSettingsModal
                feature={feature} roles={roles} perRole={perRole}
                onClose={() => setMobileEditFeatureId(null)}
                onUpdate={(rId, sId, v) => updateValue(feature.id, rId, sId, v)}
                onUpdateShared={(sId, v) => updateSharedValue(feature.id, sId, v)}
                onToggleEnabled={(rId) => toggleEnabled(feature.id, rId)} />
            );
          })()}

          {compareAllOpen && (
            <CompareAllModal features={features} roles={roles} perRole={perRole}
              contacts={contacts}
              onClose={() => setCompareAllOpen(false)}
              onUpdate={(fId, rId, sId, v) => updateValue(fId, rId, sId, v)}
              onUpdateShared={(fId, sId, v) => updateSharedValue(fId, sId, v)}
              onToggleEnabled={(fId, rId) => toggleEnabled(fId, rId)}
              onAddRole={() => setShowModal(true)}
              openMenuRoleId={openMenuRoleId}
              onMenuToggle={(id) => setOpenMenuRoleId(id)}
              renamingRoleId={renamingRoleId}
              onStartRename={(id) => { setRenamingRoleId(id); setOpenMenuRoleId(null); }}
              onCommitRename={(id, name) => renameRole(id, name)}
              onCancelRename={() => setRenamingRoleId(null)}
              onRoleSaveLater={(r) => saveRoleForLater(r.id)}
              onRoleDuplicate={(id) => duplicateRole(id)}
              onRoleRemove={(id) => requestRemoveRole(id)}
              onRoleAddContact={(id) => setContactRoleId(id)} />
          )}

          {showPlansModal && (
            <PlansModal currentPlan={viewMode} onClose={() => setShowPlansModal(false)} onSelectPlan={selectPlan} />
          )}

          {removeConfirm && (() => {
            const role = roles.find(r => r.id === removeConfirm);
            const count = contacts.filter(c => c.roleId === removeConfirm).length;
            if (isMobile) return (
              <MobileSheetModal onClose={() => setRemoveConfirm(null)} zIndex={300}>
                <div style={{ padding: '8px 20px 0' }}>
                  <div style={{ textAlign: 'center', fontSize: 15, fontWeight: 700, color: 'var(--text-primary)', marginBottom: 12 }}>
                    Remove "{role?.name}"?
                  </div>
                  <p className="text-[14px] leading-relaxed" style={{ color: 'var(--text-secondary)' }}>
                    {count} {count === 1 ? 'contact has' : 'contacts have'} been added to this gallery in the <strong>{role?.name}</strong> role.
                    Removing this role will move {count === 1 ? 'that contact' : 'all of those contacts'} to the <strong>General</strong> role.
                  </p>
                </div>
                <div style={{ display: 'flex', gap: 12, padding: '16px 20px 20px' }}>
                  <button onClick={() => setRemoveConfirm(null)}
                    style={{ flex: 1, padding: '12px', borderRadius: 9999, border: '1px solid var(--card-border)', background: '#fff', fontSize: 14, fontWeight: 600, cursor: 'pointer', color: 'var(--text-primary)' }}>
                    Cancel
                  </button>
                  <button onClick={() => { removeRole(removeConfirm); setRemoveConfirm(null); }}
                    style={{ flex: 1, padding: '12px', borderRadius: 9999, border: 'none', background: '#E53E3E', color: '#fff', fontSize: 14, fontWeight: 700, cursor: 'pointer' }}>
                    Remove Role
                  </button>
                </div>
              </MobileSheetModal>
            );
            const jsx = (
              <div className="fixed inset-0 flex items-center justify-center" style={{ background: 'rgba(0,0,0,0.45)', zIndex: 300 }}
                onClick={() => setRemoveConfirm(null)}>
                <div className="bg-white rounded-2xl shadow-2xl p-6" style={{ width: 420, maxWidth: 'calc(100vw - 32px)' }}
                  onClick={e => e.stopPropagation()}>
                  <h2 className="text-[17px] font-extrabold tracking-tight mb-3" style={{ color: 'var(--text-primary)' }}>
                    Remove "{role?.name}"?
                  </h2>
                  <p className="text-[14px] leading-relaxed mb-6" style={{ color: 'var(--text-secondary)' }}>
                    {count} {count === 1 ? 'contact has' : 'contacts have'} been added to this gallery in the <strong>{role?.name}</strong> role.
                    Removing this role will move {count === 1 ? 'that contact' : 'all of those contacts'} to the <strong>General</strong> role.
                  </p>
                  <div className="flex justify-end gap-3">
                    <button onClick={() => setRemoveConfirm(null)}
                      className="px-4 py-2 rounded-lg text-[14px] font-semibold"
                      style={{ background: 'var(--soft-bg)', color: 'var(--text-primary)' }}>
                      Cancel
                    </button>
                    <button onClick={() => { removeRole(removeConfirm); setRemoveConfirm(null); }}
                      className="px-4 py-2 rounded-lg text-[14px] font-semibold text-white"
                      style={{ background: '#E53E3E' }}>
                      Remove Role
                    </button>
                  </div>
                </div>
              </div>
            );
            return ReactDOM.createPortal(jsx, document.body);
          })()}

          {presetConfirm && (() => {
            const { roleNames, presetName, rolesToRemove, rolesToAdd, rolesToUpdate } = presetConfirm;
            const hasRemovals = rolesToRemove.length > 0;
            const affectedContacts = contacts.filter(c => {
              const role = roles.find(r => r.id === c.roleId);
              return role && rolesToRemove.includes(role.name);
            }).length;
            const fmtList = (names) => names.map((n, i) => (
              <React.Fragment key={n}>
                {i > 0 && (i === names.length - 1 ? ' and ' : ', ')}
                <strong>{n}</strong>
              </React.Fragment>
            ));
            const rw = (n) => n === 1 ? 'role' : 'roles';
            const cw = (n) => n === 1 ? 'contact' : 'contacts';
            const tw = (n) => n === 1 ? 'this role' : 'these roles';
            const activeCount = [rolesToAdd.length > 0, rolesToUpdate.length > 0, rolesToRemove.length > 0].filter(Boolean).length;
            const changeWord = activeCount === 1 ? 'change' : 'changes';
            if (isMobile) return (
              <MobileSheetModal onClose={() => setPresetConfirm(null)} zIndex={300}>
                <div style={{ padding: '8px 20px 0' }}>
                  <div style={{ textAlign: 'center', fontSize: 15, fontWeight: 700, color: 'var(--text-primary)', marginBottom: 12 }}>
                    Apply "{presetName}" Preset?
                  </div>
                  <div style={{ fontSize: 13, lineHeight: 1.6, color: 'var(--text-secondary)', display: 'flex', flexDirection: 'column', gap: 10 }}>
                    <p>Applying the <strong>"{presetName}"</strong> preset will make the following {changeWord}:</p>
                    {rolesToAdd.length > 0 && (
                      <p>The following {rw(rolesToAdd.length)} will be added: {fmtList(rolesToAdd)}.</p>
                    )}
                    {rolesToUpdate.length > 0 && (
                      <p>
                        The settings may be updated for: {fmtList(rolesToUpdate)}.
                        {!hasRemovals && <> Contacts in {tw(rolesToUpdate.length)} will remain but their experience may change.</>}
                      </p>
                    )}
                    {rolesToRemove.length > 0 && (
                      <p>
                        The following {rw(rolesToRemove.length)} will be removed: {fmtList(rolesToRemove)}.{' '}
                        {affectedContacts} {cw(affectedContacts)} will be moved to the General role.
                      </p>
                    )}
                  </div>
                </div>
                <div style={{ display: 'flex', gap: 12, padding: '16px 20px 20px' }}>
                  <button onClick={() => setPresetConfirm(null)}
                    style={{ flex: 1, padding: '12px', borderRadius: 9999, border: '1px solid var(--card-border)', background: '#fff', fontSize: 14, fontWeight: 600, cursor: 'pointer', color: 'var(--text-primary)' }}>
                    Cancel
                  </button>
                  <button onClick={() => { applyPreset(roleNames, presetName); setPresetConfirm(null); }}
                    style={{ flex: 1, padding: '12px', borderRadius: 9999, border: 'none', background: 'var(--brand)', color: '#fff', fontSize: 14, fontWeight: 700, cursor: 'pointer' }}>
                    Confirm
                  </button>
                </div>
              </MobileSheetModal>
            );
            const jsx = (
              <div className="fixed inset-0 flex items-center justify-center" style={{ background: 'rgba(0,0,0,0.45)', zIndex: 300 }}
                onClick={() => setPresetConfirm(null)}>
                <div className="bg-white rounded-2xl shadow-2xl overflow-hidden" style={{ width: 500, maxWidth: 'calc(100vw - 32px)' }}
                  onClick={e => e.stopPropagation()}>
                  {/* Header */}
                  <div className="relative flex items-center justify-center px-6 py-5 border-b" style={{ borderColor: 'var(--card-border)' }}>
                    <h2 className="text-[17px] font-extrabold tracking-tight" style={{ color: 'var(--text-primary)' }}>
                      Apply "{presetName}" Preset?
                    </h2>
                    <button onClick={() => setPresetConfirm(null)}
                      className="absolute right-4 top-1/2 -translate-y-1/2 text-[20px] leading-none"
                      style={{ color: 'var(--text-tertiary)' }}>×</button>
                  </div>
                  {/* Body */}
                  <div className="px-8 py-7 text-[15px] leading-relaxed" style={{ color: 'var(--text-primary)' }}>
                    <p className="mb-4">Applying the <strong>"{presetName}"</strong> preset to this gallery will make the following {changeWord}:</p>
                    <div className="flex flex-col gap-3">
                      {rolesToAdd.length > 0 && (
                        <p>The following {rw(rolesToAdd.length)} will be added: {fmtList(rolesToAdd)}.</p>
                      )}
                      {rolesToUpdate.length > 0 && (
                        <p>
                          The settings may be updated for the following {rw(rolesToUpdate.length)}: {fmtList(rolesToUpdate)}.
                          {!hasRemovals && (
                            <> Since no roles are being removed, any contacts you've added to {tw(rolesToUpdate.length)} will remain in their {rw(rolesToUpdate.length)}, but their experience may change.</>
                          )}
                        </p>
                      )}
                      {rolesToRemove.length > 0 && (
                        <p>
                          The following {rw(rolesToRemove.length)} will be removed: {fmtList(rolesToRemove)}.{' '}
                          {affectedContacts} {cw(affectedContacts)} assigned to removed {rw(rolesToRemove.length)} will be moved to the General role.
                        </p>
                      )}
                    </div>
                  </div>
                  {/* Footer */}
                  <div className="flex items-center justify-between px-8 py-5 border-t" style={{ borderColor: 'var(--card-border)' }}>
                    <button onClick={() => setPresetConfirm(null)}
                      className="text-[15px] font-semibold"
                      style={{ color: 'var(--text-primary)' }}>
                      Cancel
                    </button>
                    <button onClick={() => { applyPreset(roleNames, presetName); setPresetConfirm(null); }}
                      className="px-8 py-3 rounded-xl text-[15px] font-semibold text-white"
                      style={{ background: 'var(--brand)' }}>
                      Confirm
                    </button>
                  </div>
                </div>
              </div>
            );
            return ReactDOM.createPortal(jsx, document.body);
          })()}

          {toast && (
            <div className="fixed bottom-6 z-50 text-white text-[13px] px-4 py-2.5 rounded-lg shadow-lg modal-card"
              style={{ background: 'rgba(27, 28, 31, 0.92)', left: '50%', transform: 'translateX(-50%)' }}>
              {toast}
            </div>
          )}
        </>
      );

      return (
        <MobileSimContext.Provider value={simulateMobile}>
        <div className="min-h-screen flex flex-col" style={{ background: 'var(--page-bg)' }}>
          {!realMobile && <TopBar viewMode={viewMode} setViewMode={setViewMode}
            simulateMobile={simulateMobile} onToggleMobile={() => setSimulateMobile(v => !v)} />}
          {simulateMobile ? (
            <div style={{ flex:1, display:'flex', alignItems:'flex-start', justifyContent:'center', padding:'32px 24px', overflowY:'auto', background:'#DEDAD3' }}>
              <IPhoneFrame modals={_modals}>{_mV}</IPhoneFrame>
            </div>
          ) : realMobile ? (
            <>
              {_mV}
              {_modals}
            </>
          ) : (
            <>
              <div className="flex flex-1">
                <ZenfolioNav activeView={activeView} setActiveView={setActiveView} />
                {_mV}
              </div>
              {_modals}
            </>
          )}
        </div>
        </MobileSimContext.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
