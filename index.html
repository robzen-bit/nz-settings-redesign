                      <div style={{ display: 'inline-flex', flexDirection: 'column', gap: 6 }}>
                        <div className="flex items-center gap-1.5 text-[12px]" style={{ color: 'var(--text-secondary)' }}>
                          <span aria-hidden="true" style={{ color: 'var(--brand)', opacity: 0.7 }}>↳</span>
                          <span>{c.label}</span>
                          {c.tooltip && <InfoTooltip content={c.tooltip} />}
                        </div>
                        <div style={{ ...disabledStyle, width: '100%' }} aria-disabled={!roleEnabled}>
                          <SettingControl s={c} value={perRole[role.id]?.[feature.id]?.values?.[c.id]} onChange={(v) => onUpdate(role.id, c.id, v)} compact />
                        </div>
                      </div>
                      {role.id === 'everyone' && (c.id === 'specific-amount' || c.id === 'video-specific-amount') && (
                        <p className="text-[11px] leading-snug mt-1" style={{ color: 'var(--danger)' }}>
                          Visitors may use multiple email addresses to bypass this limit.{' '}
                          <a href="#" onClick={e => e.preventDefault()} style={{ color: 'var(--danger)', textDecoration: 'underline', textUnderlineOffset: '2px' }}>Learn more</a>
                        </p>
                      )}
                    </div>
                  ) : (
                    <div key={c.id}
                      className={`shared-flat-row grid items-start gap-4 mobile-child-row${c.type === 'multicheck' ? ' is-multicheck-row' : ''}${c.type === 'toggle' ? ' is-toggle-child' : ''}`}
                      style={{
                        gridTemplateColumns: '1fr auto',
                        padding: '6px 0 12px 22px',
                        marginTop: -8,
                      }}>
                      <div className="flex items-center gap-1.5 text-[12px]" style={{ color: 'var(--text-secondary)', opacity: roleEnabled ? 1 : 0.6 }}>
                        <span aria-hidden="true" style={{ color: 'var(--brand)', opacity: 0.7 }}>↳</span>
                        <span>{c.label}</span>
                        {c.tooltip && <InfoTooltip content={c.tooltip} />}
                      </div>
                      <div className="control-end flex flex-col items-end gap-1" style={disabledStyle} aria-disabled={!roleEnabled}>
                        <SettingControl s={c} value={perRole[role.id]?.[feature.id]?.values?.[c.id]} onChange={(v) => onUpdate(role.id, c.id, v)} compact />
                        {role.id === 'everyone' && (c.id === 'specific-amount' || c.id === 'video-specific-amount') && (
                          <p className="text-[11px] leading-snug text-right" style={{ color: 'var(--danger)', whiteSpace: 'nowrap' }}>
                            Visitors may use multiple email addresses to bypass this limit.{' '}
                            <a href="#" onClick={e => e.preventDefault()} style={{ color: 'var(--danger)', textDecoration: 'underline', textUnderlineOffset: '2px' }}>Learn more</a>
                          </p>
                        )}
                      </div>
                    </div>
                  )
                ))}
              </div>
            );
          })}
        </div>
      );
    };

    // Multi-role: shared row — single value applied to all roles. No per-row Set per role
    // (Set per role is now a feature-level button at the top of the panel).
    // Visible child settings (passed in `children`) render as indented sub-rows directly
    // attached to the parent so users don't have to scan further down for the dependent input.
    const SharedRowFlat = ({ s, value, onChangeAll, isFirst, subSettings = [], childValues = {}, onChildShared }) => {
      const isToggle = s.type === 'toggle';
      const showDivider = !!s.optional && !isFirst;
      if (s.fullWidth) {
        return (
          <div style={{ padding: '14px 16px' }}>
            <SettingControl s={s} value={value} onChange={onChangeAll} compact />
          </div>
        );
      }
      return (
        <div style={{
          borderTop: showDivider ? '1px solid var(--card-border)' : 'none',
          marginTop: showDivider ? 6 : 0,
        }}>
          <div className="shared-flat-row grid gap-3"
            style={{ gridTemplateColumns: '1fr auto',
                     padding: '14px 16px',
                     alignItems: isToggle ? 'flex-start' : 'center' }}>
            <div>
              <div className="flex items-center text-[13px] font-medium" style={{ color: 'var(--text-primary)' }}>
                {s.label}{s.tooltip && <InfoTooltip content={s.tooltip} />}
              </div>
              {s.meta && (
                <div className="text-[12px] mt-1 leading-relaxed" style={{ color: 'var(--text-secondary)', whiteSpace: 'pre-line' }}>
                  {s.meta}
                </div>
              )}
            </div>
            <div className="control-end flex">
              <SettingControl s={s} value={value} onChange={onChangeAll} compact />
            </div>
          </div>
          {subSettings.map(c => (
            c.fullWidth ? (
              <div key={c.id} style={{ borderTop: '1px solid var(--card-border)', padding: '14px 16px' }}>
                <SettingControl s={c} value={childValues[c.id]} onChange={(v) => onChildShared && onChildShared(c.id, v)} compact />
              </div>
            ) : (
              <div key={c.id}
                className="shared-flat-row grid gap-3"
                style={{
                  gridTemplateColumns: '1fr auto',
                  padding: '6px 0 12px 22px',
                  marginTop: -8,
                  alignItems: 'center',
                }}>
                <div className="flex items-center gap-1.5 text-[12px]" style={{ color: 'var(--text-secondary)' }}>
                  <span aria-hidden="true" style={{ color: 'var(--brand)', opacity: 0.7 }}>↳</span>
                  <span>{c.label}</span>
                  {c.tooltip && <InfoTooltip content={c.tooltip} />}
                </div>
                <div className="control-end flex">
                  <SettingControl s={c} value={childValues[c.id]} onChange={(v) => onChildShared && onChildShared(c.id, v)} compact />
                </div>
              </div>
            )
          ))}
        </div>
      );
    };

    // Per-role stack for a single setting. Shows ALL roles (even those with the feature off)
    // so users can adjust their settings; OFF roles render with a greyed-out indicator.
    // Dependent settings (passed as `childSettings`) are rendered inline as indented sub-rows
    // tucked under the role they apply to, so a "Number of images allowed" input appears
    // immediately below the row whose dropdown selected "Specific Amount Download".
    const PerRoleGroup = ({ s, visibleRoles, perRole, featureId, onUpdate, isFirst, childSettings = [] }) => (
      <div style={{
        borderTop: !isFirst ? '1px solid var(--card-border)' : 'none',
        paddingTop: isFirst ? 14 : 18,
        paddingBottom: 14,
      }}>
        <div className="rounded-lg overflow-hidden bg-white" style={{ border: '1px solid var(--card-border)' }}>
          {visibleRoles.map((r, idx) => {
            const value = perRole[r.id]?.[featureId]?.values?.[s.id];
            const roleEnabled = !!perRole[r.id]?.[featureId]?.enabled;
            const visibleChildren = childSettings.filter(c => isSettingVisibleForRole(c, r.id, featureId, perRole, childSettings));
            const disabledStyle = roleEnabled ? null : { opacity: 0.5, pointerEvents: 'none' };
            return (
              <React.Fragment key={r.id}>
                {/* Role name — card section header */}
                <div className="flex items-center gap-2 px-4 py-2.5"
                  style={{
                    borderTop: idx > 0 ? '1px solid var(--card-border)' : 'none',
                    background: '#fff',
                  }}>
                  <span className="rounded-full shrink-0"
                    style={{ width: 7, height: 7, background: 'var(--green)', opacity: roleEnabled ? 1 : 0.3 }} />
                  <span className="text-[11px] font-bold tracking-wider uppercase"
                    style={{ color: 'var(--text-secondary)', opacity: roleEnabled ? 1 : 0.6 }}>{r.name}</span>
                </div>
                {/* Main setting as a sub-row */}
                <div className="role-row per-role-row grid items-center child-row"
                  style={{
                    gridTemplateColumns: '1fr auto',
                    padding: '8px 14px 8px 28px',
                    background: 'var(--soft-bg)',
                    minHeight: 0,
                  }}>
                  <div className="flex items-center gap-1.5 text-[11px] font-medium" style={{ color: 'var(--text-secondary)', opacity: roleEnabled ? 1 : 0.6 }}>
                    <span aria-hidden="true" style={{ color: 'var(--brand)', opacity: 0.7 }}>↳</span>
                    <span className="truncate" title={s.label}>{s.label}</span>
                    {s.tooltip && <InfoTooltip content={s.tooltip} />}
                  </div>
                  <div className="control-cell flex justify-end" style={disabledStyle} aria-disabled={!roleEnabled}>
                    <SettingControl s={s} value={value} onChange={(v) => onUpdate(r.id, s.id, v)} compact />
                  </div>
                </div>
                {/* Child settings as sub-rows */}
                {visibleChildren.map(c => {
                  const showBypassWarning = r.id === 'everyone' && (c.id === 'specific-amount' || c.id === 'video-specific-amount');
                  return (
                    <div key={c.id}
                      className="role-row per-role-row grid items-start child-row"
                      style={{
                        gridTemplateColumns: '1fr auto',
                        padding: '8px 14px 8px 28px',
                        background: 'var(--soft-bg)',
                        minHeight: 0,
                        borderTop: '1px solid var(--card-border)',
                      }}>
                      <div className="flex items-center gap-1.5 text-[11px] font-medium" style={{ color: 'var(--text-secondary)', opacity: roleEnabled ? 1 : 0.6 }}>
                        <span aria-hidden="true" style={{ color: 'var(--brand)', opacity: 0.7 }}>↳</span>
                        <span className="truncate" title={c.label}>{c.label}</span>
                        {c.tooltip && <InfoTooltip content={c.tooltip} />}
                      </div>
                      <div className="control-cell flex flex-col items-end gap-1" style={disabledStyle} aria-disabled={!roleEnabled}>
                        <SettingControl s={c}
                          value={perRole[r.id]?.[featureId]?.values?.[c.id]}
                          onChange={(v) => onUpdate(r.id, c.id, v)} compact />
                        {showBypassWarning && (
                          <p className="text-[11px] leading-snug text-right" style={{ color: 'var(--danger)', whiteSpace: 'nowrap' }}>
                            Visitors may use multiple email addresses to bypass this limit.{' '}
                            <a href="#" onClick={e => e.preventDefault()} style={{ color: 'var(--danger)', textDecoration: 'underline', textUnderlineOffset: '2px' }}>Learn more</a>
                          </p>
                        )}
                      </div>
                    </div>
                  );
                })}
              </React.Fragment>
            );
          })}
        </div>
      </div>
    );

    // Outlined orange action button used for "Set per role" / "Match across roles"
    const OutlineCtaBtn = ({ onClick, children }) => (
      <button onClick={onClick}
        className="outline-cta-btn text-[12px] font-medium px-4 py-2 rounded-full border transition-all"
        style={{ borderColor: 'var(--brand)', background: 'var(--brand-cream)', color: 'var(--brand)' }}>
        {children}
      </button>
    );

    // Eye icons used by the "Show off roles" toggle inside per-role mode.
    const EyeIcon = ({ size = 14 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round">
        <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z" />
        <circle cx="12" cy="12" r="3" />
      </svg>
    );
    const EyeOffIcon = ({ size = 14 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round">
        <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-6.5 0-10-7-10-7a18.4 18.4 0 0 1 4.06-5.06" />
        <path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c6.5 0 10 7 10 7a18.4 18.4 0 0 1-2.16 3.19" />
        <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24" />
        <line x1="2" y1="2" x2="22" y2="22" />
      </svg>
    );

    // Multi-role expanded panel — per-role is always-on. Every setting renders for every
    // available role; OFF roles still appear (with a greyed indicator inside PerRoleGroup)
    // so users can configure them ahead of enabling. Optional/global settings (e.g. license)
    // remain a single shared row that applies across roles.
    const MultiRoleSettingsBlock = ({ feature, roles, perRole, onUpdate, onUpdateShared }) => {
      const mainSettings = feature.settings.filter(s => !s.optional);
      const optionalSettings = feature.settings.filter(s => s.optional);
      const refRoleId = roles[0].id;

      return (
        <div style={{ background: 'var(--soft-bg)', borderTop: '1px solid var(--card-border)' }}>
          <div className="multi-panel-body px-8 pt-4 pb-5" style={{ maxWidth: 760 }}>
            {(() => {
              const topLevel = mainSettings.filter(s => !s.dependsOn);
              const childrenOf = (id) => mainSettings.filter(s => s.dependsOn?.settingId === id);
              const renderable = topLevel
                .map(s => ({
                  s,
                  visibleRoles: roles.filter(r => isSettingVisibleForRole(s, r.id, feature.id, perRole, mainSettings)),
                  childSettings: childrenOf(s.id),
                }))
                .filter(({ visibleRoles }) => visibleRoles.length > 0);
              if (renderable.length === 0 && optionalSettings.length === 0) {
                return (
                  <div className="text-[12px] italic py-3" style={{ color: 'var(--text-tertiary)' }}>
                    No settings to configure for this feature.
                  </div>
                );
              }
              if (renderable.length === 0) return null;
              return renderable.map(({ s, visibleRoles, childSettings }, i) => (
                <PerRoleGroup key={s.id} s={s} visibleRoles={visibleRoles} perRole={perRole}
                  featureId={feature.id}
                  onUpdate={(rId, sId, v) => onUpdate(rId, sId, v)}
                  isFirst={i === 0} childSettings={childSettings} />
              ));
            })()}

            {optionalSettings.length > 0 && (() => {
              const topLevelOptional = optionalSettings.filter(s => !s.dependsOn);
              const dependentOptional = optionalSettings.filter(s => s.dependsOn);
              return (
                <div style={{ borderTop: '1px solid var(--card-border)', marginTop: 6, paddingTop: 4 }}>
                  <div className="rounded-lg overflow-hidden" style={{ border: '1px solid var(--card-border)', background: '#fff' }}>
                    {topLevelOptional.map(s => (
                      <SharedRowFlat key={s.id} s={s}
                        value={perRole[refRoleId]?.[feature.id]?.values?.[s.id]}
                        onChangeAll={(v) => onUpdateShared(s.id, v)}
                        isFirst />
                    ))}
                    {dependentOptional.map(s => {
                      const dep = s.dependsOn;
                      const depVal = perRole[refRoleId]?.[feature.id]?.values?.[dep.settingId];
                      const visible = dep.values ? dep.values.includes(depVal) : true;
                      if (!visible) return null;
                      const val = perRole[refRoleId]?.[feature.id]?.values?.[s.id];
                      return (
                        <div key={s.id} style={{ borderTop: '1px solid var(--card-border)', padding: '14px 16px' }}>
                          <SettingControl s={s} value={val} onChange={(v) => onUpdateShared(s.id, v)} compact />
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })()}
          </div>
        </div>
      );
    };

    // ===== Matrix Row =====
    // Renders one feature in the matrix. On desktop this is a horizontal grid:
    // feature label on the left + a toggle column for every role.
    // On mobile we flip it to a stacked card so it fits a narrow viewport: feature header
    const getSharedValue = (perRole, roles, featureId, settingId) => {
      const refRoleId = roles[0]?.id;
      return refRoleId ? perRole[refRoleId]?.[featureId]?.values?.[settingId] : undefined;
    };

    // on top (clickable to expand settings), and each role rendered as a label/toggle row.
    const MatrixRow = ({ feature, roles, perRole, isOpen, onToggleOpen, onToggleEnabled, onUpdateShared, onSetOpen, gridCols, hasSettings, isMobile, onEditSettings }) => {
      const SUMMARY_FEATURES = new Set(['photo-downloads', 'video-downloads']);
      if (isMobile) {
        const watermarkOn = feature.appliesToAll
          ? (() => { const v = getSharedValue(perRole, roles, feature.id, 'watermark-source'); return !!(v && v !== 'None'); })()
          : false;
        return (
          <div className="border-t" style={{ borderColor: 'var(--card-border)' }}>
            <div className="feature-row-mobile flex items-center gap-2">
              {feature.icon && (
                <span className="flex items-center justify-center" style={{ width: 20, height: 20 }}>
                  <FeatureIcon name={feature.icon} />
                </span>
              )}
              <div className="flex-1">
                <div className="text-[14px] font-medium leading-tight" style={{ color: 'var(--text-primary)' }}>
                  {feature.name}
                </div>
                {(feature.appliesToAll || feature.sharedToggle) && (
                  <div className="text-[12px] italic" style={{ color: 'var(--text-tertiary)' }}>Applies to all roles</div>
                )}
                {SUMMARY_FEATURES.has(feature.id) && (() => {
                  const lines = buildMobileFeatureStatusLines(feature, roles, perRole);
                  return lines.length > 0 ? (
                    <div className="mt-0.5 space-y-0.5">
                      {lines.map((line, idx) => (
                        <div key={idx} className="text-[12px] leading-snug italic" style={{ color: 'var(--text-secondary)' }}>{line}</div>
                      ))}
                    </div>
                  ) : null;
                })()}
              </div>
              {hasSettings && (
                <button onClick={onEditSettings}
                  className="text-[11px] font-bold uppercase tracking-wider px-2 py-1 rounded-md whitespace-nowrap"
                  style={{ color: 'var(--brand)' }}>
                  Edit settings
                </button>
              )}
              {feature.sharedToggle && (
                <Toggle size="sm" checked={!!perRole[roles[0]?.id]?.[feature.id]?.enabled}
                  onChange={() => onToggleEnabled(roles[0]?.id)} />
              )}
              {feature.appliesToAll && !feature.sharedToggle && (
                <Toggle size="sm" checked={watermarkOn}
                  onChange={() => onUpdateShared('watermark-source', watermarkOn ? 'None' : 'My Watermark')} />
              )}
            </div>
            {!feature.sharedToggle && !feature.appliesToAll && (
              <div className="px-3 pb-3 pt-1">
                <div className="rounded-md border bg-white" style={{ borderColor: 'var(--card-border)' }}>
                  {roles.map((r, idx) => (
                    <div key={r.id}
                      className="flex items-center justify-between gap-3 px-3 py-2.5"
                      style={{ borderTop: idx > 0 ? '1px solid var(--card-border)' : 'none' }}>
                      <span className="text-[11px] font-bold uppercase tracking-wider truncate" style={{ color: 'var(--text-secondary)' }}>
                        {r.name}
                      </span>
                      <Toggle size="sm" checked={!!perRole[r.id]?.[feature.id]?.enabled}
                        onChange={() => onToggleEnabled(r.id)} />
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        );
      }
      const showSummary = SUMMARY_FEATURES.has(feature.id);
      const statusLines = showSummary ? buildFeatureStatusLines(feature, roles, perRole) : [];
      return (
        <div className="border-t" style={{ borderColor: 'var(--card-border)' }}>
          <div onClick={() => hasSettings && onToggleOpen()}
            className={`feature-row grid items-center${hasSettings ? ' is-collapsible' : ''}${isOpen ? ' is-open' : ''}`}
            style={{ gridTemplateColumns: gridCols, minHeight: 58, padding: '16px 0',
              cursor: hasSettings ? 'pointer' : 'default',
              background: isOpen ? 'var(--soft-bg)' : undefined }}>
            <div className="pl-6">
              <div className="flex items-center gap-2">
                <span style={{ color: 'var(--text-tertiary)',
                  visibility: hasSettings ? 'visible' : 'hidden',
                  transform: isOpen ? 'rotate(90deg)' : 'none', transition: 'transform 0.15s' }}><ChevronRight /></span>
                {feature.icon && (
                  <span className="flex items-center justify-center" style={{ width: 20, height: 20 }}>
                    <FeatureIcon name={feature.icon} />
                  </span>
                )}
                <div className="text-[14px] font-medium leading-tight" style={{ color: 'var(--text-primary)' }}>
                  {feature.name}
                </div>
              </div>
              {feature.appliesToAll && !feature.sharedToggle && (() => {
                const src = getSharedValue(perRole, roles, feature.id, 'watermark-source');
                const enabled = src && src !== 'None';
                return enabled ? (
                  <div className="text-[12px] italic mt-0.5" style={{ color: 'var(--text-tertiary)', paddingLeft: 23 }}>
                    {src} applied to all roles
                  </div>
                ) : null;
              })()}
              {feature.sharedToggle && (() => {
                const enabled = !!perRole[roles[0]?.id]?.[feature.id]?.enabled;
                return enabled ? (
                  <div className="text-[12px] italic mt-0.5" style={{ color: 'var(--text-tertiary)', paddingLeft: 23 }}>
                    Applied to all roles
                  </div>
                ) : null;
              })()}
              {showSummary && statusLines.length > 0 && (
                <div className="mt-1.5 space-y-0.5" style={{ paddingLeft: 23 }}>
                  {statusLines.map((line, idx) => (
                    <div key={idx} className="text-[12px] leading-snug italic" style={{ color: 'var(--text-secondary)' }}>
                      {line}
                    </div>
                  ))}
                </div>
              )}
            </div>
            {feature.sharedToggle ? (
              (() => {
                const enabled = !!perRole[roles[0]?.id]?.[feature.id]?.enabled;
                return (
                  <div className="flex items-center justify-center"
                    style={{ gridColumn: `span ${roles.length}` }}>
                    <Toggle size="sm" checked={enabled}
                      onChange={() => onToggleEnabled(roles[0]?.id)} />
                  </div>
                );
              })()
            ) : feature.appliesToAll ? (
              (() => {
                if (isOpen) return null;
                const watermarkSetting = feature.settings.find(s => s.id === 'watermark-source');
                const options = watermarkSetting ? watermarkSetting.options : ['None'];
                const sharedSource = getSharedValue(perRole, roles, feature.id, 'watermark-source') || 'None';
                return (
                  <div className="flex items-center justify-end pr-4"
                    style={{ gridColumn: `2 / span ${roles.length}` }}
                    onClick={e => e.stopPropagation()}>
                    <V5Select
                      value={sharedSource}
                      options={options}
                      onChange={v => {
                        onUpdateShared && onUpdateShared('watermark-source', v);
                        onSetOpen && onSetOpen(v !== 'None');
                      }}
                      minWidth={160}
                    />
                  </div>
                );
              })()
            ) : (
              roles.map(r => {
                const enabled = !!perRole[r.id]?.[feature.id]?.enabled;
                return (
                  <div key={r.id} className="flex justify-center">
                    <Toggle size="sm" checked={enabled}
                      onChange={() => onToggleEnabled(r.id)} />
                  </div>
                );
              })
            )}
          </div>
        </div>
      );
    };

    // ===== Compare-Cell radio group =====
    // Inside the Compare-All modal, "select" settings render as radio lists rather than
    // closed dropdowns. Horizontal comparison across roles is far easier when every option
    // is visible — you can scan a row and immediately spot which roles have which value
    // checked, without clicking each cell open. Other control types fall through to
    // SettingControl as-is.
    const CompareCellControl = ({ s, value, onChange, name }) => {
      if (s.type === 'select') {
        return (
          <div className="flex flex-col gap-0.5">
            {s.options.map(opt => {
              const checked = value === opt;
              return (
                <label key={opt} className="inline-flex items-center gap-2 text-[12px] cursor-pointer leading-tight py-0.5">
                  <span className={`radio-dot ${checked ? 'is-on' : ''}`} />
                  <input type="radio" name={name} checked={checked}
                    onChange={() => onChange(opt)} className="sr-only" />
                  <span style={{ color: 'var(--text-primary)' }}>{opt}</span>
                </label>
              );
            })}
          </div>
        );
      }
      if (s.type === 'multicheck') {
        const hasSubOpts = !!s.subOptions;
        const selectedArr = hasSubOpts
          ? (Array.isArray(value) ? value : (value?.selected || []))
          : (value || []);
        const subSel = hasSubOpts
          ? (Array.isArray(value) ? {} : (value?.sub || {}))
          : {};
        return (
          <div className="flex flex-col gap-0.5">
            {s.options.map(opt => {
              const checked = selectedArr.includes(opt);
              const subs = hasSubOpts ? s.subOptions[opt] : null;
              const currentSub = hasSubOpts ? (subSel[opt] || s.subDef?.[opt]) : null;
              return (
                <div key={opt} className="flex items-center gap-2 py-0.5">
                  <label className="inline-flex items-center gap-2 text-[12px] cursor-pointer leading-tight">
                    <span className={`check-box ${checked ? 'is-on' : ''}`} />
                    <input type="checkbox" checked={checked}
                      onChange={() => {
                        if (hasSubOpts) {
                          const nextSel = checked ? selectedArr.filter(v => v !== opt) : [...selectedArr, opt];
                          onChange({ selected: nextSel, sub: subSel });
                        } else {
                          const next = checked ? (value || []).filter(v => v !== opt) : [...(value || []), opt];
                          onChange(next);
                        }
                      }}
                      className="sr-only" />
                    <span style={{ color: 'var(--text-primary)', opacity: checked ? 1 : 0.35 }}>{opt}</span>
                  </label>
                  {subs && (
                    <MobileSelect
                      value={currentSub || subs[0]}
                      options={subs}
                      disabled={!checked}
                      onChange={v => onChange({ selected: selectedArr, sub: { ...subSel, [opt]: v } })}
                      className="text-[11px] px-1.5 py-0.5 rounded border bg-white outline-none"
                      style={{ borderColor: 'var(--card-border)', color: 'var(--text-primary)' }}
                    />
                  )}
                </div>
              );
            })}
          </div>
        );
      }
      return <SettingControl s={s} value={value} onChange={onChange} compact />;
    };

    // ===== Compare-All Modal =====
    // v4: the per-feature Compare Roles entry point is gone — replaced by a single
    // "Compare All" button beside ADD ROLE. This modal opens almost full-screen and shows
    // every feature × every role at once. It's a secondary scanning surface, not the
    // primary editing flow; opening / closing it is non-destructive (writes flow through
    // the same handlers as the stacked panels). Selects expand into radio lists for
    // easier horizontal scanning across roles.
    const CompareAllModal = ({
      features, roles, perRole, contacts = [],
      onClose, onUpdate, onUpdateShared, onToggleEnabled,
      onAddRole,
      openMenuRoleId, onMenuToggle,
      renamingRoleId, onStartRename, onCommitRename, onCancelRename,
      onRoleSaveLater, onRoleDuplicate, onRoleRemove, onRoleAddContact,
    }) => {
      useEffect(() => {
        const prev = document.body.style.overflow;
        document.body.style.overflow = 'hidden';
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        return () => { document.body.style.overflow = prev; window.removeEventListener('keydown', onKey); };
      }, []);
      // Features with settings default to collapsed so the modal opens clean.
      const [collapsed, setCollapsed] = useState(() => new Set(features.filter(f => f.settings.length > 0).map(f => f.id)));
      const toggleCollapse = (fId) => {
        setCollapsed(prev => {
          const next = new Set(prev);
          if (next.has(fId)) next.delete(fId); else next.add(fId);
          return next;
        });
      };
      const handleFeatureToggle = (feature, roleId) => {
        const wasEnabled = !!perRole[roleId]?.[feature.id]?.enabled;
        onToggleEnabled && onToggleEnabled(feature.id, roleId);
        if (!wasEnabled && feature.settings && feature.settings.length > 0) {
          setCollapsed(prev => {
            if (!prev.has(feature.id)) return prev;
            const next = new Set(prev);
            next.delete(feature.id);
            return next;
          });
        }
      };
      const refRoleId = roles[0].id;
      const SETTING_COL_WIDTH = 260;
      const ROLE_COL_WIDTH = 300;
      const minGridWidth = SETTING_COL_WIDTH + roles.length * ROLE_COL_WIDTH;

      return (
        <div className="fixed inset-0 z-[50] flex modal-backdrop"
          style={{ background: 'var(--bg)' }}>
          <div className="modal-card compare-all-fullscreen relative bg-white flex flex-col"
            style={{ width: '100vw', height: '100vh', maxWidth: 'none' }}>

            {/* Header */}
            <header className="flex items-center justify-between px-5 h-14 border-b shrink-0"
              style={{ borderColor: 'var(--card-border)' }}>
              <div className="flex items-center gap-2">
                <CompareIcon size={16} stroke={1.7} />
                <h2 className="text-[15px] font-extrabold tracking-tight" style={{ color: 'var(--text-primary)' }}>
                  Compare All — every feature across roles
                </h2>
                <span className="text-[12px] ml-2" style={{ color: 'var(--text-secondary)' }}>
                  {features.length} feature{features.length === 1 ? '' : 's'} · {roles.length} role{roles.length === 1 ? '' : 's'}
                </span>
              </div>
              <div className="flex items-center gap-2">
                {onAddRole && (
                  <button onClick={onAddRole}
                    className="add-role-btn flex items-center gap-2 text-[11px] font-bold tracking-wider px-4 py-2 rounded-full text-white whitespace-nowrap">
                    <UserIcon size={13} stroke={2} /> ADD ROLE
                  </button>
                )}
                <button onClick={onClose} className="p-2 rounded-md hover:bg-black/5"
                  aria-label="Close compare" style={{ color: 'var(--text-primary)' }}>
                  <CloseIcon size={20} />
                </button>
              </div>
            </header>

            {/* Body */}
            <div className="compare-grid-scroll flex-1" style={{ overflowY: 'auto' }}>
              <div style={{ minWidth: minGridWidth }}>

                {/* Sticky column header row with full ColumnHeader per role */}
                <div className="grid items-stretch" style={{
                  gridTemplateColumns: `${SETTING_COL_WIDTH}px repeat(${roles.length}, ${ROLE_COL_WIDTH}px)`,
                  background: 'var(--soft-bg)',
                  borderBottom: '1px solid var(--card-border)',
                  position: 'sticky', top: 0, zIndex: 3,
                }}>
                  <div className="pl-5 text-[11px] font-bold uppercase tracking-wider flex items-center"
                    style={{
                      color: 'var(--text-secondary)',
                      background: 'var(--soft-bg)',
                      borderRight: '1px solid var(--card-border)',
                      position: 'sticky', left: 0, zIndex: 4,
                      padding: '10px 16px',
                    }}>
                    Feature / Setting
                  </div>
                  {roles.map((r, i) => (
                    <div key={r.id} className="flex items-center justify-center"
                      style={{
                        borderRight: i === roles.length - 1 ? 'none' : '1px solid var(--card-border)',
                        padding: '8px 12px',
                      }}>
                      <ColumnHeader role={r}
                        contactCount={contacts.filter(c => c.roleId === r.id).length}
                        isMenuOpen={openMenuRoleId === r.id}
                        onMenuToggle={() => onMenuToggle && onMenuToggle(openMenuRoleId === r.id ? null : r.id)}
                        isRenaming={renamingRoleId === r.id}
                        onCommitRename={(name) => onCommitRename && onCommitRename(r.id, name)}
                        onCancelRename={() => onCancelRename && onCancelRename()}
                        onRename={() => { onStartRename && onStartRename(r.id); onMenuToggle && onMenuToggle(null); }}
                        onDuplicate={() => { onRoleDuplicate && onRoleDuplicate(r.id); onMenuToggle && onMenuToggle(null); }}
                        onRemove={() => { onRoleRemove && onRoleRemove(r.id); onMenuToggle && onMenuToggle(null); }}
                        onSaveLater={() => { onRoleSaveLater && onRoleSaveLater(r); onMenuToggle && onMenuToggle(null); }}
                        onAddContact={() => onRoleAddContact && onRoleAddContact(r.id)}
                      />
                    </div>
                  ))}
                </div>

                {/* Per-feature sections */}
                {features.map((feature, fIdx) => {
                  const settings = feature.settings || [];
                  const hasSettings = settings.length > 0;
                  const isCollapsed = collapsed.has(feature.id);
                  return (
                    <div key={feature.id}>
                      <div onClick={() => hasSettings && toggleCollapse(feature.id)}
                        className={`grid items-stretch${hasSettings ? ' compare-feature-header-expandable' : ''}`}
                        style={{
                          gridTemplateColumns: `${SETTING_COL_WIDTH}px repeat(${roles.length}, ${ROLE_COL_WIDTH}px)`,
                          background: '#fff',
                          borderTop: fIdx === 0 ? 'none' : '6px solid var(--soft-bg)',
                          borderBottom: '1px solid var(--card-border)',
                          cursor: hasSettings ? 'pointer' : 'default',
                        }}>
                        <div
                          className="pl-3 pr-3 flex items-center gap-2 compare-feature-header-sticky"
                          style={{
                            background: '#fff',
                            borderRight: '1px solid var(--card-border)',
                            position: 'sticky', left: 0, zIndex: 1,
                            padding: '10px 12px',
                            userSelect: 'none',
                          }}>
                          <span style={{
                            color: 'var(--brand)',
                            visibility: hasSettings ? 'visible' : 'hidden',
                            transform: isCollapsed ? 'rotate(-90deg)' : 'none',
                            transition: 'transform 0.15s',
                            display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                            width: 16, height: 16,
                          }}>
                            <ChevronDown size={14} />
                          </span>
                          {feature.icon && (
                            <span className="flex items-center justify-center shrink-0" style={{ width: 18, height: 18, color: 'var(--text-secondary)' }}>
                              <FeatureIcon name={feature.icon} />
                            </span>
                          )}
                          <div>
                            <span className="text-[13px] font-extrabold uppercase tracking-wider" style={{ color: 'var(--text-primary)', letterSpacing: '0.04em' }}>
                              {feature.name}
                            </span>
                            {feature.appliesToAll && (
                              <div className="text-[11px] italic" style={{ color: 'var(--text-tertiary)' }}>Applies to all roles</div>
                            )}
                          </div>
                        </div>
                        {feature.sharedToggle ? (
                          (() => {
                            const enabled = !!perRole[refRoleId]?.[feature.id]?.enabled;
                            return (
                              <div className="flex items-center justify-start"
                                style={{ gridColumn: `span ${roles.length}`, padding: '10px 16px' }}
                                onClick={e => e.stopPropagation()}>
                                <Toggle size="sm" checked={enabled}
                                  onChange={() => handleFeatureToggle(feature, refRoleId)} />
                              </div>
                            );
                          })()
                        ) : feature.appliesToAll ? (
                          (() => {
                            const sharedSource = getSharedValue(perRole, roles, feature.id, 'watermark-source');
                            const hasValue = sharedSource && sharedSource !== 'None';
                            return (
                              <div className="flex items-center justify-start text-[12px]"
                                style={{ gridColumn: `span ${roles.length}`, color: 'var(--text-primary)', padding: '10px 16px' }}>
                                {hasValue && <span style={{ fontWeight: 500 }}>{sharedSource}</span>}
                              </div>
                            );
                          })()
                        ) : (
                          roles.map((r, i) => {
                            const enabled = !!perRole[r.id]?.[feature.id]?.enabled;
                            const descText = enabled ? getCompareAllDescText(feature.id, r.id, perRole) : null;
                            return (
                              <div key={r.id} className="flex items-center justify-start gap-2"
                                style={{
                                  borderRight: i === roles.length - 1 ? 'none' : '1px solid var(--card-border)',
                                  padding: '10px 16px',
                                }}
                                onClick={e => e.stopPropagation()}>
                                <Toggle size="sm" checked={enabled}
                                  onChange={() => handleFeatureToggle(feature, r.id)} />
                                <span className="text-[11px] font-bold uppercase tracking-wider"
                                  style={{ color: enabled ? 'var(--brand)' : 'var(--text-tertiary)' }}>
                                  {enabled ? 'On' : 'Off'}
                                </span>
                                {descText && (
                                  <span className="text-[11px]" style={{ color: 'var(--text-secondary)' }}>
                                    {descText}
                                  </span>
                                )}
                              </div>
                            );
                          })
                        )}
                      </div>

                      {/* Per-setting rows */}
                      {hasSettings && !isCollapsed && settings.map((s, sIdx) => {
                        const isChild = !!s.dependsOn || !!s.subRow;
                        const isLast = sIdx === settings.length - 1;
                        if (s.optional) {
                          if (s.dependsOn) {
                            const parentValue = perRole[refRoleId]?.[feature.id]?.values?.[s.dependsOn.settingId];
                            if (!s.dependsOn.values.includes(parentValue)) return null;
                          }
                          const value = perRole[refRoleId]?.[feature.id]?.values?.[s.id];
                          return (
                            <div key={s.id} className="flex items-stretch" style={{
                              borderBottom: isLast ? 'none' : '1px solid var(--card-border)',
                              background: '#fff',
                            }}>
                              <div className="flex items-center gap-1.5 text-[12px] shrink-0"
                                style={{
                                  width: SETTING_COL_WIDTH,
                                  color: 'var(--text-primary)', fontWeight: 600,
                                  background: '#fff',
                                  borderRight: '1px solid var(--card-border)',
                                  position: 'sticky', left: 0, zIndex: 1,
                                  padding: '8px 12px 8px 20px',
                                }}>
                                <span className="truncate" title={s.label || feature.name}>{s.label || feature.name}</span>
                              </div>
                              <div className="compare-cell flex items-center gap-3" style={{ padding: '8px 16px', width: 400, minWidth: 0 }}>
                                <SettingControl s={s} value={value} onChange={(v) => onUpdateShared(feature.id, s.id, v)} compact />
                                <span className="text-[11px] italic shrink-0" style={{ color: 'var(--text-tertiary)' }}>
                                  Applies to all roles
                                </span>
                              </div>
                            </div>
                          );
                        }
                        if (s.dependsOn && !roles.some(r => isSettingVisibleForRole(s, r.id, feature.id, perRole, feature.settings))) {
                          return null;
                        }
                        const rowBg = isChild ? 'var(--soft-bg)' : '#fff';
                        return (
                          <div key={s.id} className="grid" style={{
                            gridTemplateColumns: `${SETTING_COL_WIDTH}px repeat(${roles.length}, ${ROLE_COL_WIDTH}px)`,
                            borderBottom: isLast ? 'none' : '1px solid var(--card-border)',
                            background: rowBg,
                            alignItems: 'stretch',
                          }}>
                            <div className="pl-5 pr-3 flex items-start gap-1.5 text-[12px]"
                              style={{
                                color: 'var(--text-primary)', fontWeight: isChild ? 500 : 600,
                                background: rowBg,
                                borderRight: '1px solid var(--card-border)',
                                position: 'sticky', left: 0, zIndex: 1,
                                padding: '10px 12px 10px 20px',
                              }}>
                              {isChild && <span aria-hidden="true" style={{ color: 'var(--brand)', opacity: 0.7 }}>↳</span>}
                              <span className="truncate" title={s.label}>{s.label}</span>
                            </div>
                            {roles.map((r, i) => {
                              const enabled = !!perRole[r.id]?.[feature.id]?.enabled;
                              const visible = isSettingVisibleForRole(s, r.id, feature.id, perRole, feature.settings);
                              const disabledStyle = enabled ? null : { opacity: 0.5, pointerEvents: 'none' };
                              const value = perRole[r.id]?.[feature.id]?.values?.[s.id];
                              return (
                                <div key={r.id} className="compare-cell flex justify-start items-start"
                                  style={{
                                    ...disabledStyle,
                                    borderRight: i === roles.length - 1 ? 'none' : '1px solid var(--card-border)',
                                    padding: '10px 16px',
                                  }}>
                                  {visible ? (
                                    <div className="flex flex-col gap-1">
                                      <CompareCellControl s={s} value={value}
                                        onChange={(v) => onUpdate(feature.id, r.id, s.id, v)}
                                        name={`cmp-${feature.id}-${s.id}-${r.id}`} />
                                      {r.id === 'everyone' && (s.id === 'specific-amount' || s.id === 'video-specific-amount') && (
                                        <p className="text-[11px] leading-snug" style={{ color: 'var(--danger)', maxWidth: 200 }}>
                                          Visitors may use multiple email addresses to bypass this limit.{' '}
                                          <a href="#" onClick={e => e.preventDefault()} style={{ color: 'var(--danger)', textDecoration: 'underline', textUnderlineOffset: '2px' }}>Learn more</a>
                                        </p>
                                      )}
                                    </div>
                                  ) : (
                                    <span className="text-[11px] italic" style={{ color: 'var(--text-tertiary)' }}>—</span>
                                  )}
                                </div>
                              );
                            })}
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Footer */}
            <footer className="flex items-center justify-center px-5 py-3 border-t shrink-0"
              style={{ borderColor: 'var(--card-border)' }}>
              <button onClick={onClose}
                className="text-[12px] font-bold tracking-wider uppercase px-6 py-2 rounded-full text-white transition-all"
                style={{ background: 'var(--brand)', boxShadow: 'var(--shadow-sm)' }}>
                Done
              </button>
            </footer>
          </div>
        </div>
      );
    };


    // ===== Mobile Feature Settings Modal =====
    // Full-screen sheet that hosts a feature's settings when triggered from the mobile
    // matrix. Uses the same MultiRoleSettingsBlock / SimpleSettingsBlock components so
    // changes flow back through the same update callbacks. Lock body scroll while open.
    const MobileFeatureSettingsModal = ({ feature, roles, perRole, onClose, onUpdate, onUpdateShared, onToggleEnabled }) => {
      useEffect(() => {
        lockBodyScroll();
        return () => unlockBodyScroll();
      }, []);
      return (
        <div style={{ position: 'fixed', inset: 0, zIndex: 50, display: 'flex', flexDirection: 'column', justifyContent: 'flex-end', background: 'rgba(27,28,31,0.45)', animation: 'backdrop-fade-in 0.2s ease' }} role="dialog" aria-modal="true">
          <div onClick={onClose} style={{ position: 'absolute', inset: 0 }} />
          <div className="sheet-panel" style={{
            position: 'relative', background: '#fff',
            borderRadius: '20px 20px 0 0',
            maxHeight: '92vh', display: 'flex', flexDirection: 'column',
            overflow: 'hidden',
            boxShadow: '0 -4px 24px rgba(0,0,0,0.10)',
          }}>
            {/* drag handle */}
            <div style={{ display: 'flex', justifyContent: 'center', padding: '10px 0 4px', flexShrink: 0 }}>
              <div style={{ width: 36, height: 4, borderRadius: 2, background: 'var(--card-border)' }} />
            </div>
            {/* title */}
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, padding: '8px 20px 12px', borderBottom: '1px solid var(--card-border)', flexShrink: 0 }}>
              {feature.icon && (
                <span style={{ display: 'flex', alignItems: 'center', width: 18, height: 18 }}>
                  <FeatureIcon name={feature.icon} />
                </span>
              )}
              <span style={{ fontSize: 15, fontWeight: 700, color: 'var(--text-primary)' }}>{feature.name}</span>
            </div>
          <div className="flex-1 overflow-y-auto mobile-feature-modal" style={{ background: 'var(--soft-bg)', minHeight: 0 }}>
            {(() => {
              const anyRoleEnabled = roles.some(r => !!perRole[r.id]?.[feature.id]?.enabled);
              const isOnlyRole = roles.length === 1;
              const hideRoleToggle = feature.sharedToggle || feature.appliesToAll;
              return roles.map(role => {
                const roleEnabled = !!perRole[role.id]?.[feature.id]?.enabled;
                const isGeneral = role.id === 'everyone';
                // General is always expanded if it's the only role, or no role has the feature on,
                // or General itself has the feature on. Other roles expand only when enabled.
                const showSettings = hideRoleToggle
                  ? true
                  : isGeneral
                    ? (isOnlyRole || !anyRoleEnabled || roleEnabled)
                    : roleEnabled;
                return (
                  <div key={role.id}>
                    {/* Role section header — toggle hidden for sharedToggle/appliesToAll features */}
                    {!hideRoleToggle && (
                      <div className="flex items-center justify-between px-4 py-3 bg-white border-b"
                        style={{ borderColor: 'var(--card-border)', borderTop: '1px solid var(--card-border)' }}>
                        <div className="flex items-center gap-2">
                          <span style={{
                            width: 8, height: 8, borderRadius: '50%', flexShrink: 0,
                            background: roleEnabled ? '#34C759' : 'var(--line)',
                            display: 'inline-block',
                          }} />
                          <span className="text-[11px] font-bold tracking-wider uppercase"
                            style={{ color: 'var(--text-secondary)' }}>{role.name}</span>
                        </div>
                        <Toggle size="sm" checked={roleEnabled}
                          onChange={() => onToggleEnabled && onToggleEnabled(role.id)} />
                      </div>
                    )}
                    {showSettings && (
                      <SimpleSettingsBlock feature={feature} role={role} perRole={perRole} onUpdate={onUpdate} />
                    )}
                  </div>
                );
              });
            })()}
          </div>
          <footer className="border-t bg-white p-3 shrink-0" style={{ borderColor: 'var(--card-border)' }}>
            <button onClick={onClose}
              className="w-full text-[14px] font-bold px-4 py-3 rounded-full text-white"
              style={{ background: 'var(--brand)' }}>
              Done
            </button>
          </footer>
          </div>
        </div>
      );
    };

    // ===== Contacts view =====
    const InfoCircle = ({ size = 13 }) => (
      <svg width={size} height={size} viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="8" cy="8" r="6.5" />
        <path d="M8 7.2v3.6M8 5.5v.01" />
      </svg>
    );
    const GearIcon = ({ size = 14 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="3" />
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
      </svg>
    );

    // Mobile section nav — replaces the inner sidebar on small screens.
    const MobileBottomBar = () => (
      <div className="mobile-only mobile-bottom-bar" style={{
        position: 'fixed', bottom: 0, left: 0, right: 0, zIndex: 40,
        flexDirection: 'column',
        background: '#fff', borderTop: '1px solid var(--card-border)',
        paddingBottom: 'env(safe-area-inset-bottom, 8px)',
      }}>
        <div style={{ padding: '10px 16px 6px' }}>
          <div className="flex items-center gap-2.5" style={{
            background: '#efefef', borderRadius: 100, padding: '10px 16px',
          }}>
            <SparkleIcon size={18} />
            <span style={{ fontSize: 14, color: '#aaa' }}>Ask me anything...</span>
          </div>
        </div>
        <div className="flex gap-3" style={{ padding: '6px 16px 14px' }}>
          <button className="flex-1 text-white text-[14px] font-bold py-3 rounded-full"
            style={{ background: 'var(--brand)' }}>Preview</button>
          <button className="flex-1 text-white text-[14px] font-bold py-3 rounded-full"
            style={{ background: 'var(--brand)' }}>Share Gallery</button>
        </div>
      </div>
    );

    const MobileSectionNav = ({ activeSection, onSelectSection, contactsCount }) => {
      const [sheetOpen, setSheetOpen] = React.useState(false);
      const items = [
        { id: 'access', label: 'Access' },
        { id: 'features', label: 'Gallery Features' },
        { id: 'contacts', label: `Contacts (${contactsCount})` },
        { id: 'store', label: 'Store' },
        { id: 'presets', label: 'Setting Presets' },
      ];
      const current = items.find(i => i.id === activeSection) || items[1];
      return (
        <div className="mobile-section-nav mobile-only mb-4">
          <button type="button" onClick={() => setSheetOpen(true)}
            className="flex items-center justify-between px-4 py-3 bg-white rounded-xl border w-full"
            style={{ borderColor: 'var(--card-border)' }}>
            <span className="text-[13px] font-bold" style={{ color: 'var(--text-primary)' }}>{current.label}</span>
            <ChevronDown size={15} style={{ color: 'var(--text-secondary)', flexShrink: 0 }} />
          </button>
          {sheetOpen && (
            <BottomSheet
              title="Settings"
              options={items.map(i => i.label)}
              value={current.label}
              onChange={label => { const item = items.find(i => i.label === label); if (item) onSelectSection(item.id); }}
              onClose={() => setSheetOpen(false)}
            />
          )}
        </div>
      );
    };

    // Card tile in the Access picker grid. The card surface is the click target.
    const AccessCard = ({ mode, selected, onSelect }) => {
      const Ico = mode.icon;
      return (
        <button type="button" onClick={onSelect}
          className="text-left rounded-xl px-5 py-5 bg-white border transition-colors"
          style={{
            borderColor: selected ? 'var(--brand)' : 'var(--card-border)',
            borderWidth: selected ? 2 : 1,
            // Pull the inner padding in by 1px when selected so the layout doesn't shift
            // when the border thickens.
            padding: selected ? '19px' : '20px',
          }}>
          <div className="mb-4" style={{ color: selected ? 'var(--brand)' : 'var(--text-secondary)' }}>
            <Ico size={26} stroke={1.7} />
          </div>
          <div className="text-[12px] font-extrabold tracking-wider uppercase mb-2" style={{ color: 'var(--text-primary)', letterSpacing: '0.05em' }}>
            {mode.label}
          </div>
          <div className="text-[12px] leading-relaxed" style={{ color: 'var(--text-secondary)' }}>
            {mode.card}
          </div>
        </button>
      );
    };

    // Extracted sub-component so useState is called at the top level (not inside an IIFE).
    const FeeBypassMobileAdder = ({ availRoles, feeBypassRoles, onChangeFeeBypassRoles }) => {
      const [open, setOpen] = useState(false);
      if (!availRoles.length) return null;
      return (
        <>
          <button type="button" onClick={() => setOpen(true)} className="text-[12px]"
            style={{ color: feeBypassRoles.length ? 'var(--brand)' : 'var(--text-secondary)', background: 'none', border: 'none', cursor: 'pointer', padding: '2px 4px' }}>
            {feeBypassRoles.length ? '+ Add role…' : 'Select roles…'}
          </button>
          {open && (
            <BottomSheet
              options={availRoles.map(r => r.name)}
              value=""
              label="Fee Bypass — Add Role"
              onChange={name => { const r = availRoles.find(x => x.name === name); if (r) onChangeFeeBypassRoles([...feeBypassRoles, r.id]); setOpen(false); }}
              onClose={() => setOpen(false)}
            />
          )}
        </>
      );
    };

    const AccessSection = ({
      mode, onSelectMode,
      showRegistration, onToggleRegistration,
      accessFeeEnabled, onToggleAccessFee,
      accessFeeAmount, onChangeAccessFeeAmount,
      accessFeeRole, onChangeAccessFeeRole,
      feeBypassRoles = [], onChangeFeeBypassRoles,
      roles, savedRoles, viewMode,
      collectEmailEnabled, onToggleCollectEmail,
      collectEmailOptional, onToggleCollectEmailOptional,
      customFormEnabled, onToggleCustomForm,
      customFormOptional, onToggleCustomFormOptional,
      onEditCustomForm,
      allowSearch, onToggleSearch,
      activeSection, onSelectSection, contactsCount,
    }) => {
      const isElevated = viewMode === 'professional' || viewMode === 'advanced';
      const systemRoles = [
        { id: 'everyone', name: 'General' },
        { id: '__guest__', name: 'Guest' },
        { id: '__client__', name: 'Client' },
      ];
      const galleryCustomRoles = isElevated ? (roles || []).filter(r => r.isCustom) : [];
      const savedNotInGallery = isElevated ? (savedRoles || []).filter(s =>
        !(roles || []).some(r => r.name.toLowerCase() === s.name.toLowerCase())
      ) : [];
      const [showAdvanced, setShowAdvanced] = useState(false);
      const [searchEngines, setSearchEngines] = useState(false);
      const [zenfolioSearch, setZenfolioSearch] = useState(true);
      const [folderSearch, setFolderSearch] = useState(false);
      const [galleryStatus, setGalleryStatus] = useState('active');
      const [expirationDate, setExpirationDate] = useState('');
      const isMobile = useIsMobile();

      const [feeDetailsOpen, setFeeDetailsOpen] = useState(false);
      const [feeTitle, setFeeTitle] = useState('Access Fee');
      const [feeDesc, setFeeDesc] = useState("By filling out the form and clicking 'Continue, you will be prompted to pay a one time Access Fee.");
      const [feeConfirm, setFeeConfirm] = useState("We're pleased to confirm that we have received your payment.");

      const [galleryPassword, setGalleryPassword] = useState('');
      const PASS_WORDS = ['amber','bravo','cedar','delta','ember','fjord','grove','hazel','ivory','jade','kestrel','lunar','maple','noble','opal','prism','quartz','riven','solar','tidal','ultra','vivid','willow','xenon','yield','zephyr'];
      const genAlphanumeric = () => {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
        return Array.from({ length: 8 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
      };
      const genPassphrase = () => {
        const pick = () => PASS_WORDS[Math.floor(Math.random() * PASS_WORDS.length)];
        return `${pick()}-${pick()}-${pick()}`;
      };

      // Row component for registration sub-options

                      <textarea value={feeDesc} onChange={e => setFeeDesc(e.target.value)} rows={4}

                    </div>
                    <div>
                      <label className="block text-[13px] font-semibold mb-1.5" style={{ color: 'var(--text-primary)' }}>Payment Confirmation Message</label>
                      <textarea value={feeConfirm} onChange={e => setFeeConfirm(e.target.value)} rows={4}
                        className="w-full px-3 py-2 rounded border text-[13px] outline-none resize-none"
                        style={{ borderColor: 'var(--card-border)', color: 'var(--text-primary)' }} />

                  </div>
                </div>
              </div>,
              document.body

          })()}

    // 18 placeholder photos for the Organize tab demo grid.

      { id:'fp1',  label:'1 - 1',  src:'https://picsum.photos/seed/gal101/400/300' },
      { id:'fp2',  label:'2 - 2',  src:'https://picsum.photos/seed/gal102/400/300' },
      { id:'fp3',  label:'3 - 3',  src:'https://picsum.photos/seed/gal103/400/300' },
      { id:'fp4',  label:'4 - 4',  src:'https://picsum.photos/seed/gal104/400/300' },
      { id:'fp5',  label:'5 - 5',  src:'https://picsum.photos/seed/gal105/400/300' },
      { id:'fp6',  label:'6 - pexels-yankrukov-5791377.jpg', src:'https://picsum.photos/seed/gal106/400/300' },
      { id:'fp7',  label:'7 - pexels-yankrukov-5791378.jpg', src:'https://picsum.photos/seed/gal107/400/300' },
      { id:'fp8',  label:'8 - pexels-yankrukov-5791379.jpg', src:'https://picsum.photos/seed/gal108/400/300' },
      { id:'fp9',  label:'9 - pexels-yankrukov-5791380.jpg', src:'https://picsum.photos/seed/gal109/400/300' },
      { id:'fp10', label:'10 - pexels-yankrukov-5791382.jpg',src:'https://picsum.photos/seed/gal110/400/300' },
      { id:'fp11', label:'11 - pexels-yankrukov-5791384.jpg',src:'https://picsum.photos/seed/gal111/400/300' },
      { id:'fp12', label:'12 - pexels-yankrukov-5791386.jpg',src:'https://picsum.photos/seed/gal112/400/300' },
      { id:'fp13', label:'13 - pexels-yankrukov-5791387.jpg',src:'https://picsum.photos/seed/gal113/400/300' },
      { id:'fp14', label:'14 - pexels-yankrukov-5791388.jpg',src:'https://picsum.photos/seed/gal114/400/300' },
      { id:'fp15', label:'15 - pexels-yankrukov-5791389.jpg',src:'https://picsum.photos/seed/gal115/400/300' },
      { id:'fp16', label:'16 - pexels-yankrukov-5791390.jpg',src:'https://picsum.photos/seed/gal116/400/300' },
      { id:'fp17', label:'17 - pexels-yankrukov-5791391.jpg',src:'https://picsum.photos/seed/gal117/400/300' },
      { id:'fp18', label:'18 - pexels-yankrukov-5791394.jpg',src:'https://picsum.photos/seed/gal118/400/300' },
    ];
    // Initial overrides for the demo:
    //   fp2, fp7 → valid Selected Roles Only (role 'everyone' always exists)
    //   fp3, fp5, fp8 → INVALID Selected Roles Only (role IDs not in gallery → triggers warning)
    const INITIAL_PHOTO_OVERRIDES = {
      fp2: { accessLevel: 'selectedRoles', selectedRoleIds: ['everyone'] },
      fp7: { accessLevel: 'selectedRoles', selectedRoleIds: ['everyone'] },
      fp3: { accessLevel: 'selectedRoles', selectedRoleIds: ['__gone_1__'] },
      fp5: { accessLevel: 'selectedRoles', selectedRoleIds: ['__gone_2__'] },
      fp8: { accessLevel: 'selectedRoles', selectedRoleIds: ['__gone_3__'] },
    };

    // ── Fake contact list for the "Add from Contacts" modal ──────────────────
    const FAKE_CONTACTS = (() => {
      const firsts = ['Aaron','Abby','Adam','Alice','Amanda','Andrew','Anna','Barbara','Beth','Brian','Carlos','Carol','Chris','Dana','David','Diana','Edward','Elena','Emily','Eric','Fiona','Frank','Grace','Hannah','Henry','Isabel','Jack','Jane','Jennifer','John','Julia','Karen','Kevin','Laura','Lisa','Mark','Mary','Michael','Nancy','Nick','Olivia','Paul','Peter','Rachel','Rebecca','Robert','Sandra','Sarah','Scott','Sophie','Stephanie','Steve','Susan','Thomas','Tina','Tom','Victoria','Will','Zoe'];
      const lasts = ['Anderson','Bennett','Campbell','Carter','Clark','Collins','Davis','Evans','Fisher','Garcia','Green','Hall','Harris','Jackson','Johnson','Jones','King','Lee','Lewis','Martin','Martinez','Miller','Mitchell','Moore','Nelson','Parker','Perez','Roberts','Robinson','Rodriguez','Scott','Smith','Taylor','Thomas','Thompson','Turner','Walker','White','Williams','Wilson','Wood','Wright','Young'];
      const domains = ['gmail.com','yahoo.com','outlook.com','icloud.com','yopmail.com','hotmail.com'];
      const out = [];
      let seed = 42;
      const rand = (n) => { seed = (seed * 1664525 + 1013904223) & 0xffffffff; return Math.abs(seed) % n; };
      for (let i = 0; i < 120; i++) {
        const f = firsts[rand(firsts.length)];
        const l = lasts[rand(lasts.length)];
        const n = rand(90) + 10;
        out.push({ id: `fc-${i}`, first: f, last: l, email: `${f.toLowerCase()}.${l.toLowerCase()}${n}@${domains[rand(domains.length)]}` });
      }
      return out.sort((a, b) => a.first.localeCompare(b.first) || a.last.localeCompare(b.last));
    })();

    const AddFromContactsModal = ({ roles, onClose, onAdd }) => {
      const [search, setSearch] = useState('');
      const [page, setPage] = useState(0);
      const [selected, setSelected] = useState(new Set());
      const [roleMenuOpen, setRoleMenuOpen] = useState(false);
      const [adding, setAdding] = useState(false);
      const [addDone, setAddDone] = useState(false);
      const roleMenuRef = React.useRef(null);

      const otherRoles = roles.filter(r => r.id !== 'everyone');
      const everyone = roles.find(r => r.id === 'everyone');
      const allRoles = otherRoles.length ? otherRoles : (everyone ? [everyone] : []);

      const filtered = FAKE_CONTACTS.filter(c => {
        const q = search.toLowerCase();
        return !q || c.first.toLowerCase().includes(q) || c.last.toLowerCase().includes(q) || c.email.toLowerCase().includes(q);
      });

      const PAGE_SIZE = 25;
      const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
      const safePage = Math.min(page, Math.max(0, totalPages - 1));
      const pageRows = filtered.slice(safePage * PAGE_SIZE, safePage * PAGE_SIZE + PAGE_SIZE);

      const allChecked = pageRows.length > 0 && pageRows.every(c => selected.has(c.id));
      const someChecked = pageRows.some(c => selected.has(c.id));

      const toggleAll = () => {
        if (allChecked) {
          const next = new Set(selected);
          pageRows.forEach(c => next.delete(c.id));
          setSelected(next);
        } else {
          const next = new Set(selected);
          pageRows.forEach(c => next.add(c.id));
          setSelected(next);
        }
      };

      const toggle = (id) => {
        const next = new Set(selected);
        next.has(id) ? next.delete(id) : next.add(id);
        setSelected(next);
      };

      const handleAddAs = (role) => {
        setRoleMenuOpen(false);
        setAdding(true);
        setTimeout(() => {
          const toAdd = FAKE_CONTACTS.filter(c => selected.has(c.id));
          toAdd.forEach(c => onAdd({ first: c.first, last: c.last, email: c.email, mobile: '', roleId: role.id }));
          setAdding(false);
          setAddDone(true);
          setTimeout(() => onClose(), 900);
        }, 1400);
      };

      // Close role menu on outside click
      useEffect(() => {
        if (!roleMenuOpen) return;
        const handler = (e) => { if (roleMenuRef.current && !roleMenuRef.current.contains(e.target)) setRoleMenuOpen(false); };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, [roleMenuOpen]);

      const canAdd = selected.size > 0 && !adding && !addDone;

      return ReactDOM.createPortal(
        <div className="fixed inset-0 bg-white flex flex-col" style={{ zIndex: 8000 }}>
          {/* Header */}
          <div className="flex items-center px-6 py-4 border-b" style={{ borderColor: 'var(--card-border)' }}>
            <button onClick={onClose} className="flex items-center gap-1.5 text-[13px] font-medium mr-auto"
              style={{ color: 'var(--text-secondary)' }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M19 12H5M12 5l-7 7 7 7"/>
              </svg>
              Back to gallery
            </button>
            <h2 className="absolute left-1/2 -translate-x-1/2 text-[14px] font-bold tracking-wider" style={{ color: 'var(--text-primary)' }}>ADD FROM CONTACTS</h2>
            <button onClick={onClose} className="ml-auto kebab-btn rounded p-1" style={{ color: 'var(--text-tertiary)' }}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M3 3l10 10M13 3L3 13"/></svg>
            </button>
          </div>

          {/* Tabs */}
          <div className="flex items-center gap-6 px-6 border-b" style={{ borderColor: 'var(--card-border)' }}>
            {['Contacts', 'CSV'].map((t, i) => (
              <div key={t} className="relative py-3 text-[13px] cursor-default"
                style={{ fontWeight: i === 0 ? 700 : 500, color: i === 0 ? 'var(--text-primary)' : 'var(--text-tertiary)' }}>
                {t}
                {i === 0 && <span style={{ position: 'absolute', left: 0, right: 0, bottom: -1, height: 2, background: 'var(--brand)' }} />}
              </div>
            ))}
          </div>

          {/* Search */}
          <div className="px-6 py-3 border-b" style={{ borderColor: 'var(--card-border)' }}>
            <div className="flex items-center gap-2 border rounded-md px-3 py-2 bg-white" style={{ borderColor: 'var(--card-border)', maxWidth: 260 }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ color: 'var(--text-tertiary)', flexShrink: 0 }}>
                <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
              </svg>
              <input autoFocus value={search} onChange={e => { setSearch(e.target.value); setPage(0); }}
                placeholder="Search" className="flex-1 text-[13px] outline-none bg-transparent"
                style={{ color: 'var(--text-primary)' }} />
            </div>
          </div>

          {/* Table */}
          <div className="flex-1 overflow-y-auto">
            {/* Column headers */}
            <div className="grid border-b px-6 py-2.5" style={{ gridTemplateColumns: '32px 1fr 1fr 2fr', borderColor: 'var(--card-border)', background: '#fff', position: 'sticky', top: 0, zIndex: 1 }}>
              <span className="flex items-center">
                <span onClick={toggleAll}
                  className="flex items-center justify-center rounded border-2 transition-all cursor-pointer"
                  style={{ width: 17, height: 17, borderColor: allChecked ? 'var(--brand)' : someChecked ? 'var(--brand)' : 'var(--line)', background: allChecked ? 'var(--brand)' : '#fff' }}>
                  {allChecked && <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20,6 9,17 4,12"/></svg>}

              </span>
              {['FIRST', 'LAST', 'EMAIL'].map(h => (
                <span key={h} className="text-[11px] font-bold tracking-wider" style={{ color: 'var(--text-tertiary)' }}>{h}</span>
              ))}
            </div>
            {/* Rows */}
            {pageRows.map(c => {
              const checked = selected.has(c.id);
              return (
                <div key={c.id} onClick={() => toggle(c.id)}
                  className="grid px-6 py-3 cursor-pointer border-b items-center transition-colors"
                  style={{ gridTemplateColumns: '32px 1fr 1fr 2fr', borderColor: 'var(--card-border)', background: checked ? 'var(--orange-soft)' : '#fff' }}>
                  <span className="flex items-center">
                    <span className="flex items-center justify-center rounded border-2 transition-all"

                    </span>

                  <span className="text-[13px]" style={{ color: 'var(--text-primary)' }}>{c.first}</span>

                  <span className="text-[13px]" style={{ color: 'var(--brand)', textDecoration: 'underline' }}>{c.email}</span>
                </div>
              );
            })}
            {/* Pagination */}
            {totalPages > 1 && (
              <div className="flex items-center justify-between px-6 py-3 border-t" style={{ borderColor: 'var(--card-border)', background: '#fff' }}>
                <span className="text-[12px]" style={{ color: 'var(--text-tertiary)' }}>

                    style={{ width: 30, height: 30, border: '1px solid var(--card-border)', background: '#fff', cursor: safePage === 0 ? 'not-allowed' : 'pointer' }}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M15 18l-6-6 6-6"/></svg>
                  </button>
                  {Array.from({ length: totalPages }, (_, i) => i).filter(i => i === 0 || i === totalPages - 1 || Math.abs(i - safePage) <= 1).reduce((acc, i, idx, arr) => {
                    if (idx > 0 && i - arr[idx - 1] > 1) acc.push('…');
                    acc.push(i);
                    return acc;
                  }, []).map((item, idx) => item === '…' ? (
                    <span key={`ellipsis-${idx}`} className="text-[12px] px-1" style={{ color: 'var(--text-tertiary)' }}>…</span>

                    <button key={item} onClick={() => setPage(item)}
                      className="flex items-center justify-center rounded-md text-[12px] font-medium transition-colors"
                      style={{ width: 30, height: 30, background: item === safePage ? 'var(--brand)' : '#fff', color: item === safePage ? '#fff' : 'var(--text-secondary)', border: `1px solid ${item === safePage ? 'var(--brand)' : 'var(--card-border)'}`, cursor: 'pointer' }}>

                    style={{ width: 30, height: 30, border: '1px solid var(--card-border)', background: '#fff', cursor: safePage === totalPages - 1 ? 'not-allowed' : 'pointer' }}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M9 18l6-6-6-6"/></svg>
                  </button>
                </div>
              </div>

          </div>

          {/* Footer bar */}
          <div className="flex items-center justify-end gap-3 px-6 py-4 border-t" style={{ borderColor: 'var(--card-border)', background: '#1a1a1a', minHeight: 64 }}>
            {selected.size > 0 && (
              <span className="mr-auto text-[13px] font-medium" style={{ color: '#fff' }}>
                {selected.size} Contact{selected.size !== 1 ? 's' : ''} selected
              </span>
            )}
            <div className="flex items-center" ref={roleMenuRef} style={{ position: 'relative' }}>
              {/* Role popup menu — only when there are named roles */}
              {roleMenuOpen && allRoles.length > 0 && (
                <div className="absolute bottom-full right-0 mb-2 bg-white rounded-xl border shadow-xl py-1.5 min-w-[160px]"
                  style={{ borderColor: 'var(--card-border)', zIndex: 10 }}>
                  {allRoles.map(r => (
                    <button key={r.id} onClick={() => handleAddAs(r)}
                      className="menu-item w-full text-left text-[13px] font-medium px-4 py-2.5"
                      style={{ color: 'var(--text-primary)' }}>
                      {r.name}
                    </button>
                  ))}
                </div>
              )}
              {otherRoles.length === 0 ? (
                /* No named roles — plain Add button */
                <div className="flex items-center rounded-full overflow-hidden" style={{ background: canAdd ? 'var(--brand)' : '#555' }}>
                  <button disabled={!canAdd && !adding && !addDone}
                    onClick={() => canAdd && handleAddAs(everyone || allRoles[0])}
                    className="flex items-center gap-2 text-[13px] font-bold tracking-wider px-5 py-2.5 text-white transition-all"
