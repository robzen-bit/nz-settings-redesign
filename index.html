<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sample Gallery — Gallery Features (RV1)</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* =====================================================================
       v5 — Zenfolio design tokens (synced with style-guide + ui-component-library).
       The original v1–v4 prototype variables (--brand, --page-bg, --text-primary, …)
       are kept but RE-POINTED to the new style guide values so every existing
       reference in the file picks up the new palette automatically.
       New style guide tokens (--orange*, --teal*, --bg*, --line*, --text*, --r-*,
       --shadow-*) are added alongside for new/refined components.
    ===================================================================== */
    :root {
      /* Brand — orange */
      --orange: #F26B3A;
      --orange-soft: #FFF1E9;
      --orange-deep: #D9521F;
      --orange-darker: #B84115;

      /* Accent — teal */
      --teal: #2DB3A6;
      --teal-soft: #E3F5F2;
      --teal-deep: #1FA294;

      --yellow: #F4C430;
      --yellow-soft: #FFF6DC;

      /* Neutrals */
      --bg: #F5F5F7;
      --bg-2: #FBFBFD;
      --surface: #FFFFFF;
      --surface-elev: #FFFFFF;
      --sidebar: #1D1F23;
      --line: #E8E8ED;
      --line-2: #F0F0F3;
      --line-subtle: rgba(0,0,0,0.06);
      --bg-subtle: rgba(0,0,0,0.04);
      --bg-hover: #EFEFF1;
      --bg-active: #E5E5EA;
      --text: #1D1D1F;
      --text-2: #424247;
      --text-3: #86868B;
      --text-4: #B0B0B6;
      --on-text: #FFFFFF;
      --on-brand: #FFFFFF;

      /* Soft semantic backgrounds */
      --success-soft: #E8F5F1;
      --danger-soft: #FFE4E4;
      --info-soft: #EEF1FF;
      --warning-soft: #FFF6DC;

      /* Disabled fills */
      --orange-disabled: #FBC4A8;
      --teal-disabled: #B5E3DC;
      --danger-disabled: #F4B4B4;

      /* Semantic */
      --success: #0D7567;
      --warning: #B8860B;
      --info: #3D4FB8;

      /* Radii */
      --r-xs: 6px;
      --r-sm: 10px;
      --r-md: 14px;
      --r-lg: 20px;
      --r-xl: 28px;

      /* Shadows */
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04), 0 1px 1px rgba(0,0,0,0.02);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
      --shadow-lg: 0 14px 32px rgba(0,0,0,0.06), 0 4px 8px rgba(0,0,0,0.03);
      --shadow-xl: 0 30px 60px rgba(0,0,0,0.10), 0 8px 16px rgba(0,0,0,0.04);

      /* ---- Legacy v1–v4 aliases mapped to the new tokens.
              Every var(--brand) / var(--page-bg) / var(--text-primary) … reference
              throughout the file is preserved and now picks up the new palette. ---- */
      --brand: var(--orange);
      --brand-hover: var(--orange-deep);
      --brand-deep: var(--orange-darker);
      --brand-cream: var(--orange-soft);
      --brand-cream-deep: #FBE0CC;
      --page-bg: var(--bg);
      --card-bg: var(--surface);
      --card-border: var(--line);
      --soft-bg: var(--bg-2);
      --row-hover: var(--bg-hover);
      --text-primary: var(--text);
      --text-secondary: var(--text-2);
      --text-tertiary: var(--text-3);
      --off-bg: #E5E5EA;
      --off-text: var(--text-3);
      --green: var(--success);
      --danger: #DC2626;
      --nav-bg: var(--sidebar);
      --nav-text: #B0B0B6;
      --nav-active-bg: rgba(242,107,58,0.14);

      color-scheme: light;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: -0.01em;
      background: var(--bg);
      color: var(--text);
      margin: 0;
    }
    .toggle-track { transition: background-color 0.2s ease; }
    .toggle-thumb { transition: transform 0.2s ease; }
    .pp-row .pp-shared-action { opacity: 0; transition: opacity 0.15s; }
    .pp-row:hover .pp-shared-action { opacity: 1; }
    .modal-backdrop { animation: fadeIn 0.15s ease-out; }
    .modal-card { animation: popIn 0.18s ease-out; }
    .menu-pop { animation: popIn 0.12s ease-out; transform-origin: top right; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes popIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
    /* ============ Bottom-sheet drawer ============ */
    @keyframes sheet-slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes backdrop-fade-in { from { opacity: 0; } to { opacity: 1; } }
    .sheet-backdrop { animation: backdrop-fade-in 0.2s ease-out; }
    .sheet-panel { animation: sheet-slide-up 0.25s cubic-bezier(0.32, 0.72, 0, 1); }
    .sheet-item { transition: background-color 0.12s; }
    .sheet-item:active { background-color: #F4F3EF; }
    .role-card-hover:hover:not(.is-disabled) { border-color: var(--brand) !important; background: var(--brand-cream) !important; }
    .role-card-hover:hover:not(.is-disabled) .role-card-icon { color: var(--brand); }
    .role-card-hover.is-disabled { opacity: 0.5; cursor: not-allowed; }
    .menu-item:hover { background: var(--soft-bg); }
    .menu-item-danger:hover { background: #FDF0F0; }
    .add-role-btn { background: var(--brand); transition: background 0.15s; }
    .add-role-btn:hover { background: var(--brand-hover); }
    .feature-row { transition: background-color 0.15s; }
    .feature-row.is-collapsible:not(.is-open):hover { background: var(--row-hover); }
    .info-tooltip-icon:hover { color: var(--brand); }
    .kebab-btn:hover { background: rgba(0,0,0,0.06); color: var(--text-secondary); }
    /* Matrix horizontal scroll — kicks in once total grid width exceeds the panel width
       (e.g. advanced setups with many roles). Thin, subtle scrollbar so it doesn't dominate. */
    .matrix-scroll { border-radius: 12px; }
    .matrix-scroll::-webkit-scrollbar { height: 8px; }
    .matrix-scroll::-webkit-scrollbar-track { background: transparent; }
    .matrix-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.18); border-radius: 4px; }
    .matrix-scroll::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.28); }
    .compare-roles-btn:hover { background: var(--brand-cream) !important; }
    .compare-all-btn:hover { background: var(--brand-cream) !important; }
    /* Compare-roles modal — uses the same scrollbar styling as the matrix when the grid
       grows wider than the modal viewport (many roles). */
    .compare-grid-scroll { overflow-x: auto; overflow-y: visible; }
    .compare-grid-scroll::-webkit-scrollbar { height: 8px; }
    .compare-grid-scroll::-webkit-scrollbar-track { background: transparent; }
    .compare-grid-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.18); border-radius: 4px; }
    .compare-grid-scroll::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.28); }
    .modal-card.compare-all-fullscreen { border-radius: 0 !important; box-shadow: none !important; }
    .compare-feature-header-expandable:hover { background: #f5f5f5 !important; }
    .compare-feature-header-expandable:hover .compare-feature-header-sticky { background: #f5f5f5 !important; }
    /* Compare cells — make controls inside them fit the column width so long
       option labels don't overflow into the next column. (Selects are now expanded
       to radio lists inside the Compare-All modal, but if any survive, they flex.) */
    .compare-cell > .relative.inline-block,
    .compare-cell > .v5-select-wrap { display: block; width: 100%; }
    .compare-cell input[type="number"] { width: 100% !important; }
    /* Access mode picker grid — collapse to 2 cols on narrow screens, 1 col on phones. */
    @media (max-width: 900px) {
      .access-grid { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
    }
    @media (max-width: 540px) {
      .access-grid { grid-template-columns: 1fr !important; }
    }
    /* ===== Side-nav items — match the style guide's sidebar treatment.
       Active uses an orange-soft gradient + inset orange ring; the icon picks up the orange. */
    .nav-item {
      transition: color 0.15s, background 0.15s, box-shadow 0.15s;
      color: var(--nav-text);
    }
    .nav-item:hover { color: #fff; background: rgba(255,255,255,0.05); }
    .nav-item.is-active {
      color: #fff;
      background: linear-gradient(180deg, rgba(242,107,58,0.22), rgba(242,107,58,0.10));
      box-shadow: inset 0 0 0 1px rgba(242,107,58,0.35);
    }
    .nav-item.is-active svg { color: var(--orange); }
    .tab-btn { position: relative; transition: color 0.15s; }
    .tab-btn:hover { color: var(--text-primary); }
    .tab-btn.is-active { color: var(--text-primary); font-weight: 600; }
    .tab-btn.is-active::after {
      content: '';
      position: absolute; left: 12px; right: 12px; bottom: -1px; height: 2px;
      background: var(--brand); border-radius: 2px;
    }
    /* Primary (black) button — synced with style guide .btn-primary */
    .preview-btn {
      background: var(--text);
      color: var(--on-text);
      transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }
    .preview-btn:hover { background: #000; transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .preview-btn:active { background: #000; transform: translateY(0); box-shadow: var(--shadow-sm); }
    .preview-btn:focus-visible { outline: 2px solid var(--orange); outline-offset: 3px; }
    /* Soft disabled button — synced with style guide .btn-soft.is-disabled */
    .share-btn {
      background: var(--bg);
      color: var(--text-4);
      cursor: not-allowed;
      transition: none;
    }
    .share-btn:disabled { cursor: not-allowed; }
    /* Outline brand button hover — used by OutlineCtaBtn */
    .outline-cta-btn:hover { background: var(--orange-soft) !important; border-color: var(--orange-deep) !important; color: var(--orange-deep) !important; }
    .outline-cta-btn:active { transform: translateY(0); }
    /* ===== Radio button — synced with style guide (.radio-dot 18px) ===== */
    .radio-dot {
      width: 18px; height: 18px; border-radius: 999px;
      border: 1.5px solid var(--text-4); background: var(--surface);
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: border-color .15s, background-color .15s, box-shadow .15s;
    }
    .radio-dot:hover:not(.is-on) { border-color: var(--text-3); }
    .radio-dot.is-on {
      background: var(--orange);
      border-color: var(--orange);
    }
    .radio-dot.is-on::after {
      content: ''; width: 8px; height: 8px; border-radius: 999px; background: var(--on-brand);
    }
    .radio-dot.is-focus,
    label:focus-within .radio-dot,
    .radio-dot:focus-visible { box-shadow: 0 0 0 3px rgba(242,107,58,0.22); outline: none; }
    /* ===== Checkbox — synced with style guide (.check-box 18px, 5px radius) ===== */
    .check-box {
      width: 18px; height: 18px; border-radius: 5px;
      border: 1.5px solid var(--text-4);
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--surface); flex-shrink: 0;
      transition: border-color .15s, background-color .15s, box-shadow .15s;
    }
    .check-box:hover:not(.is-on) { border-color: var(--text-3); }
    .check-box.is-on { background: var(--orange); border-color: var(--orange); }
    .check-box.is-on::after {
      content: ''; width: 9px; height: 5px; border-left: 2px solid var(--on-brand); border-bottom: 2px solid var(--on-brand);
      transform: rotate(-45deg) translate(1px, -1px);
    }
    .check-box.is-focus,
    label:focus-within .check-box,
    .check-box:focus-visible { box-shadow: 0 0 0 3px rgba(242,107,58,0.22); outline: none; }
    .role-row.is-off { opacity: 0.55; }

    /* ===== v5 polish — buttons, inputs, selects, focus rings ===== */
    /* Brand "Add Role" / primary actions use pill radius + soft drop shadow on hover */
    .add-role-btn {
      background: var(--orange);
      color: var(--on-brand);
      transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
      box-shadow: var(--shadow-sm);
    }
    .add-role-btn:hover {
      background: var(--orange-deep);
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(242,107,58,0.30);
    }
    .add-role-btn:active { background: var(--orange-darker); transform: translateY(0); }
    /* Compare button — outline pill with subtle hover */
    .compare-all-btn {
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .compare-all-btn:hover {
      background: var(--orange-soft) !important;
      border-color: var(--orange) !important;
      color: var(--orange-deep) !important;
    }
    .compare-roles-btn:hover { background: var(--orange-soft) !important; color: var(--orange-deep) !important; }
    /* Inputs / selects — focus ring */
    select:focus, input:focus, textarea:focus { outline: none; }
    .v5-input,
    select.v5-select,
    input.v5-input,
    textarea.v5-input {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      padding: 9px 14px;
      font-size: 13.5px;
      color: var(--text);
      transition: border-color .15s, box-shadow .15s, background .15s;
    }
    .v5-input:hover:not(:disabled):not(:focus),
    select.v5-select:hover:not(:disabled):not(:focus) { border-color: var(--text-4); }
    .v5-input:focus,
    select.v5-select:focus,
    input.v5-input:focus,
    textarea.v5-input:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(242,107,58,0.18);
    }
    /* Restyle all native selects in the prototype to match the style guide */
    select {
      font-family: inherit;
      transition: border-color .15s, box-shadow .15s, background .15s;
    }
    select:focus {
      border-color: var(--orange) !important;
      box-shadow: 0 0 0 3px rgba(242,107,58,0.18);
    }
    /* Number inputs */
    input[type="number"], input[type="text"], input[type="email"], input[type="search"], textarea {
      font-family: inherit;
      transition: border-color .15s, box-shadow .15s, background .15s;
    }
    input[type="number"]:focus,
    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="search"]:focus,
    textarea:focus {
      border-color: var(--orange) !important;
      box-shadow: 0 0 0 3px rgba(242,107,58,0.18);
    }
    /* Subtle focus ring on icon buttons */
    .kebab-btn:focus-visible { outline: 2px solid var(--orange); outline-offset: 2px; }
    /* Status pill helper (used in the multi-role panel) */
    .v5-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 10px; border-radius: 999px;
      font-size: 11.5px; font-weight: 500;
    }
    .v5-pill.success { background: var(--success-soft); color: var(--success); }
    .v5-pill.warning { background: var(--warning-soft); color: var(--warning); }
    .v5-pill.paused  { background: var(--bg-subtle);    color: var(--text-3); }
    .v5-pill.brand   { background: var(--orange-soft);  color: var(--orange-deep); }
    /* Card / panel surface */
    .v5-panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-sm);
    }
    /* Modal card refinements — picked up by the existing modal-card class */
    .modal-card {
      border-radius: var(--r-xl) !important;
      box-shadow: var(--shadow-xl);
    }
    /* Underline tab — already keyed off .tab-btn.is-active, but harmonize the underline weight */
    .tab-btn.is-active::after { background: var(--orange) !important; height: 2px !important; bottom: -1px !important; }

    /* ===== Select / dropdown — synced with ui-component-library §02 =====
       Custom (not native) so we can render the popover, hover, selected highlight,
       and check icon exactly as specified. */
    .v5-select-wrap { position: relative; }
    .v5-select-btn {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      padding: 9px 12px 9px 14px;
      font: inherit;
      font-size: 13.5px;
      font-family: inherit;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s, background .15s;
    }
    .v5-select-btn:hover:not(:disabled):not(.is-open) { border-color: var(--text-4); }
    .v5-select-btn:focus,
    .v5-select-btn.is-open {
      border-color: var(--orange) !important;
      box-shadow: 0 0 0 3px rgba(242,107,58,0.18);
      outline: none;
    }
    .v5-select-btn:disabled {
      background: var(--bg);
      color: var(--text-4);
      cursor: not-allowed;
      border-color: var(--line-2);
    }
    /* Value text — truncate with ellipsis so long labels don't cover the chevron */
    .v5-select-value {
      flex: 1 1 auto; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .v5-select-chev {
      flex: 0 0 auto;
      display: inline-flex; align-items: center; justify-content: center;
      width: 14px; height: 14px;
      color: var(--text-3);
      transition: transform .2s, opacity .15s;
    }
    .v5-select-chev.is-open { transform: rotate(180deg); }
    .v5-select-btn:disabled .v5-select-chev { opacity: 0.5; }
    /* Popover menu — matches §02 spec.
       Rendered through a React portal at document.body with position:fixed so it
       escapes overflow:hidden ancestors (e.g. the rounded per-role settings card). */
    .v5-select-menu {
      background: var(--surface-elev);
      border: 1px solid var(--line);
      border-radius: var(--r-md);
      padding: 6px;
      box-shadow: var(--shadow-lg);
      max-height: 320px;
      overflow-y: auto;
      animation: popIn 0.12s ease-out;
      transform-origin: top center;
    }
    .v5-select-option {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 10px;
      border-radius: var(--r-xs);
      font-size: 13px; color: var(--text-2);
      cursor: pointer;
      transition: background-color .12s, color .12s;
    }
    .v5-select-option-label {
      flex: 1 1 auto; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .v5-select-option-check {
      flex: 0 0 auto;
      width: 14px; height: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      margin-left: auto;
    }
    .v5-select-option:hover { background: var(--bg-hover); color: var(--text); }
    .v5-select-option.is-selected {
      background: var(--orange-soft);
      color: var(--orange-deep);
      font-weight: 500;
    }
    .v5-select-option.is-selected:hover { background: var(--orange-soft); color: var(--orange-deep); }
    /* In the Compare-All modal, selects collapse to radio lists, so the wrap is
       rarely used there — but if it appears, keep it flexing to fill the column */
    .compare-cell .v5-select-wrap { display: block; width: 100%; min-width: 0 !important; }
    .compare-cell .v5-select-btn { width: 100%; }

    /* Per-role rows have a uniform height on desktop so cells line up regardless
       of which control (dropdown vs. checkboxes vs. toggle) they contain. */
    .per-role-row { min-height: 55px; }

    /* ============ Mobile responsive (<= 768px) ============ */
    .mobile-only { display: none; }
    .gallery-header-mobile { display: none; }
    @media (max-width: 768px) {
      .mobile-only { display: flex !important; }
      .desktop-only { display: none !important; }
      .zenfolio-nav { display: none !important; }
      /* Desktop top bar is replaced on mobile by the black gallery header */
      .top-bar { display: none !important; }
      .gallery-header { display: none !important; }
      .gallery-header-mobile { display: block !important; }
      .tabs-row {
        padding-left: 16px !important; padding-right: 16px !important;
        overflow-x: auto; -webkit-overflow-scrolling: touch;
        flex-wrap: nowrap !important;
        gap: 16px !important;
        justify-content: space-between;
      }
      .tabs-row .tab-btn { font-size: 16px !important; padding: 14px 4px !important; }
      .tabs-row .tab-btn.is-active { color: var(--brand) !important; font-weight: 700 !important; }
      .tabs-row .tab-btn.is-active::after { left: 0 !important; right: 0 !important; height: 3px !important; }
      .tabs-row::-webkit-scrollbar { display: none; }
      .layout-pane { flex-direction: column !important; }
      .inner-sidebar { display: none !important; }
      .main-pane {
        padding: 12px !important;
        max-width: 100% !important;
      }
      .gallery-features-header {
        flex-direction: column !important;
        align-items: stretch !important;
        gap: 12px !important;
      }
      .gallery-features-header > button { align-self: flex-start; }
      /* Feature row on mobile uses card stack instead of grid */
      .feature-row-mobile {
        display: flex !important;
        align-items: center !important;
        gap: 8px !important;
        padding: 16px 14px !important;
        background: transparent !important;
        cursor: pointer;
      }
      .feature-row-mobile.is-open { background: var(--soft-bg) !important; }
      /* Multi-role panel padding */
      .multi-panel-strip { padding-left: 14px !important; padding-right: 14px !important; }
      .multi-panel-body { padding-left: 14px !important; padding-right: 14px !important; }
      /* Per-role table rows: stack label/control */
      .per-role-row {
        grid-template-columns: 1fr !important;
        gap: 8px !important;
        padding: 12px !important;
        min-height: 0 !important;
      }
      .per-role-row .control-cell { justify-content: flex-start !important; }
      .per-role-row select,
      .per-role-row .v5-select-wrap,
      .per-role-row .v5-select-btn { width: 100% !important; min-width: 0 !important; }
      /* Shared row: stack */
      .shared-flat-row {
        grid-template-columns: 1fr !important;
        gap: 10px !important;
        align-items: stretch !important;
      }
      .shared-flat-row select,
      .shared-flat-row .v5-select-wrap,

    const initialFeatures = FEATURE_DEFS.map(f => ({ ...f }));

    // Some settings are only relevant when another setting has a particular value
    // (e.g. Gallery Allowed Resolutions only matters when Download Type = Full Gallery + Individual).
    const isSettingVisibleForRole = (setting, roleId, featureId, perRole) => {
      if (!setting.dependsOn) return true;
      const dep = setting.dependsOn;
      const allowed = Array.isArray(dep.values)
        ? dep.values
        : (dep.value !== undefined ? [dep.value] : null);
      // dependsOn without a value constraint is purely structural — used so the child
      // setting nests under its parent in the rendered UI without affecting visibility.
      if (allowed === null) return true;
      const depVal = perRole[roleId]?.[featureId]?.values?.[dep.settingId];
      return allowed.includes(depVal);
    };

    // ===== Per-role summary helper =====
    // Generates a short, human-readable summary of how a feature is configured for a
    // given role (e.g. "10 images · Original"), so the matrix shows context — not just
    // ON/OFF — when guests and clients have different limits or resolutions.
    const SHORT_SELECT_LABELS = {
      'All photos and individual download': 'All + Individual',
      'All photos': 'All photos',
      'Specific amount download': 'Limited',
      'Individual download only': 'Individual only',
      'All videos and individual download': 'All + Individual',
      'All videos': 'All videos',
    };
    // Per-feature verb phrases for the dynamic status sentences shown under each feature title.
    // Each feature defines an "on with summary" prefix, an "on without summary" fallback,
    // and a negative phrase used when the feature is off for the role group.
    const FEATURE_VERBS = {
      'photo-downloads': { onWith: 'can download', onBare: 'can download photos', off: 'cannot download photos' },
      'video-downloads': { onWith: 'can download videos:', onBare: 'can download videos', off: 'cannot download videos' },
      'keyword-search':  { onWith: 'can search by keyword', onBare: 'can search by keyword', off: 'cannot search by keyword' },
      'favorites':       { onWith: 'can mark favorites', onBare: 'can mark favorites', off: 'cannot use favorites' },
      'commenting':      { onWith: 'can comment',       onBare: 'can comment',         off: 'cannot comment' },
      'sharing':         { onWith: 'can share',         onBare: 'can share',           off: 'cannot share' },
      'face-finder':     { onWith: 'can use Face Finder', onBare: 'can use Face Finder', off: 'cannot use Face Finder' },
    };
    const joinNames = (names) => {
      if (names.length === 0) return '';
      if (names.length === 1) return names[0];
      if (names.length === 2) return `${names[0]} & ${names[1]}`;
      return names.slice(0, -1).join(', ') + ' & ' + names[names.length - 1];
    };
    // Build grouped human-readable status lines for a feature. Roles with the same effective
    // configuration collapse into one sentence — e.g. "Everyone & Client can download Full + Individual".
    // Only positive (enabled) groups are listed; off-roles are inferred from their unticked toggle.
    const buildFeatureStatusLines = (feature, roles, perRole) => {
      const groups = new Map();
      roles.forEach(r => {
        const enabled = !!perRole[r.id]?.[feature.id]?.enabled;
        if (!enabled) return;
        const summary = summarizeFeatureForRole(feature, r.id, perRole);
        const key = `on:${summary}`;
        if (!groups.has(key)) groups.set(key, { summary, names: [] });
        groups.get(key).names.push(r.name);
      });
      const verbs = FEATURE_VERBS[feature.id] || { onWith: 'can use', onBare: 'can use' };
      const ordered = Array.from(groups.values()).sort((a, b) => (a.summary ? 0 : 1) - (b.summary ? 0 : 1));
      return ordered.map(g => {
        const names = joinNames(g.names);
        return g.summary ? `${names} ${verbs.onWith} ${g.summary}` : `${names} ${verbs.onBare}`;
      });
    };

    const summarizeFeatureForRole = (feature, roleId, perRole) => {
      const data = perRole[roleId]?.[feature.id];
      if (!data || !data.enabled) return '';
      const values = data.values || {};
      const parts = [];
      feature.settings.forEach(s => {
        if (s.optional) return;
        if (s.type === 'multicheck') return; // skip resolutions/multi-check lists from the summary
        if (/resolution/i.test(s.id) || /resolution/i.test(s.label || '')) return; // skip any resolution setting
        if (!isSettingVisibleForRole(s, roleId, feature.id, perRole)) return;
        const v = values[s.id];
        if (v === undefined || v === null || v === '') return;
        if (s.type === 'select') {
          parts.push(SHORT_SELECT_LABELS[v] || v);
        } else if (s.type === 'number') {
          const unit = s.id.includes('video') ? 'videos' : 'images';
          parts.push(`${v} ${unit}`);
        } else if (s.type === 'toggle') {
          if (v) parts.push(s.label.replace(/\s*\(OPTIONAL\)\s*/i, ''));
        }
      });
      return parts.join(' · ');
    };

    // ===== Toggle =====
    const Toggle = ({ checked, onChange, size = 'md', disabled }) => {
      const W = size === 'sm' ? 36 : 44, H = size === 'sm' ? 20 : 24, T = size === 'sm' ? 16 : 18;
      return (
        <button type="button" role="switch" aria-checked={checked} disabled={disabled}
          onClick={(e) => { e.stopPropagation(); if (!disabled) onChange?.(); }}
          className="toggle-track relative inline-flex shrink-0 items-center rounded-full disabled:opacity-50"
          style={{ width: W, height: H, background: checked ? 'var(--orange)' : '#D6D6DB', cursor: disabled ? 'not-allowed' : 'pointer' }}>
          <span className="toggle-thumb absolute rounded-full bg-white shadow-sm"
            style={{ top: 2, left: 2, width: T, height: T, transform: checked ? `translateX(${W - T - 4}px)` : 'translateX(0)' }} />
        </button>
      );
    };

    // ===== Custom select / dropdown =====
    // Matches the ui-component-library §02 spec: pill trigger with chevron, popover
    // menu with selected-option highlight in --orange-soft + check icon, hover state,
    // click-outside to close. The popover is rendered through a React portal at
    // document.body so it escapes any overflow:hidden / clip ancestors (e.g. the
    // rounded per-role settings card). Coordinates are computed from the trigger's
    // getBoundingClientRect() and re-measured on scroll / resize.
    const V5Select = ({ value, options, onChange, disabled, minWidth = 220, fullWidth }) => {
      const [open, setOpen] = useState(false);
      const [pos, setPos] = useState(null); // { top, left, width, openUp }
      const wrapRef = React.useRef(null);
      const btnRef = React.useRef(null);
      const menuRef = React.useRef(null);

      const measure = React.useCallback(() => {
        const btn = btnRef.current;
        if (!btn) return;
        const rect = btn.getBoundingClientRect();
        const menuMaxH = 320; // matches CSS max-height
        const spaceBelow = window.innerHeight - rect.bottom;
        const openUp = spaceBelow < Math.min(menuMaxH, 240) && rect.top > spaceBelow;
        setPos({
          left: rect.left,
          top: openUp ? rect.top - 6 : rect.bottom + 6,
          width: rect.width,
          openUp,
        });
      }, []);

      useEffect(() => {
        if (!open) return;
        measure();
        const onDoc = (e) => {
          if (
            (wrapRef.current && wrapRef.current.contains(e.target)) ||
            (menuRef.current && menuRef.current.contains(e.target))
          ) return;
          setOpen(false);
        };
        const onKey = (e) => { if (e.key === 'Escape') setOpen(false); };
        const onReflow = () => measure();
        document.addEventListener('mousedown', onDoc);
        document.addEventListener('keydown', onKey);
        window.addEventListener('scroll', onReflow, true);
        window.addEventListener('resize', onReflow);
        return () => {
          document.removeEventListener('mousedown', onDoc);
          document.removeEventListener('keydown', onKey);
          window.removeEventListener('scroll', onReflow, true);
          window.removeEventListener('resize', onReflow);
        };
      }, [open, measure]);

      const display = value || (options && options[0]) || '';
      const menuStyle = pos
        ? {
            position: 'fixed',
            top: pos.openUp ? 'auto' : pos.top,
            bottom: pos.openUp ? (window.innerHeight - pos.top) : 'auto',
            left: pos.left,
            width: pos.width,
            zIndex: 1000,
          }
        : { display: 'none' };
      const menu = open ? ReactDOM.createPortal(
        <div ref={menuRef} className="v5-select-menu" role="listbox" style={menuStyle}>
          {options.map(o => {
            const selected = o === value;
            return (
              <div key={o} role="option" aria-selected={selected}
                className={`v5-select-option ${selected ? 'is-selected' : ''}`}
                onClick={(e) => { e.stopPropagation(); onChange(o); setOpen(false); }}>
                <span className="v5-select-option-label">{o}</span>
                <span className="v5-select-option-check">
                  {selected && <CheckIcon size={14} />}
                </span>
              </div>
            );
          })}
        </div>,
        document.body
      ) : null;

      return (
        <div ref={wrapRef}
          className={`v5-select-wrap relative ${fullWidth ? 'block w-full' : 'inline-block'}`}
          style={fullWidth ? {} : { minWidth }}>
          <button ref={btnRef} type="button" disabled={disabled} aria-haspopup="listbox" aria-expanded={open}
            onClick={(e) => { e.stopPropagation(); if (!disabled) setOpen(o => !o); }}
            className={`v5-select-btn ${open ? 'is-open' : ''}`}>
            <span className="v5-select-value">{display}</span>
            <span className={`v5-select-chev ${open ? 'is-open' : ''}`}><ChevronDown size={14} /></span>
          </button>
          {menu}
        </div>
      );
    };

    // ===== App chrome =====
    const NAV_ITEMS = [
      { id: 'dashboard', name: 'Dashboard', icon: DashIcon },
      { id: 'galleries', name: 'Galleries', icon: GalleryIcon, active: true },
      { id: 'selling', name: 'Selling', icon: SellIcon },
      { id: 'reports', name: 'Reports', icon: ReportIcon },
      { id: 'crm', name: 'CRM', icon: CrmIcon },
      { id: 'website', name: 'Website', icon: WebsiteIcon },
      { id: 'blog', name: 'Blog', icon: BlogIcon },
      { id: 'seo', name: 'SEO Tool', icon: SeoIcon },
      { id: 'addons', name: 'Add-Ons', icon: AddOnsIcon },
      { id: 'support', name: 'Support', icon: SupportIcon },

    const TopBar = ({ viewMode, modeMenuOpen, setViewMode, setModeMenuOpen }) => (

                      {active && <span style={{ marginLeft: 'auto' }}><CheckIcon size={12} /></span>}
                    </button>

            )}
          </div>
        </div>

        <div className="flex items-center gap-4" style={{ color: 'var(--text-secondary)' }}>
          <button className="hover:text-black"><BookIcon size={18} /></button>
          <button className="hover:text-black"><BellIcon size={18} /></button>
          <div className="flex items-center gap-2 ml-2">
            <div className="w-7 h-7 rounded-full" style={{ background: 'linear-gradient(135deg, #C7C5BF, #9C9994)' }} />
            <span className="top-bar-greeting text-[12px] font-bold tracking-wider" style={{ color: 'var(--text-primary)' }}>HI, OLIVIA</span>
            <ChevronDown size={12} />

      </header>
    );

    const GalleryHeader = () => {

    const Tabs = () => {

    // ===== Inner sidebar =====
    const SidebarBadge = ({ children }) => (
      <span className="inline-flex items-center text-[10px] font-bold tracking-wider uppercase rounded-md px-2 py-1"
        style={{ background: 'var(--brand)', color: '#fff' }}>{children}</span>
    );
    // Three-state status pill — back to the static rectangular look, but with a partially
    // filled background for the "some" state so the proportion of roles enabled shows visually.
    //   state='all'   → solid brand pill, white "ON"
    //   state='some'  → cream pill with an orange fill from the left sized to the fraction,
    //                   orange border, white "ON" sitting on the filled portion
    //   state='none'  → grey "OFF"
    // Accepts a legacy `on` prop for callers that don't track per-role state.
    const StatusPill = ({ on, state, fraction }) => {
      const s = state || (on ? 'all' : 'none');
      const base = "inline-flex items-center text-[9px] font-bold rounded mr-2";
      const common = { minWidth: 36, letterSpacing: '0.05em', boxSizing: 'border-box' };
      if (s === 'all') {
        return (
          <span className={base + " justify-center"}
            style={{ ...common, background: 'var(--brand)', color: '#fff', padding: '2px 6px' }}
            title="On for all roles">ON</span>
        );
      }
      if (s === 'some') {
        // Single visual for any partial state — always render a 67% orange fill so
        // "partial" is unambiguously distinguishable from "all on" without needing
        // to encode the precise fraction. Tooltip still reports the exact count.
        return (
          <span className={base + " justify-start"}
            style={{
              ...common,
              position: 'relative',
              overflow: 'hidden',
              background: 'var(--brand-cream)',
              color: '#fff',
              border: '1px solid var(--brand)',
              padding: '1px 5px',
            }}
            title={`On for ${fraction} roles`}>
            <span aria-hidden="true" style={{
              position: 'absolute', left: 0, top: 0, bottom: 0,
              width: '67%',
              background: 'var(--brand)',
            }} />
            <span style={{ position: 'relative', zIndex: 1 }}>ON</span>
          </span>
        );
      }
      return (
        <span className={base + " justify-center"}
          style={{ ...common, background: 'var(--off-bg)', color: 'var(--off-text)', padding: '2px 6px' }}

    };

    const InnerSidebar = ({ features, roles, perRole, activeSection, onSelectSection, contacts = [], accessMode }) => {
      const featureStatus = (fId) => {
        const onCount = roles.filter(r => perRole[r.id]?.[fId]?.enabled).length;
        if (onCount === 0) return { state: 'none' };
        if (onCount === roles.length) return { state: 'all' };
        return { state: 'some', fraction: `${onCount}/${roles.length}` };
      };
      const isAccess = activeSection === 'access';
      const isFeatures = activeSection === 'features';
      const isContacts = activeSection === 'contacts';
      const contactsCount = contacts.length;
      // Build a per-role count list, only including roles that have at least one contact.
      // Order matches the matrix roles order so it stays consistent with the rest of the UI.
      const roleCounts = roles
        .map(r => ({ id: r.id, name: r.name, count: contacts.filter(c => c.roleId === r.id).length }))
        .filter(r => r.count > 0);
      const access = ACCESS_MODES.find(m => m.id === accessMode) || ACCESS_MODES[0];
      return (
        <aside className="inner-sidebar w-[270px] shrink-0 px-5 pt-6 pb-10">
          <div onClick={() => onSelectSection('access')}
            className="rounded-xl px-3 py-3 mb-2 cursor-pointer transition-colors"
            style={{ background: isAccess ? 'var(--brand-cream)' : '#fff',

            <div className="flex items-center justify-between gap-2 mb-2">

                <span className="text-[14px] font-semibold">Access</span>
              </div>
              <span className="text-[10px] font-bold tracking-wider uppercase rounded px-2 py-1 whitespace-nowrap"
                style={{ background: access.danger ? 'var(--danger)' : 'var(--brand)', color: '#fff', letterSpacing: '0.05em' }}>

              {access.sidebar()}
            </div>
          </div>
          <div onClick={() => onSelectSection('features')}
            className="rounded-xl px-3 py-3 mb-2 cursor-pointer transition-colors"
            style={{ background: isFeatures ? 'var(--brand-cream)' : '#fff',
                     border: '1px solid', borderColor: isFeatures ? 'transparent' : 'var(--card-border)' }}>
            <div className="flex items-center gap-2 mb-2" style={{ color: isFeatures ? 'var(--brand)' : 'var(--text-primary)' }}>
              <FeaturesIcon size={15} /><span className="text-[13px] font-semibold">Gallery Features</span>
            </div>
            <ul className="pl-1 space-y-1">
              {features.map(f => (
                <li key={f.id} className="flex items-center text-[12px]" style={{ color: 'var(--text-primary)' }}>
                  <StatusPill {...featureStatus(f.id)} />{f.name}
                </li>
              ))}
            </ul>
          </div>
          <div onClick={() => onSelectSection('contacts')}
            className="rounded-xl px-3 py-3 mb-2 cursor-pointer transition-colors"

                     border: '1px solid', borderColor: isContacts ? 'transparent' : 'var(--card-border)' }}>
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-2" style={{ color: isContacts ? 'var(--brand)' : 'var(--text-primary)' }}>

                style={{ borderColor: isContacts ? 'var(--brand)' : 'var(--card-border)',

                {roleCounts.map(r => (
                  <li key={r.id}
                    className="text-[11px] font-bold tracking-wider uppercase"
                    style={{ color: 'var(--text-primary)' }}>
                    {r.name} <span style={{ color: 'var(--text-secondary)', fontWeight: 600 }}>({r.count})</span>
                  </li>
                ))}
              </ul>
            )}
          </div>
          <div className="rounded-xl px-3 py-3 mb-2 bg-white border" style={{ borderColor: 'var(--card-border)' }}>
            <div className="flex items-center gap-2 mb-2"><CartIcon size={15} /><span className="text-[13px] font-semibold">Store</span></div>
            <div className="flex items-center text-[12px]" style={{ color: 'var(--text-primary)' }}>
              <StatusPill on={false} />Price List
            </div>
          </div>
          <div className="rounded-xl px-3 py-3 bg-white border" style={{ borderColor: 'var(--card-border)' }}>
            <div className="flex items-center gap-2"><PresetIcon size={15} /><span className="text-[13px] font-semibold">Setting Presets</span></div>
          </div>
        </aside>
      );
    };

    // ===== Add Role Modal =====
    const RoleCard = ({ icon: IconCmp, title, desc, onClick, disabled, planLock, selectable, selected, onToggleSelect }) => (
      <button type="button" disabled={disabled} onClick={onClick}
        className={`role-card-hover ${disabled ? 'is-disabled' : ''} text-center px-5 py-6 rounded-xl border transition-colors relative`}
        style={{
          borderColor: selected ? 'var(--orange)' : 'var(--card-border)',
          background: selected ? 'var(--orange-soft)' : '#fff',
          boxShadow: selected ? '0 0 0 1.5px var(--orange)' : 'none',
        }}>
        {/* Checkbox — top-left, only on selectable non-disabled cards */}
        {selectable && !disabled && (
          <span
            onClick={e => { e.stopPropagation(); onToggleSelect && onToggleSelect(); }}
            className="absolute top-2.5 left-2.5 flex items-center justify-center rounded-full border-2 transition-all"
            style={{
              width: 17, height: 17,
              borderColor: selected ? 'var(--orange)' : 'var(--line)',
              background: selected ? 'var(--orange)' : '#fff',
            }}>
            {selected && <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20,6 9,17 4,12"/></svg>}
          </span>
        )}
        {planLock && (
          <span className="absolute top-2.5 right-2.5 flex items-center gap-1 px-1.5 py-0.5 rounded-full text-[9px] font-bold tracking-wider"
            style={{ background: '#E8E8ED', color: '#86868B' }}>
            <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            PRO+
          </span>
        )}
        <div className="role-card-icon flex justify-center mb-3" style={{ color: 'var(--text-secondary)' }}><IconCmp size={26} /></div>
        <div className="text-[12px] font-bold tracking-wider mb-2" style={{ color: 'var(--text-primary)' }}>{title}</div>
        <div className="text-[12px] leading-snug" style={{ color: 'var(--text-secondary)' }}>{desc}</div>
        {disabled && !planLock && <div className="text-[10px] uppercase tracking-wider mt-2" style={{ color: 'var(--text-tertiary)' }}>Already added</div>}
      </button>
    );

    // Reusable contact form fields (First/Last name, Email, Mobile with US flag select)
    const ContactFields = ({ first, setFirst, last, setLast, email, setEmail, mobile, setMobile, emailPlaceholder = 'Email' }) => (
      <div className="grid grid-cols-2 gap-3">
        <input value={first} onChange={e => setFirst(e.target.value)} placeholder="First Name"
          className="text-[13px] px-3 py-2.5 rounded-md border bg-white outline-none"
          style={{ borderColor: 'var(--card-border)', color: 'var(--text-primary)' }} />
        <input value={last} onChange={e => setLast(e.target.value)} placeholder="Last Name"
          className="text-[13px] px-3 py-2.5 rounded-md border bg-white outline-none"
          style={{ borderColor: 'var(--card-border)', color: 'var(--text-primary)' }} />
        <input value={email} onChange={e => setEmail(e.target.value)} placeholder={emailPlaceholder} type="email"
          className="text-[13px] px-3 py-2.5 rounded-md border bg-white outline-none"
          style={{ borderColor: 'var(--card-border)', color: 'var(--text-primary)' }} />
        <div className="flex rounded-md border bg-white overflow-hidden" style={{ borderColor: 'var(--card-border)' }}>
          <button type="button" tabIndex={-1} className="flex items-center gap-1 px-2 text-[12px]" style={{ background: '#F4F3EF', color: 'var(--text-secondary)' }}>
            <span style={{ fontSize: 14 }}>🇺🇸</span><ChevronDown size={10} />
          </button>
          <input value={mobile} onChange={e => setMobile(e.target.value)} placeholder="Mobile Number"
            className="flex-1 text-[13px] px-3 py-2.5 outline-none"
            style={{ color: 'var(--text-primary)' }} />
        </div>
      </div>
    );

    const AddRoleModal = ({ onClose, onSelect, onSelectBulk, onDeleteSaved, onOpenPlans, existingNames, viewMode, customRoleCount = 0, savedRoles = [] }) => {
      const [step, setStep] = useState('choose');
      const [presetId, setPresetId] = useState(null);
      const [customName, setCustomName] = useState('');
      const [firstName, setFirstName] = useState('');
      const [lastName, setLastName] = useState('');
      const [contactEmail, setContactEmail] = useState('');
      const [contactMobile, setContactMobile] = useState('');
      const [showDropZone, setShowDropZone] = useState(false);
      const [csvFile, setCsvFile] = useState(null);
      const [isDragOver, setIsDragOver] = useState(false);
      const fileInputRef = React.useRef(null);
      const [selectedCards, setSelectedCards] = useState(new Set());
      const [savedPerRoleState, setSavedPerRoleState] = useState(null);
      const trimmed = customName.trim();
      const nameTaken = existingNames.includes(trimmed.toLowerCase());

      const toggleCard = (id) => setSelectedCards(prev => {
        const next = new Set(prev);
        next.has(id) ? next.delete(id) : next.add(id);
        return next;
      });

      const savedIds = new Set(savedRoles.map(r => r.id));
      // Delete is only enabled when every selected card is a saved custom role
      const canDelete = selectedCards.size > 0 && [...selectedCards].every(id => savedIds.has(id));

      const handleAddRoles = () => {
        const basicLock     = viewMode === 'basic';
        const proLimit      = viewMode === 'professional' && customRoleCount >= 1;
        const advancedLimit = viewMode === 'advanced'     && customRoleCount >= 10;
        const selections = [];
        if (selectedCards.has('guest'))  selections.push({ presetId: 'guest' });
        if (selectedCards.has('client')) selections.push({ presetId: 'client' });
        // Only add saved custom roles that aren't plan-blocked
        if (!basicLock && !proLimit && !advancedLimit) {
          savedRoles.filter(r => selectedCards.has(r.id))
            .forEach(r => selections.push({ presetId: 'custom', customName: r.name, perRoleState: r.perRoleState || null }));
        }
        if (selections.length) onSelectBulk(selections);
      };

      const handleDelete = () => {
        onDeleteSaved([...selectedCards].filter(id => savedIds.has(id)));
        setSelectedCards(new Set());
      };

      const goDetail = (id) => { setPresetId(id); setStep('detail'); };
      const roleDisplayName =
        presetId === 'guest' ? 'Guest'
        : presetId === 'client' ? 'Client'
        : presetId === 'custom' ? trimmed
        : '';

      const selectSaved = (saved) => {
        setCustomName(saved.name);
        setPresetId('custom');
        setSavedPerRoleState(saved.perRoleState || null);
        setStep('detail');
      };

      const submit = () => {
        const contact = contactEmail.trim()
          ? { firstName: firstName.trim(), lastName: lastName.trim(), email: contactEmail.trim(), mobile: contactMobile.trim() }
          : null;
        onSelect(presetId, presetId === 'custom' ? trimmed : undefined, contact, !!csvFile, savedPerRoleState);
      };

      return (
        <div className="modal-backdrop fixed inset-0 z-50 flex items-center justify-center px-4"
          style={{ background: 'rgba(27, 28, 31, 0.45)' }} onClick={onClose}>
          <div className="modal-card bg-white rounded-2xl border shadow-xl w-full max-w-[680px] p-6"
            style={{ borderColor: 'var(--card-border)' }} onClick={e => e.stopPropagation()}>
            {step === 'choose' && (
              <>
                <h3 className="text-[13px] font-bold tracking-wider mb-4" style={{ color: 'var(--text-primary)' }}>ADD A ROLE</h3>
                {(() => {
                  const basicLock     = viewMode === 'basic';
                  const proLimit      = viewMode === 'professional' && customRoleCount >= 1;
                  const advancedLimit = viewMode === 'advanced'     && customRoleCount >= 10;
                  const isLocked      = basicLock || proLimit || advancedLimit;
                  return (
                    <>
                      {/* ── 3-card grid — all cards stay the same size ── */}
                      <div className="grid grid-cols-3 gap-3">
                        <RoleCard icon={UserIcon} title="GUEST" desc={PRESETS.guest.desc}
                          disabled={existingNames.includes('guest')} onClick={() => goDetail('guest')}
                          selectable={!existingNames.includes('guest')} selected={selectedCards.has('guest')}
                          onToggleSelect={() => toggleCard('guest')} />
                        <RoleCard icon={StarIcon} title="CLIENT" desc={PRESETS.client.desc}
                          disabled={existingNames.includes('client')} onClick={() => goDetail('client')}
                          selectable={!existingNames.includes('client')} selected={selectedCards.has('client')}
                          onToggleSelect={() => toggleCard('client')} />
                        <RoleCard icon={SlidersIcon} title="CREATE YOUR OWN" desc={PRESETS.custom.desc}
                          disabled={isLocked} planLock={isLocked}
                          onClick={isLocked ? undefined : () => setStep('name')} />
                      </div>

                      {isLocked && (
                        <>
                          {/* ── Dashed connector ── */}
                          <div className="grid grid-cols-3 gap-3" style={{ height: 28 }}>
                            <div /><div />
                            <div className="flex justify-center">
                              <div style={{ width: 0, height: '100%', borderLeft: '2px dashed rgba(242,107,58,0.45)' }} />
                            </div>
                          </div>

                          {/* ── Callout — upgrade pill for Basic/Pro; plain info message for Advanced limit ── */}
                          {advancedLimit ? (
                            <div className="rounded-2xl border px-4 py-3"
                              style={{ borderColor: 'var(--line)', background: 'var(--soft-bg)' }}>
                              <p className="text-[12px] leading-snug" style={{ color: 'var(--text-secondary)' }}>
                                <strong style={{ color: 'var(--text-primary)' }}>Gallery limit reached.</strong>{' '}
                                This gallery is limited to 10 custom roles.{' '}
                                <span style={{ color: 'var(--text-tertiary)' }}>(pending 5-vs-10 confirmation)</span>
                              </p>
                            </div>
                          ) : (
                            <div className="rounded-2xl border px-4 py-3 flex items-center justify-between gap-4"
                              style={{ borderColor: 'rgba(242,107,58,0.28)', background: 'var(--orange-soft)' }}>
                              <p className="text-[12px] leading-snug" style={{ color: 'var(--text-secondary)' }}>
                                {basicLock ? (
                                  <><strong style={{ color: 'var(--text-primary)' }}>Premium Feature:</strong>{' '}
                                  Custom roles require a <strong style={{ color: 'var(--text-primary)' }}>Professional</strong> or <strong style={{ color: 'var(--text-primary)' }}>Advanced</strong> plan.{' '}
                                  <a href="#" onClick={e => { e.preventDefault(); onOpenPlans && onOpenPlans(); }} style={{ color: 'var(--brand)', fontWeight: 700, textDecoration: 'underline', textUnderlineOffset: '2px' }}>View Plans</a></>
                                ) : (
                                  <><strong style={{ color: 'var(--text-primary)' }}>Gallery limit reached.</strong>{' '}
                                  Professional allows one Custom Role per gallery.<br/>
                                  Upgrade to <strong style={{ color: 'var(--text-primary)' }}>Advanced</strong> for up to 10 Custom Roles per gallery.{' '}
                                  <a href="#" onClick={e => { e.preventDefault(); onOpenPlans && onOpenPlans(); }} style={{ color: 'var(--brand)', fontWeight: 700, textDecoration: 'underline', textUnderlineOffset: '2px' }}>View Plans</a></>
                                )}
                              </p>
                              <button onClick={() => onOpenPlans && onOpenPlans()}
                                className="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[10px] font-bold tracking-wider whitespace-nowrap shrink-0 transition-opacity hover:opacity-80"
                                style={{ background: '#D4EDDA', color: '#1A7F37', border: '1px solid #A8D5B5' }}>
                                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                  strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                  <line x1="7" y1="17" x2="17" y2="7"/><polyline points="7,7 17,7 17,17"/>
                                </svg>
                                UPGRADE
                              </button>
                            </div>
                          )}
                        </>
                      )}
                    </>
                  );
                })()}

                {/* ── Saved custom roles ── */}
                {savedRoles.length > 0 && (() => {
                  const basicLock     = viewMode === 'basic';
                  const proLimit      = viewMode === 'professional' && customRoleCount >= 1;
                  const advancedLimit = viewMode === 'advanced'     && customRoleCount >= 10;
                  const sectionBlocked = basicLock || proLimit || advancedLimit;
                  return (
                    <div className="mt-5 pt-4 border-t" style={{ borderColor: 'var(--line-2)' }}>
                      <p className="text-[10px] font-bold tracking-[0.14em] mb-3" style={{ color: 'var(--text-3)' }}>
                        SAVED CUSTOM ROLES
                      </p>
                      <div className="grid grid-cols-3 gap-3">
                        {savedRoles.map(saved => {
                          const alreadyInGallery = existingNames.includes(saved.name.toLowerCase());
                          // Visually muted when plan-blocked OR already in gallery
                          const isVisuallyDisabled = sectionBlocked || alreadyInGallery;
                          // Truly disabled (no interaction at all) only when already in gallery
                          const isTrulyDisabled = alreadyInGallery;
                          const badge = basicLock                     ? 'PRO+'
                                      : (proLimit || advancedLimit)       ? 'LIMIT REACHED'
                                      : alreadyInGallery                  ? 'ALREADY ADDED'
                                      : null;
                          const isSavedSelected = selectedCards.has(saved.id);
                          return (
                            <button key={saved.id} disabled={isTrulyDisabled}
                              onClick={isVisuallyDisabled ? undefined : () => selectSaved(saved)}
                              className={`role-card-hover ${isVisuallyDisabled ? 'is-disabled' : ''} text-left px-4 py-4 rounded-xl border transition-colors relative`}
                              style={{
                                borderColor: isSavedSelected ? 'var(--orange)' : 'var(--card-border)',
                                background: isSavedSelected ? 'var(--orange-soft)' : '#fff',
                                boxShadow: isSavedSelected ? '0 0 0 1.5px var(--orange)' : 'none',
                                cursor: isTrulyDisabled ? 'not-allowed' : 'pointer',
                              }}>
                              {/* Checkbox */}
                              {!alreadyInGallery && (
                                <span
                                  onClick={e => { e.stopPropagation(); toggleCard(saved.id); }}
                                  className="absolute top-3 left-3 flex items-center justify-center rounded-full border-2 transition-all"
                                  style={{
                                    width: 17, height: 17,
                                    borderColor: isSavedSelected ? 'var(--orange)' : 'var(--line)',
                                    background: isSavedSelected ? 'var(--orange)' : '#fff',
                                  }}>
                                  {isSavedSelected && <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20,6 9,17 4,12"/></svg>}
                                </span>
                              )}
                              {badge && (
                                <span className="absolute top-2.5 right-2.5 flex items-center gap-1 px-1.5 py-0.5 rounded-full text-[9px] font-bold tracking-wider"
                                  style={{ background: '#E8E8ED', color: '#86868B' }}>
                                  <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                                    <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                  </svg>
                                  {badge}
                                </span>
                              )}
                              {/* Name — indented to clear the checkbox */}
                              <div className="text-[12px] font-bold tracking-wider mb-2"
                                style={{ color: 'var(--text-primary)', paddingLeft: !alreadyInGallery ? 24 : 0, paddingRight: badge ? 60 : 0 }}>
                                {saved.name.toUpperCase()}
                              </div>
                              {/* Enabled features list */}
                              {saved.enabledFeatures && saved.enabledFeatures.length > 0 ? (
                                <div>
                                  {saved.enabledFeatures.map(f => (
                                    <div key={f} className="text-[11px] leading-snug" style={{ color: 'var(--text-secondary)' }}>{f}</div>
                                  ))}
                                </div>
                              ) : (
                                <div className="text-[11px]" style={{ color: 'var(--text-tertiary)' }}>No features enabled</div>
                              )}
                            </button>
                          );
                        })}
                      </div>
                      {sectionBlocked && (
                        <p className="text-[11px] mt-3 text-center" style={{ color: 'var(--text-tertiary)' }}>
                          {basicLock
                            ? 'Upgrade to Professional or Advanced to add custom roles.'
                            : advancedLimit
                              ? 'This gallery has reached the limit of 10 custom roles.'
                              : null}
                        </p>
                      )}
                    </div>
                  );
                })()}

                <div className={`flex ${selectedCards.size > 0 ? 'justify-between' : 'justify-end'} items-center mt-5`}>
                  <button onClick={onClose}
                    className="text-[12px] font-bold tracking-wider px-4 py-2 rounded-full border bg-white transition-all hover:bg-[var(--bg)]"
                    style={{ borderColor: 'var(--card-border)', color: 'var(--text-primary)' }}>CANCEL</button>
                  {selectedCards.size > 0 && (
                    <div className="flex items-center gap-2">
                      <button onClick={handleDelete} disabled={!canDelete}
                        className="text-[12px] font-bold tracking-wider px-4 py-2 rounded-full border transition-all"
                        style={{
                          borderColor: canDelete ? 'var(--danger)' : 'var(--line)',
                          color: canDelete ? 'var(--danger)' : 'var(--text-4)',
                          background: '#fff',
                          cursor: canDelete ? 'pointer' : 'not-allowed',
                        }}>DELETE</button>
                      <button onClick={handleAddRoles}
                        className="text-[12px] font-bold tracking-wider px-4 py-2 rounded-full text-white transition-all"
                        style={{ background: 'var(--brand)', boxShadow: 'var(--shadow-sm)' }}>
                        {selectedCards.size === 1 ? 'ADD ROLE' : `ADD ${selectedCards.size} ROLES`}
                      </button>
                    </div>
                  )}
                </div>
              </>
            )}
            {step === 'name' && (
              <>
                <h3 className="text-[13px] font-bold tracking-wider mb-2" style={{ color: 'var(--text-primary)' }}>NAME YOUR ROLE</h3>
                <p className="text-[13px] mb-4" style={{ color: 'var(--text-secondary)' }}>Choose a name your viewers won't see — it's just for you.</p>
                <input
                  autoFocus value={customName}
                  onChange={e => setCustomName(e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter' && trimmed && !nameTaken) goDetail('custom'); }}
                  placeholder="e.g. Family, VIP, Player" maxLength={32}
                  className="w-full text-[14px] px-3 py-2.5 rounded-[10px] border bg-white outline-none"
                  style={{ borderColor: nameTaken ? 'var(--brand)' : 'var(--card-border)', color: 'var(--text-primary)' }} />
                {nameTaken && <p className="text-[12px] mt-2" style={{ color: 'var(--brand-deep)' }}>A role named "{trimmed}" already exists.</p>}
                <div className="flex justify-end gap-2 mt-5">
                  <button onClick={() => setStep('choose')}
                    className="text-[12px] font-bold tracking-wider px-4 py-2 rounded-full border bg-white transition-all hover:bg-[var(--bg)]"
                    style={{ borderColor: 'var(--card-border)', color: 'var(--text-primary)' }}>BACK</button>
                  <button disabled={!trimmed || nameTaken}
                    onClick={() => goDetail('custom')}
                    className="text-[12px] font-bold tracking-wider px-4 py-2 rounded-full text-white disabled:opacity-40 transition-all"
                    style={{ background: 'var(--brand)', boxShadow: 'var(--shadow-sm)' }}>NEXT</button>
                </div>
              </>
            )}
            {step === 'detail' && (
              <>
                <h3 className="text-[13px] font-bold tracking-wider mb-3" style={{ color: 'var(--text-primary)' }}>
                  ADD A {roleDisplayName.toUpperCase()} ROLE
                </h3>
                <div className="rounded-md px-3 py-2.5 mb-3 text-[13px]"
                  style={{ background: 'var(--soft-bg)', border: '1px solid var(--card-border)', color: 'var(--text-primary)' }}>
                  {roleDisplayName}
                </div>
                <p className="text-[13px] mb-3" style={{ color: 'var(--text-secondary)' }}>
                  Add your first contact to this role right now. <span style={{ color: 'var(--text-tertiary)' }}>(Optional)</span>
                </p>
                <ContactFields
                  first={firstName} setFirst={setFirstName}
                  last={lastName} setLast={setLastName}
                  email={contactEmail} setEmail={setContactEmail}
                  mobile={contactMobile} setMobile={setContactMobile}
                  emailPlaceholder="Email (required to add contact)"
                />
                {showDropZone && (
                  <div className="mt-3">
                    <div
                      onDragOver={e => { e.preventDefault(); setIsDragOver(true); }}
                      onDragLeave={() => setIsDragOver(false)}
                      onDrop={e => {
                        e.preventDefault();
                        setIsDragOver(false);
                        const f = e.dataTransfer.files[0];
                        if (f) setCsvFile(f);
                      }}
                      onClick={() => fileInputRef.current && fileInputRef.current.click()}
                      className="flex flex-col items-center justify-center gap-2 rounded-xl border-2 border-dashed cursor-pointer transition-all py-6 px-4"
                      style={{
                        borderColor: isDragOver ? 'var(--brand)' : csvFile ? 'var(--success)' : 'var(--card-border)',
                        background: isDragOver ? 'var(--brand-cream)' : csvFile ? 'var(--success-soft)' : 'var(--soft-bg)',
                      }}>
                      {csvFile ? (
                        <>
                          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ color: 'var(--success)' }}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10,9 9,9 8,9"/></svg>
                          <span className="text-[12px] font-semibold" style={{ color: 'var(--success)' }}>{csvFile.name}</span>
                          <span className="text-[11px]" style={{ color: 'var(--text-tertiary)' }}>File ready — click to change</span>
                        </>
                      ) : (
                        <>
                          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ color: isDragOver ? 'var(--brand)' : 'var(--text-tertiary)' }}><polyline points="16,16 12,12 8,16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
                          <span className="text-[12px] font-semibold" style={{ color: isDragOver ? 'var(--brand)' : 'var(--text-secondary)' }}>
                            {isDragOver ? 'Drop to upload' : 'Drag & drop a CSV file here'}
                          </span>
                          <span className="text-[11px]" style={{ color: 'var(--text-tertiary)' }}>or click to browse your computer</span>
                        </>
                      )}
                    </div>
                    <input ref={fileInputRef} type="file" accept=".csv,text/csv" className="hidden"
                      onChange={e => { const f = e.target.files[0]; if (f) setCsvFile(f); }} />
                  </div>
                )}
                <div className="flex justify-end gap-2 mt-5 flex-wrap">
                  <button onClick={onClose}
                    className="text-[12px] font-bold tracking-wider px-4 py-2 rounded-full border bg-white transition-all hover:bg-[var(--bg)]"
                    style={{ borderColor: 'var(--card-border)', color: 'var(--text-primary)' }}>CANCEL</button>
                  <button
                    onClick={() => { setShowDropZone(v => !v); if (showDropZone) setCsvFile(null); }}
                    className="text-[12px] font-bold tracking-wider px-4 py-2 rounded-full border bg-white transition-all hover:bg-[var(--bg)]"
                    style={{ borderColor: csvFile ? 'var(--success)' : 'var(--brand)', color: csvFile ? 'var(--success)' : 'var(--brand)' }}>
                    {csvFile ? '✓ CSV READY' : 'IMPORT CSV FILE'}
                  </button>
                  <button onClick={submit}
                    className="text-[12px] font-bold tracking-wider px-4 py-2 rounded-full text-white transition-all whitespace-nowrap"
                    style={{ background: 'var(--brand)', boxShadow: 'var(--shadow-sm)' }}>
                    {csvFile ? 'IMPORT CSV AND CREATE ROLE' : 'CREATE ROLE'}
                  </button>
                </div>
              </>
            )}
          </div>
        </div>
      );
    };

    // Modal shown when clicking a role label in the matrix header — adds a contact to that role.
    const AddContactToRoleModal = ({ role, onClose, onAdd }) => {
      const [first, setFirst] = useState('');
      const [last, setLast] = useState('');
      const [email, setEmail] = useState('');
      const [mobile, setMobile] = useState('');
      const canAdd = email.trim().length > 0;
      const upper = role.name.toUpperCase();
      return (
        <div className="modal-backdrop fixed inset-0 z-50 flex items-center justify-center px-4"
          style={{ background: 'rgba(27, 28, 31, 0.45)' }} onClick={onClose}>
          <div className="modal-card bg-white rounded-2xl border shadow-xl w-full max-w-[600px] p-6"
            style={{ borderColor: 'var(--card-border)' }} onClick={e => e.stopPropagation()}>
            <div className="flex items-start justify-between mb-4">
              <h3 className="text-[13px] font-bold tracking-wider flex items-center gap-2" style={{ color: 'var(--text-primary)' }}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                  <circle cx="9" cy="7" r="4" />
                  <line x1="19" y1="8" x2="19" y2="14" />
                  <line x1="22" y1="11" x2="16" y2="11" />
                </svg>
                ADD A {upper} TO THIS GALLERY
              </h3>
              <button onClick={onClose} aria-label="Close"
                style={{ color: 'var(--text-tertiary)' }} className="kebab-btn rounded p-1">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M3 3l10 10M13 3L3 13"/></svg>
              </button>
            </div>
            <ContactFields
              first={first} setFirst={setFirst}
              last={last} setLast={setLast}
              email={email} setEmail={setEmail}
              mobile={mobile} setMobile={setMobile}
            />
            <div className="my-5" style={{ borderTop: '1px solid var(--card-border)' }} />
            <div className="flex justify-end">
              <button onClick={() => { onAdd({ first, last, email, mobile }); onClose(); }}
                disabled={!canAdd}
                className="text-[12px] font-bold tracking-wider px-5 py-2.5 rounded-full disabled:opacity-40 transition-all"
                style={{ background: canAdd ? 'var(--brand)' : 'var(--off-bg)', color: canAdd ? '#fff' : 'var(--off-text)', boxShadow: canAdd ? 'var(--shadow-sm)' : 'none' }}>
                ADD AS {upper}
              </button>
            </div>
          </div>
        </div>
      );
    };

    // ===== Role Kebab Menu =====
    const RoleMenu = ({ canRemove, presetOnly, onRename, onSaveLater, onDuplicate, onRemove }) => (
      <div className="menu-pop absolute right-0 top-full mt-1.5 z-40 bg-white rounded-md shadow-lg border min-w-[210px] py-1.5"
        style={{ borderColor: 'var(--card-border)' }} onClick={e => e.stopPropagation()}>
        {!presetOnly && (<>
          <button onClick={onRename}
            className="menu-item w-full text-left text-[12px] font-bold tracking-wider px-4 py-2.5"
            style={{ color: 'var(--text-primary)' }}>RENAME</button>
          <button onClick={onSaveLater}
            className="menu-item w-full text-left text-[12px] font-bold tracking-wider px-4 py-2.5"
            style={{ color: 'var(--text-primary)' }}>SAVE FOR LATER USE</button>
          <button onClick={onDuplicate}
            className="menu-item w-full text-left text-[12px] font-bold tracking-wider px-4 py-2.5"
            style={{ color: 'var(--text-primary)' }}>DUPLICATE</button>
        </>)}
        {canRemove && (
          <button onClick={onRemove}
            className="menu-item-danger w-full text-left text-[12px] font-bold tracking-wider px-4 py-2.5"
            style={{ color: 'var(--danger)' }}>REMOVE</button>
        )}
      </div>
    );

    // ===== Role Actions Bottom Sheet (mobile) =====
    // iOS-style action sheet that slides up from the bottom on mobile.
    // Replaces the absolute-positioned RoleMenu dropdown which doesn't work
    // well on small screens (gets clipped, hard to reach with thumb, etc.).
    const RoleActionsSheet = ({ role, onClose, onAddContact, onRename, onSaveLater, onDuplicate, onRemove }) => {
      useEffect(() => {
        const prev = document.body.style.overflow;
        document.body.style.overflow = 'hidden';
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        return () => { document.body.style.overflow = prev; window.removeEventListener('keydown', onKey); };
      }, []);
      const Item = ({ icon, label, color, bg, danger, onClick }) => (
        <button type="button" onClick={onClick}
          className="sheet-item w-full flex items-center gap-3 px-4 py-3 text-left">
          <span className="flex items-center justify-center rounded-lg shrink-0"
            style={{ width: 32, height: 32, background: bg, color: color }}>
            {icon}
          </span>
          <span className="text-[15px] font-medium"
            style={{ color: danger ? 'var(--danger)' : 'var(--text-primary)' }}>{label}</span>
        </button>
      );
      return (
        <div className="fixed inset-0 z-[60] flex items-end justify-center"
          onClick={onClose}>
          <div className="sheet-backdrop absolute inset-0" style={{ background: 'rgba(0,0,0,0.4)' }} />
          <div className="sheet-panel relative w-full bg-white"
            style={{ borderTopLeftRadius: 16, borderTopRightRadius: 16, paddingBottom: 'env(safe-area-inset-bottom, 12px)', maxHeight: '85vh' }}
            onClick={(e) => e.stopPropagation()}>
            {/* Grab handle */}
            <div className="flex justify-center pt-2 pb-1">
              <div style={{ width: 36, height: 4, borderRadius: 2, background: '#D8D5CD' }} />
            </div>
            {/* Header */}
            <div className="flex items-center justify-between px-3 pt-2 pb-3 border-b"
              style={{ borderColor: 'var(--card-border)' }}>
              <button type="button" onClick={onClose}
                className="text-[15px] px-2 py-1"
                style={{ color: 'var(--brand)' }}>Cancel</button>
              <div className="text-[14px] font-bold uppercase tracking-wider truncate px-2"
                style={{ color: 'var(--text-primary)' }}>{role.name}</div>
              <div style={{ width: 56 }} />
            </div>
            {/* Actions */}
            <div className="py-2">
              <Item
                icon={<PlusUserIcon size={18} />}
                label={`Add contact to ${role.name}`}
                color="#FFFFFF" bg="var(--brand)"
                onClick={onAddContact} />
              <Item
                icon={<PencilIcon size={18} stroke={1.7} />}
                label="Rename"
                color="#FFFFFF" bg="#3B82F6"
                onClick={onRename} />
              <Item
                icon={<BookIcon size={18} stroke={1.7} />}
                label="Save for later use"
                color="#FFFFFF" bg="#F59E0B"
                onClick={onSaveLater} />
              <Item
                icon={<CopyIcon size={18} />}
                label="Duplicate"
                color="#FFFFFF" bg="#8B5CF6"
                onClick={onDuplicate} />
              {role.removable && (
                <Item
                  icon={<TrashIcon size={18} />}
                  label="Remove"
                  color="#FFFFFF" bg="var(--danger)"
                  danger
                  onClick={onRemove} />
              )}
            </div>
          </div>
        </div>
      );
    };

    // ===== Column Header =====
    const ColumnHeader = ({ role, contactCount = 0, isMenuOpen, onMenuToggle, isRenaming, onCommitRename, onCancelRename, onRename, onDuplicate, onRemove, onSaveLater, onAddContact }) => {
      const [tempName, setTempName] = useState(role.name);
      useEffect(() => { if (isRenaming) setTempName(role.name); }, [isRenaming, role.name]);

      return (
        <div className="relative flex items-center justify-center gap-1" style={{ color: 'var(--text-secondary)' }}>
          {isRenaming ? (
            <input autoFocus value={tempName}
              onChange={(e) => setTempName(e.target.value)}
              onClick={(e) => e.stopPropagation()}
              onBlur={() => onCommitRename(tempName)}
              onKeyDown={(e) => {
                e.stopPropagation();
                if (e.key === 'Enter') { e.preventDefault(); onCommitRename(tempName); }
                if (e.key === 'Escape') onCancelRename();
              }}
              className="text-[11px] font-bold uppercase tracking-wider w-[88px] text-center border-2 rounded px-1 py-0.5 outline-none"
              style={{ borderColor: 'var(--brand)', color: 'var(--text-primary)' }} maxLength={32} />
          ) : (
            <button type="button" onClick={(e) => { e.stopPropagation(); onAddContact && onAddContact(); }}
              className="text-[11px] font-bold uppercase tracking-wider truncate max-w-[140px] rounded px-1 py-0.5 hover:bg-black/5 transition-colors"
              title={`Add a ${role.name} to this gallery`}
              style={{ color: 'var(--text-secondary)' }}>
              {role.name}
              <span className="ml-1" style={{ color: 'var(--text-tertiary)', fontWeight: 600 }}>({contactCount})</span>
            </button>
          )}
          {!isRenaming && role.removable && (
            <button onClick={(e) => { e.stopPropagation(); onMenuToggle(); }}
              className="kebab-btn rounded p-1"
