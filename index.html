              style={{ color: 'var(--text-tertiary)' }}>
              <KebabIcon size={14} />
            </button>
          )}
          {isMenuOpen && role.removable && (
            <RoleMenu
              canRemove={role.removable}
              presetOnly={role.removable && !role.isCustom}
              onRename={onRename}
              onSaveLater={onSaveLater}
              onDuplicate={onDuplicate}
              onRemove={onRemove}
            />
          )}
        </div>
      );
    };

    // ===== Watermark Position Picker =====
    const WATERMARK_POSITIONS = [['tl','tc','tr'],['ml','mc','mr'],['bl','bc','br']];
    const watermarkPositionStyle = (pos) => {
      const map = {
        tl: { top: 12, left: 16, textAlign: 'left' },
        tc: { top: 12, left: '50%', transform: 'translateX(-50%)', textAlign: 'center' },
        tr: { top: 12, right: 16, textAlign: 'right' },
        ml: { top: '50%', left: 16, transform: 'translateY(-50%)', textAlign: 'left' },
        mc: { top: '50%', left: '50%', transform: 'translate(-50%,-50%)', textAlign: 'center' },
        mr: { top: '50%', right: 16, transform: 'translateY(-50%)', textAlign: 'right' },
        bl: { bottom: 12, left: 16, textAlign: 'left' },
        bc: { bottom: 12, left: '50%', transform: 'translateX(-50%)', textAlign: 'center' },
        br: { bottom: 12, right: 16, textAlign: 'right' },
      };
      return map[pos] || map.mc;
    };
    const WatermarkPositionPicker = ({ value, onChange, disabled }) => (
      <div className="watermark-picker w-full flex flex-col items-center"
        style={{ pointerEvents: disabled ? 'none' : 'auto', opacity: disabled ? 0.6 : 1 }}>
        <div className="text-[12px] font-medium mb-2" style={{ color: 'var(--text-primary)' }}>Edit Position</div>
        <div className="watermark-grid" role="radiogroup" aria-label="Watermark position"
          style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 30px)', gridTemplateRows: 'repeat(3, 30px)', gap: 2, marginBottom: 16 }}>
          {WATERMARK_POSITIONS.flat().map(pos => {
            const selected = value === pos;
            return (
              <button key={pos} type="button" role="radio" aria-checked={selected}
                onClick={() => onChange(pos)}
                className="watermark-cell"
                style={{ width: 30, height: 30,
                  background: selected ? 'var(--brand)' : '#fff',
                  border: '1px solid ' + (selected ? 'var(--brand)' : 'var(--card-border)'),
                  cursor: 'pointer', transition: 'background 0.12s, border-color 0.12s', padding: 0 }}
                title={`Position: ${pos}`}
              />
            );
          })}
        </div>
        <div className="watermark-preview" style={{
          width: '100%', maxWidth: 480,
          position: 'relative',
          aspectRatio: '16 / 10',
          borderRadius: 8,
          overflow: 'hidden',
          background: 'linear-gradient(135deg, #3a2f24 0%, #5c4a37 35%, #7e6a52 60%, #6a563f 100%)',
          boxShadow: 'inset 0 0 80px rgba(0,0,0,0.25)',
        }}>
          <svg viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice"
            style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }}>
            <defs>
              <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#6b563f"/>
                <stop offset="100%" stopColor="#3a2f24"/>
              </linearGradient>
              <linearGradient id="board" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stopColor="#f0e3c2"/>
                <stop offset="50%" stopColor="#fff7e2"/>
                <stop offset="100%" stopColor="#e0d2b0"/>
              </linearGradient>
            </defs>
            <rect width="320" height="200" fill="url(#sand)"/>
            {Array.from({ length: 60 }).map((_, i) => (
              <circle key={i} cx={(i * 53) % 320} cy={(i * 31) % 200} r={0.6} fill="rgba(255,255,255,0.05)" />
            ))}
            <ellipse cx="160" cy="115" rx="120" ry="32" fill="url(#board)" opacity="0.9"/>
            <path d="M 50 113 Q 160 95 270 113 Q 160 132 50 113 Z" fill="none" stroke="#9c1f1f" strokeWidth="0.6" opacity="0.6"/>
            <path d="M 60 117 Q 160 100 260 117" fill="none" stroke="#1f3a8c" strokeWidth="0.5" opacity="0.4"/>
          </svg>
          <div style={{
            position: 'absolute',
            ...watermarkPositionStyle(value),
            color: 'rgba(255,255,255,0.78)',
            fontSize: 14, fontWeight: 500,
            letterSpacing: '0.02em',
            textShadow: '0 1px 3px rgba(0,0,0,0.4)',
            pointerEvents: 'none',
            whiteSpace: 'nowrap',
            fontStyle: 'italic',
          }}>
            My Watermark
          </div>
        </div>
        <div className="flex gap-1.5 mt-3 mb-1">
          <span style={{ width: 22, height: 14, background: '#7a7a7e', borderRadius: 2 }} />
          <span style={{ width: 22, height: 14, background: '#c7c7cc', borderRadius: 2 }} />
        </div>
        <div className="text-[11px] mt-1 text-center" style={{ color: 'var(--text-tertiary)', lineHeight: 1.45 }}>
          Image shown is for preview purposes only.<br/>This setting only applies to Photos.
        </div>
      </div>
    );

    // ===== Info Tooltip =====
    const InfoTooltip = ({ content }) => {
      const [coords, setCoords] = React.useState(null);
      const iconRef = React.useRef(null);
      const handleEnter = () => {
        if (iconRef.current) {
          const r = iconRef.current.getBoundingClientRect();
          setCoords({ top: r.top - 8, left: r.left + r.width / 2 });
        }
      };
      return (
        <span style={{ display: 'inline-flex', alignItems: 'center', marginLeft: 5 }}>
          <span ref={iconRef}
            className="info-tooltip-icon"
            onMouseEnter={handleEnter}
            onMouseLeave={() => setCoords(null)}
            style={{ display: 'inline-flex', alignItems: 'center', cursor: 'default', color: 'var(--text-tertiary)' }}>
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <circle cx="8" cy="8" r="7" stroke="currentColor" strokeWidth="1.5"/>
              <text x="8" y="12" textAnchor="middle" fontSize="9" fontWeight="700" fill="currentColor" fontFamily="sans-serif">i</text>
            </svg>
          </span>
          {coords && ReactDOM.createPortal(
            <div style={{
              position: 'fixed',
              top: coords.top,
              left: coords.left,
              transform: 'translate(-50%, -100%)',
              zIndex: 2147483647,
              background: '#1e1e1e',
              color: '#fff',
              borderRadius: 8,
              padding: '10px 14px',
              width: 300,
              fontSize: 12,
              lineHeight: 1.55,
              boxShadow: '0 4px 20px rgba(0,0,0,0.45)',
              pointerEvents: 'none',
              whiteSpace: 'pre-wrap',
            }}>
              {content}
            </div>,
            document.body
          )}
        </span>
      );
    };

    // ===== Setting Control =====
    const SettingControl = ({ s, value, onChange, disabled, compact }) => {
      if (s.type === 'check') {
        return (
          <label className="inline-flex items-center gap-2 text-[13px] cursor-pointer whitespace-nowrap">
            <span className={`check-box ${value ? 'is-on' : ''}`} />
            <input type="checkbox" checked={!!value} disabled={disabled}
              onChange={(e) => onChange(e.target.checked)}
              className="sr-only" />
            <span style={{ color: 'var(--text-primary)' }}>{s.on || 'Enabled'}</span>
          </label>
        );
      }
      if (s.type === 'toggle') {
        return <Toggle checked={!!value} onChange={() => onChange(!value)} disabled={disabled} size="md" />;
      }
      if (s.type === 'text') {
        return (
          <input type="text" value={value || ''} disabled={disabled}
            onChange={(e) => onChange(e.target.value)}
            className="text-[13px] rounded-md border bg-white px-3 py-2 outline-none"
            style={{ borderColor: 'var(--card-border)', minWidth: 240 }} />
        );
      }
      if (s.type === 'number') {
        return (
          <input type="number" min={s.min ?? 1}
            value={value === undefined || value === null ? '' : value}
            disabled={disabled}
            placeholder={s.placeholder}
            onChange={(e) => {
              const raw = e.target.value;
              if (raw === '') { onChange(''); return; }
              const n = parseInt(raw, 10);
              onChange(Number.isFinite(n) ? n : '');
            }}
            className="text-[13px] rounded-md border bg-white px-3 py-2 outline-none text-right"
            style={{ borderColor: 'var(--card-border)', width: 110 }} />
        );
      }
      if (s.type === 'select') {
        return (
          <V5Select
            value={value || ''}
            options={s.options}
            disabled={disabled}
            onChange={onChange}
            minWidth={compact ? 220 : 240}
          />
        );
      }
      if (s.type === 'multicheck') {
        return (
          <div className="flex items-center gap-5 flex-wrap">
            {s.options.map(opt => {
              const checked = (value || []).includes(opt);
              return (
                <label key={opt} className="inline-flex items-center gap-2 text-[13px] cursor-pointer">
                  <span className={`check-box ${checked ? 'is-on' : ''}`} />
                  <input type="checkbox" checked={checked} disabled={disabled}
                    onChange={() => {
                      const next = checked ? value.filter(v => v !== opt) : [...(value || []), opt];
                      onChange(next);
                    }}
                    className="sr-only" />
                  <span style={{ color: 'var(--text-primary)' }}>{opt}</span>
                </label>
              );
            })}
          </div>
        );
      }
      if (s.type === 'radio') {
        return (
          <div className="flex items-center gap-5 flex-wrap">
            {s.options.map(opt => {
              const checked = value === opt;
              return (
                <label key={opt} className="inline-flex items-center gap-2 text-[13px] cursor-pointer">
                  <span className={`radio-dot ${checked ? 'is-on' : ''}`} />
                  <input type="radio" checked={checked} disabled={disabled}
                    onChange={() => onChange(opt)}
                    className="sr-only" />
                  <span style={{ color: 'var(--text-primary)' }}>{opt}</span>
                </label>
              );
            })}
          </div>
        );
      }
      if (s.type === 'position') {
        return <WatermarkPositionPicker value={value || 'mc'} onChange={onChange} disabled={disabled} />;
      }
      if (s.type === 'video-preview-config') {
        const start    = (value && value.start    != null) ? value.start    : '00';
        const duration = (value && value.duration != null) ? value.duration : '15';
        return (
          <div style={{ width: '100%', maxWidth: 520 }}>
            <p className="text-[13px] mb-2" style={{ color: 'var(--text-primary)' }}>
              Set your default for creating previews for <strong>ALL videos</strong> uploaded to this gallery.
            </p>
            <p className="text-[13px] font-bold mb-4" style={{ color: 'var(--text-primary)' }}>
              Set the start time and duration for the video as your preview.
            </p>
            <div className="flex items-end gap-3 mb-5">
              <div>
                <div className="text-[12px] mb-1.5" style={{ color: 'var(--text-secondary)' }}>Start Time (in sec)</div>
                <V5Select value={start} options={['00','05','10','15','30','45']} disabled={disabled}
                  onChange={(v) => onChange({ start: v, duration })} minWidth={110} />
              </div>
              <span className="text-[13px] pb-2" style={{ color: 'var(--text-secondary)' }}>and</span>
              <div>
                <div className="text-[12px] mb-1.5" style={{ color: 'var(--text-secondary)' }}>Duration (in sec)</div>
                <V5Select value={duration} options={['15','30']} disabled={disabled}
                  onChange={(v) => onChange({ start, duration: v })} minWidth={110} />
              </div>
            </div>
            <p className="text-[12px] leading-relaxed" style={{ color: 'var(--text-tertiary)' }}>
              <strong>NOTE:</strong> Enabling or changing this feature will only affect new videos uploaded to your account.
            </p>
          </div>
        );
      }
      if (s.type === 'radio') {
        return (
          <div className="flex items-center gap-5 flex-wrap">
            {s.options.map(opt => {
              const checked = value === opt;
              return (
                <label key={opt} className="inline-flex items-center gap-2 text-[13px] cursor-pointer">
                  <span className={`radio-dot ${checked ? 'is-on' : ''}`} />
                  <input type="radio" checked={checked} disabled={disabled}
                    onChange={() => onChange(opt)} className="sr-only" />
                  <span style={{ color: 'var(--text-primary)' }}>{opt}</span>
                </label>
              );
            })}
          </div>
        );
      }
      if (s.type === 'screenshot-config') {
        const cfg = value || {};
        if (disabled) {
          return (
            <div style={{ width: '100%' }}>
              {[{ label: 'Desktop Deterrence' }, { label: 'Mobile Deterrence' }].map((item, i) => (
                <div key={item.label} className="flex items-center gap-3 px-4 py-3 rounded-lg"
                  style={{ border: '1px solid var(--card-border)', background: '#fff', marginBottom: i === 0 ? 8 : 0 }}>
                  <Toggle size="sm" checked={false} onChange={() => {}} />
                  <span className="text-[13px] font-semibold" style={{ color: 'var(--text-tertiary)' }}>{item.label}</span>
                </div>
              ))}
            </div>
          );
        }
        const desktopOn = !!cfg.desktop;
        const mobileOn  = !!cfg.mobile;
        const desktopTitle   = cfg.desktopTitle   !== undefined ? cfg.desktopTitle   : 'Do Not Screenshot.';
        const desktopMessage = cfg.desktopMessage !== undefined ? cfg.desktopMessage : 'Unauthorized reproduction, distribution, or copying of these images by any means, including screenshots, is strictly prohibited.';
        const mobileScope    = cfg.mobileScope    || 'full';
        const mobileBlurType = cfg.mobileBlurType || 'diagonal';
        const mobileBanner   = !!cfg.mobileBanner;
        const update = (patch) => { if (!disabled) onChange({ ...cfg, ...patch }); };
        const blurOverlay = {
          radial:   { background: 'radial-gradient(circle at 50% 40%, transparent 22%, rgba(190,170,145,0.85) 62%)', backdropFilter: 'blur(10px)', WebkitBackdropFilter: 'blur(10px)' },
          diagonal: { backdropFilter: 'blur(10px)', WebkitBackdropFilter: 'blur(10px)', clipPath: 'polygon(0 0, 72% 0, 100% 28%, 100% 100%, 28% 100%, 0 72%)', background: 'rgba(190,170,145,0.25)' },
          vertical: { top: '15%', bottom: '15%', left: 0, right: 0, backdropFilter: 'blur(10px)', WebkitBackdropFilter: 'blur(10px)', background: 'rgba(190,170,145,0.2)' },
        };
        return (
          <div style={{ width: '100%' }}>
            <div className="flex items-start gap-2 mb-4 rounded-md px-3 py-2.5"
              style={{ background: '#fef2f2', border: '1px solid #fecaca' }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="#dc2626" style={{ flexShrink: 0, marginTop: 1 }}>
                <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
                <line x1="12" y1="9" x2="12" y2="13" stroke="white" strokeWidth="2" strokeLinecap="round"/>
                <line x1="12" y1="17" x2="12.01" y2="17" stroke="white" strokeWidth="2" strokeLinecap="round"/>
              </svg>
              <span className="text-[12px]" style={{ color: '#dc2626' }}>
                <strong>Notice:</strong> This is deterrence only and does not completely prevent screenshots.
              </span>
            </div>
            {/* Desktop Deterrence */}
            <div className="rounded-lg mb-3" style={{ border: '1px solid var(--card-border)', overflow: 'hidden' }}>
              <div className="flex items-center gap-3 px-4 py-3"
                style={{ borderBottom: desktopOn ? '1px solid var(--card-border)' : 'none' }}>
                <Toggle size="sm" checked={desktopOn} onChange={() => update({ desktop: !desktopOn })} />
                <span className="text-[13px] font-semibold" style={{ color: 'var(--text-primary)' }}>Desktop Deterrence</span>
              </div>
              {desktopOn && (
                <div className="px-4 pt-4 pb-4">
                  <div className="mb-4">
                    <label className="block text-[12px] font-bold mb-1.5" style={{ color: 'var(--text-primary)' }}>Title</label>
                    <input type="text" value={desktopTitle} onChange={e => update({ desktopTitle: e.target.value })}
                      className="rounded-md px-3 py-2 text-[13px] w-full outline-none"
                      style={{ border: '1px solid var(--card-border)', color: 'var(--text-primary)', background: '#fff' }} />
                  </div>
                  <div>
                    <label className="block text-[12px] font-bold mb-1.5" style={{ color: 'var(--text-primary)' }}>Protection Message</label>
                    <textarea value={desktopMessage} onChange={e => update({ desktopMessage: e.target.value })} rows={4}
                      style={{ width: '100%', border: '1px solid var(--card-border)', borderRadius: 8, outline: 'none',
                        padding: '10px 12px', fontSize: 12, color: 'var(--text-primary)', lineHeight: 1.6,
                        background: '#fff', fontFamily: 'inherit', resize: 'none', boxSizing: 'border-box' }} />
                  </div>
                </div>
              )}
            </div>
            {/* Mobile Deterrence */}
            <div className="rounded-lg" style={{ border: '1px solid var(--card-border)', overflow: 'hidden' }}>
              <div className="flex items-center gap-3 px-4 py-3"
                style={{ borderBottom: mobileOn ? '1px solid var(--card-border)' : 'none' }}>
                <Toggle size="sm" checked={mobileOn} onChange={() => update({ mobile: !mobileOn })} />
                <span className="text-[13px] font-semibold" style={{ color: 'var(--text-primary)' }}>Mobile Deterrence</span>
              </div>
              {mobileOn && (
                <div className="px-4 pt-4 pb-4 flex flex-col gap-4">
                  <div>
                    <div className="text-[12px] font-bold mb-2" style={{ color: 'var(--text-primary)' }}>Enable blur deterrence:</div>
                    {[{ value: 'full', label: 'On full gallery' }, { value: 'lightbox', label: 'On lightbox only' }].map(opt => (
                      <label key={opt.value} className="flex items-center gap-2 mb-2 cursor-pointer">
                        <span className={`radio-dot ${mobileScope === opt.value ? 'is-on' : ''}`} />
                        <input type="radio" className="sr-only" checked={mobileScope === opt.value}
                          onChange={() => update({ mobileScope: opt.value })} />
                        <span className="text-[13px]" style={{ color: 'var(--text-primary)' }}>{opt.label}</span>
                      </label>
                    ))}
                  </div>
                  <div>
                    <div className="text-[12px] font-bold mb-2" style={{ color: 'var(--text-primary)' }}>Select blur type:</div>
                    {[{ value: 'radial', label: 'Radial blur' }, { value: 'diagonal', label: 'Diagonal blur' }, { value: 'vertical', label: 'Vertical blur' }].map(opt => (
                      <label key={opt.value} className="flex items-center gap-2 mb-2 cursor-pointer">
                        <span className={`radio-dot ${mobileBlurType === opt.value ? 'is-on' : ''}`} />
                        <input type="radio" className="sr-only" checked={mobileBlurType === opt.value}
                          onChange={() => update({ mobileBlurType: opt.value })} />
                        <span className="text-[13px]" style={{ color: 'var(--text-primary)' }}>{opt.label}</span>
                      </label>
                    ))}
                  </div>
                  <div>
                    <div className="text-[10px] font-bold tracking-widest mb-2" style={{ color: 'var(--text-tertiary)' }}>MOBILE BLUR PREVIEW</div>
                    <div className="rounded-lg overflow-hidden" style={{ position: 'relative', height: 160, maxWidth: 260 }}>
                      <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(160deg, #7a6245 0%, #b8956a 25%, #e0c9a0 50%, #9b8260 72%, #5e4430 100%)' }} />
                      <div style={{ position: 'absolute', inset: 0, ...blurOverlay[mobileBlurType] }} />
                    </div>
                    <div className="mt-1.5 text-[11px]" style={{ color: 'var(--text-secondary)' }}>
                      {mobileBlurType === 'radial' ? 'Radial' : mobileBlurType === 'diagonal' ? 'Diagonal' : 'Vertical'} Blur Effect
                    </div>
                  </div>
                  <div>
                    <div className="text-[12px] font-bold mb-2" style={{ color: 'var(--text-primary)' }}>Show banner:</div>
                    <label className="flex items-center gap-2 mb-1 cursor-pointer">
                      <span className={`check-box ${mobileBanner ? 'is-on' : ''}`} />
                      <input type="checkbox" className="sr-only" checked={mobileBanner}
                        onChange={e => update({ mobileBanner: e.target.checked })} />
                      <span className="text-[13px] font-medium" style={{ color: 'var(--text-primary)' }}>
                        Banner Message <span style={{ color: 'var(--text-tertiary)', fontWeight: 400 }}>(optional)</span>
                      </span>
                    </label>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }
      return null;
    };

    // ===== Settings panels =====
    // Single-role flat settings (no Set per role, no diff)
    // Children of dependent settings are rendered inline as indented sub-rows directly under
    // the parent setting they belong to.
    const SimpleSettingsBlock = ({ feature, role, perRole, onUpdate }) => {
      const visibleSettings = feature.settings.filter(s => isSettingVisibleForRole(s, role.id, feature.id, perRole));
      const topLevel = visibleSettings.filter(s => !s.dependsOn);
      const childrenOf = (id) => visibleSettings.filter(s => s.dependsOn?.settingId === id);
      // Mirror the per-role behavior: when the single role has the feature off, dim the
      // controls so they read as inactive without removing context.
      const roleEnabled = !!perRole[role.id]?.[feature.id]?.enabled;
      const disabledStyle = roleEnabled ? null : { opacity: 0.5, pointerEvents: 'none' };
      return (
        <div className="multi-panel-body px-8 py-2" style={{ background: 'var(--soft-bg)', borderTop: '1px solid var(--card-border)' }}>
          {topLevel.map((s, i) => {
            const isToggle = s.type === 'toggle';
            const kids = childrenOf(s.id);
            const showDivider = !!s.optional && i !== 0;
            return (
              <div key={s.id}
                style={{
                  borderTop: showDivider ? '1px solid var(--card-border)' : 'none',
                  marginTop: showDivider ? 6 : 0,
                }}>
                <div className="shared-flat-row grid items-center gap-4"
                  style={{
                    gridTemplateColumns: '1fr auto',
                    padding: '14px 0',
                    alignItems: isToggle ? 'flex-start' : 'center',
                  }}>
                  <div style={{ opacity: roleEnabled ? 1 : 0.6 }}>
                    <div className="flex items-center text-[13px] font-medium" style={{ color: 'var(--text-primary)' }}>
                      {s.label}{s.tooltip && <InfoTooltip content={s.tooltip} />}
                    </div>
                    {s.meta && (
                      <div className="text-[12px] mt-1 leading-relaxed" style={{ color: 'var(--text-secondary)', whiteSpace: 'pre-line' }}>
                        {s.meta}
                      </div>
                    )}
                  </div>
                  <div className="control-end flex" style={disabledStyle} aria-disabled={!roleEnabled}>
                    <SettingControl s={s} value={perRole[role.id]?.[feature.id]?.values?.[s.id]} onChange={(v) => onUpdate(role.id, s.id, v)} compact />
                  </div>
                </div>
                {kids.map(c => (
                  c.fullWidth ? (
                    <div key={c.id} style={{ borderTop: '1px solid var(--card-border)', padding: '14px 16px', opacity: roleEnabled ? 1 : 0.5 }}>
                      <SettingControl s={c} value={perRole[role.id]?.[feature.id]?.values?.[c.id]} onChange={(v) => onUpdate(role.id, c.id, v)} compact disabled={!roleEnabled} />
                    </div>
                  ) : (
                    <div key={c.id}
                      className="shared-flat-row grid items-center gap-4"
                      style={{
                        gridTemplateColumns: '1fr auto',
                        padding: '6px 0 12px 22px',
                        marginTop: -8,
                      }}>
                      <div className="flex items-center gap-1.5 text-[12px]" style={{ color: 'var(--text-secondary)', opacity: roleEnabled ? 1 : 0.6 }}>
                        <span aria-hidden="true" style={{ color: 'var(--brand)', opacity: 0.7 }}>↳</span>
                        <span>{c.label}</span>
                      </div>
                      <div className="control-end flex" style={disabledStyle} aria-disabled={!roleEnabled}>
                        <SettingControl s={c} value={perRole[role.id]?.[feature.id]?.values?.[c.id]} onChange={(v) => onUpdate(role.id, c.id, v)} compact />
                      </div>
                    </div>
                  )
                ))}
              </div>
            );
          })}
        </div>
      );
    };

    // Multi-role: shared row — single value applied to all roles. No per-row Set per role
    // (Set per role is now a feature-level button at the top of the panel).
    // Visible child settings (passed in `children`) render as indented sub-rows directly
    // attached to the parent so users don't have to scan further down for the dependent input.
    const SharedRowFlat = ({ s, value, onChangeAll, isFirst, subSettings = [], childValues = {}, onChildShared }) => {
      const isToggle = s.type === 'toggle';
      const showDivider = !!s.optional && !isFirst;
      if (s.fullWidth) {
        return (
          <div style={{ padding: '14px 16px' }}>
            <SettingControl s={s} value={value} onChange={onChangeAll} compact />
          </div>
        );
      }
      return (
        <div style={{
          borderTop: showDivider ? '1px solid var(--card-border)' : 'none',
          marginTop: showDivider ? 6 : 0,
        }}>
          <div className="shared-flat-row grid gap-3"
            style={{ gridTemplateColumns: '1fr auto',
                     padding: '14px 0',
                     alignItems: isToggle ? 'flex-start' : 'center' }}>
            <div>
              <div className="flex items-center text-[13px] font-medium" style={{ color: 'var(--text-primary)' }}>
                {s.label}{s.tooltip && <InfoTooltip content={s.tooltip} />}
              </div>
              {s.meta && (
                <div className="text-[12px] mt-1 leading-relaxed" style={{ color: 'var(--text-secondary)', whiteSpace: 'pre-line' }}>
                  {s.meta}
                </div>
              )}
            </div>
            <div className="control-end flex">
              <SettingControl s={s} value={value} onChange={onChangeAll} compact />
            </div>
          </div>
          {subSettings.map(c => (
            c.fullWidth ? (
              <div key={c.id} style={{ borderTop: '1px solid var(--card-border)', padding: '14px 16px' }}>
                <SettingControl s={c} value={childValues[c.id]} onChange={(v) => onChildShared && onChildShared(c.id, v)} compact />
              </div>
            ) : (
              <div key={c.id}
                className="shared-flat-row grid gap-3"
                style={{
                  gridTemplateColumns: '1fr auto',
                  padding: '6px 0 12px 22px',
                  marginTop: -8,
                  alignItems: 'center',
                }}>
                <div className="flex items-center gap-1.5 text-[12px]" style={{ color: 'var(--text-secondary)' }}>
                  <span aria-hidden="true" style={{ color: 'var(--brand)', opacity: 0.7 }}>↳</span>
                  <span>{c.label}</span>
                </div>
                <div className="control-end flex">
                  <SettingControl s={c} value={childValues[c.id]} onChange={(v) => onChildShared && onChildShared(c.id, v)} compact />
                </div>
              </div>
            )
          ))}
        </div>
      );
    };

    // Per-role stack for a single setting. Shows ALL roles (even those with the feature off)
    // so users can adjust their settings; OFF roles render with a greyed-out indicator.
    // Dependent settings (passed as `childSettings`) are rendered inline as indented sub-rows
    // tucked under the role they apply to, so a "Number of images allowed" input appears
    // immediately below the row whose dropdown selected "Specific Amount Download".
    const PerRoleGroup = ({ s, visibleRoles, perRole, featureId, onUpdate, isFirst, childSettings = [] }) => (
      <div style={{
        borderTop: !isFirst ? '1px solid var(--card-border)' : 'none',
        paddingTop: isFirst ? 14 : 18,
        paddingBottom: 14,
      }}>
        <div className="flex items-center text-[13px] font-semibold mb-2" style={{ color: 'var(--text-primary)' }}>
          {s.label}{s.tooltip && <InfoTooltip content={s.tooltip} />}
        </div>
        <div className="rounded-lg overflow-hidden bg-white" style={{ border: '1px solid var(--card-border)' }}>
          {visibleRoles.map((r, idx) => {
            const value = perRole[r.id]?.[featureId]?.values?.[s.id];
            const roleEnabled = !!perRole[r.id]?.[featureId]?.enabled;
            const visibleChildren = childSettings.filter(c => isSettingVisibleForRole(c, r.id, featureId, perRole));
            // When the feature is off for this role, dim its setting controls and
            // disable interaction so they're clearly inactive without removing context.
            const disabledStyle = roleEnabled ? null : { opacity: 0.5, pointerEvents: 'none' };
            return (
              <React.Fragment key={r.id}>
                <div
                  className="role-row per-role-row grid items-center"
                  style={{
                    gridTemplateColumns: '160px 1fr',
                    padding: '10px 14px',
                    borderTop: idx > 0 ? '1px solid var(--card-border)' : 'none',
                    background: '#fff',
                  }}>
                  <div className="flex items-center gap-2 text-[11px] font-bold tracking-wider uppercase" style={{ color: 'var(--text-secondary)', opacity: roleEnabled ? 1 : 0.6 }}>
                    <span className="rounded-full shrink-0"
                      style={{ width: 7, height: 7, background: 'var(--green)', opacity: roleEnabled ? 1 : 0.3 }} />
                    <span className="truncate" title={r.name}>{r.name}</span>
                  </div>
                  <div className="control-cell flex justify-end" style={disabledStyle}
                    aria-disabled={!roleEnabled}>
                    <SettingControl s={s} value={value} onChange={(v) => onUpdate(r.id, s.id, v)} compact />
                  </div>
                </div>
                {visibleChildren.map(c => (
                  <div key={c.id}
                    className="role-row per-role-row grid items-center child-row"
                    style={{
                      gridTemplateColumns: '160px 1fr',
                      padding: '8px 14px 10px 32px',
                      background: 'var(--soft-bg)',
                      minHeight: 0,
                    }}>
                    <div className="flex items-center gap-1.5 text-[11px] font-medium" style={{ color: 'var(--text-secondary)', opacity: roleEnabled ? 1 : 0.6 }}>
                      <span aria-hidden="true" style={{ color: 'var(--brand)', opacity: 0.7 }}>↳</span>
                      <span className="truncate" title={c.label}>{c.label}</span>
                    </div>
                    <div className="control-cell flex justify-end" style={disabledStyle}
                      aria-disabled={!roleEnabled}>
                      <SettingControl s={c}
                        value={perRole[r.id]?.[featureId]?.values?.[c.id]}
                        onChange={(v) => onUpdate(r.id, c.id, v)} compact />
                    </div>
                  </div>
                ))}
              </React.Fragment>
            );
          })}
        </div>
      </div>
    );

    // Outlined orange action button used for "Set per role" / "Match across roles"
    const OutlineCtaBtn = ({ onClick, children }) => (
      <button onClick={onClick}
        className="outline-cta-btn text-[12px] font-medium px-4 py-2 rounded-full border transition-all"
        style={{ borderColor: 'var(--brand)', background: 'var(--brand-cream)', color: 'var(--brand)' }}>
        {children}
      </button>
    );

    // Eye icons used by the "Show off roles" toggle inside per-role mode.
    const EyeIcon = ({ size = 14 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round">
        <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z" />
        <circle cx="12" cy="12" r="3" />
      </svg>
    );
    const EyeOffIcon = ({ size = 14 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round">
        <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-6.5 0-10-7-10-7a18.4 18.4 0 0 1 4.06-5.06" />
        <path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c6.5 0 10 7 10 7a18.4 18.4 0 0 1-2.16 3.19" />
        <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24" />
        <line x1="2" y1="2" x2="22" y2="22" />
      </svg>
    );

    // Multi-role expanded panel — per-role is always-on. Every setting renders for every
    // available role; OFF roles still appear (with a greyed indicator inside PerRoleGroup)
    // so users can configure them ahead of enabling. Optional/global settings (e.g. license)
    // remain a single shared row that applies across roles.
    const MultiRoleSettingsBlock = ({ feature, roles, perRole, onUpdate, onUpdateShared }) => {
      const mainSettings = feature.settings.filter(s => !s.optional);
      const optionalSettings = feature.settings.filter(s => s.optional);
      const refRoleId = roles[0].id;

      return (
        <div style={{ background: 'var(--soft-bg)', borderTop: '1px solid var(--card-border)' }}>
          <div className="multi-panel-body px-8 pt-4 pb-5">
            {(() => {
              // Render only top-level settings; dependent ones are nested inline
              // inside their parent group's role row (e.g. "Number of images allowed"
              // appears under the role whose Download Type is "Specific Amount Download").
              const topLevel = mainSettings.filter(s => !s.dependsOn);
              const childrenOf = (id) => mainSettings.filter(s => s.dependsOn?.settingId === id);
              const renderable = topLevel
                .map(s => ({
                  s,
                  visibleRoles: roles.filter(r => isSettingVisibleForRole(s, r.id, feature.id, perRole)),
                  childSettings: childrenOf(s.id),
                }))
                .filter(({ visibleRoles }) => visibleRoles.length > 0);
              if (renderable.length === 0) {
                return (
                  <div className="text-[12px] italic py-3" style={{ color: 'var(--text-tertiary)' }}>
                    No settings to configure for this feature.
                  </div>
                );
              }
              return renderable.map(({ s, visibleRoles, childSettings }, i) => (
                <PerRoleGroup key={s.id} s={s} visibleRoles={visibleRoles} perRole={perRole}
                  featureId={feature.id}
                  onUpdate={(rId, sId, v) => onUpdate(rId, sId, v)}
                  isFirst={i === 0} childSettings={childSettings} />
              ));
            })()}

            {optionalSettings.length > 0 && (() => {
              const topLevelOptional = optionalSettings.filter(s => !s.dependsOn);
              const dependentOptional = optionalSettings.filter(s => s.dependsOn);
              return (
                <div style={{ borderTop: '1px solid var(--card-border)', marginTop: 6, paddingTop: 4 }}>
                  <div className="rounded-lg overflow-hidden" style={{ border: '1px solid var(--card-border)', background: '#fff' }}>
                    {topLevelOptional.map(s => (
                      <SharedRowFlat key={s.id} s={s}
                        value={perRole[refRoleId]?.[feature.id]?.values?.[s.id]}
                        onChangeAll={(v) => onUpdateShared(s.id, v)}
                        isFirst />
                    ))}
                    {dependentOptional.map(s => {
                      const dep = s.dependsOn;
                      const depVal = perRole[refRoleId]?.[feature.id]?.values?.[dep.settingId];
                      const visible = dep.values ? dep.values.includes(depVal) : true;
                      if (!visible) return null;
                      const val = perRole[refRoleId]?.[feature.id]?.values?.[s.id];
                      return (
                        <div key={s.id} style={{ borderTop: '1px solid var(--card-border)', padding: '14px 16px' }}>
                          <SettingControl s={s} value={val} onChange={(v) => onUpdateShared(s.id, v)} compact />
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })()}
          </div>
        </div>
      );
    };

    // ===== Matrix Row =====
    // Renders one feature in the matrix. On desktop this is a horizontal grid:
    // feature label on the left + a toggle column for every role.
    // On mobile we flip it to a stacked card so it fits a narrow viewport: feature header
    const getSharedValue = (perRole, roles, featureId, settingId) => {
      const refRoleId = roles[0]?.id;
      return refRoleId ? perRole[refRoleId]?.[featureId]?.values?.[settingId] : undefined;
    };

    // on top (clickable to expand settings), and each role rendered as a label/toggle row.
    const MatrixRow = ({ feature, roles, perRole, isOpen, onToggleOpen, onToggleEnabled, onUpdateShared, onSetOpen, gridCols, hasSettings, isMobile, onEditSettings }) => {
      if (isMobile) {
        return (
          <div className="border-t" style={{ borderColor: 'var(--card-border)' }}>
            <div className="feature-row-mobile flex items-center gap-2">
              {feature.icon && (
                <span className="flex items-center justify-center" style={{ width: 20, height: 20 }}>
                  <FeatureIcon name={feature.icon} />
                </span>
              )}
              <div className="flex-1">
                <div className="text-[14px] font-medium leading-tight" style={{ color: 'var(--text-primary)' }}>
                  {feature.name}
                </div>
                {feature.appliesToAll && !feature.sharedToggle && (
                  <div className="text-[12px] italic" style={{ color: 'var(--text-tertiary)' }}>Applies to all roles</div>
                )}
                {feature.sharedToggle && (
                  <div className="text-[12px] italic" style={{ color: 'var(--text-tertiary)' }}>Applies to all roles</div>
                )}
              </div>
              {!feature.sharedToggle && !feature.appliesToAll && hasSettings ? (
                <button onClick={onEditSettings}
                  className="text-[11px] font-bold uppercase tracking-wider px-2 py-1 rounded-md whitespace-nowrap"
                  style={{ color: 'var(--brand)' }}>
                  Edit settings
                </button>
              ) : null}
            </div>
            <div className="px-3 pb-3 pt-1">
              {feature.sharedToggle ? null : feature.appliesToAll ? (
                (() => {
                  const v = getSharedValue(perRole, roles, feature.id, 'watermark-source');
                  return v && v !== 'None' ? (
                    <div className="rounded-md border bg-white px-3 py-2.5 text-[12px]"
                      style={{ borderColor: 'var(--card-border)', color: 'var(--text-primary)', fontWeight: 500 }}>
                      {v}
                    </div>
                  ) : null;
                })()
              ) : (
                <div className="rounded-md border bg-white" style={{ borderColor: 'var(--card-border)' }}>
                  {roles.map((r, idx) => (
                    <div key={r.id}
                      className="flex items-center justify-between gap-3 px-3 py-2.5"
                      style={{ borderTop: idx > 0 ? '1px solid var(--card-border)' : 'none' }}>
                      <span className="text-[11px] font-bold uppercase tracking-wider truncate" style={{ color: 'var(--text-secondary)' }}>
                        {r.name}
                      </span>
                      <Toggle size="sm" checked={!!perRole[r.id]?.[feature.id]?.enabled}
                        onChange={() => onToggleEnabled(r.id)} />
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        );
      }
      const SUMMARY_FEATURES = new Set(['photo-downloads', 'video-downloads', 'screenshot-protection']);
      const showSummary = SUMMARY_FEATURES.has(feature.id);
      const statusLines = showSummary ? buildFeatureStatusLines(feature, roles, perRole) : [];
      return (
        <div className="border-t" style={{ borderColor: 'var(--card-border)' }}>
          <div onClick={() => hasSettings && onToggleOpen()}
            className={`feature-row grid items-center${hasSettings ? ' is-collapsible' : ''}${isOpen ? ' is-open' : ''}`}
            style={{ gridTemplateColumns: gridCols, minHeight: 58, padding: '16px 0',
              cursor: hasSettings ? 'pointer' : 'default',
              background: isOpen ? 'var(--soft-bg)' : undefined }}>
            <div className="pl-6">
              <div className="flex items-center gap-2">
                <span style={{ color: 'var(--text-tertiary)',
                  visibility: hasSettings ? 'visible' : 'hidden',
                  transform: isOpen ? 'rotate(90deg)' : 'none', transition: 'transform 0.15s' }}><ChevronRight /></span>
                {feature.icon && (
                  <span className="flex items-center justify-center" style={{ width: 20, height: 20 }}>
                    <FeatureIcon name={feature.icon} />
                  </span>
                )}
                <div className="text-[14px] font-medium leading-tight" style={{ color: 'var(--text-primary)' }}>
                  {feature.name}
                </div>
              </div>
              {feature.appliesToAll && !feature.sharedToggle && (() => {
                const src = getSharedValue(perRole, roles, feature.id, 'watermark-source');
                const enabled = src && src !== 'None';
                return enabled ? (
                  <div className="text-[12px] italic mt-0.5" style={{ color: 'var(--text-tertiary)', paddingLeft: 23 }}>
                    {src} applied to all roles
                  </div>
                ) : null;
              })()}
              {feature.sharedToggle && (() => {
                const enabled = !!perRole[roles[0]?.id]?.[feature.id]?.enabled;
                return enabled ? (
                  <div className="text-[12px] italic mt-0.5" style={{ color: 'var(--text-tertiary)', paddingLeft: 23 }}>
                    Applied to all roles
                  </div>
                ) : null;
              })()}
              {showSummary && statusLines.length > 0 && (
                <div className="mt-1.5 space-y-0.5" style={{ paddingLeft: 23 }}>
                  {statusLines.map((line, idx) => (
                    <div key={idx} className="text-[12px] leading-snug italic" style={{ color: 'var(--text-secondary)' }}>
                      {line}
                    </div>
                  ))}
                </div>
              )}
            </div>
            {feature.sharedToggle ? (
              (() => {
                const enabled = !!perRole[roles[0]?.id]?.[feature.id]?.enabled;
                return (
                  <div className="flex items-center justify-center"
                    style={{ gridColumn: `span ${roles.length}` }}>
                    <Toggle size="sm" checked={enabled}
                      onChange={() => onToggleEnabled(roles[0]?.id)} />
                  </div>
                );
              })()
            ) : feature.appliesToAll ? (
              (() => {
                if (isOpen) return null;
                const watermarkSetting = feature.settings.find(s => s.id === 'watermark-source');
                const options = watermarkSetting ? watermarkSetting.options : ['None'];
                const sharedSource = getSharedValue(perRole, roles, feature.id, 'watermark-source') || 'None';
                return (
                  <div className="flex items-center justify-end pr-4"
                    style={{ gridColumn: `2 / span ${roles.length}` }}
                    onClick={e => e.stopPropagation()}>
                    <V5Select
                      value={sharedSource}
                      options={options}
                      onChange={v => {
                        onUpdateShared && onUpdateShared('watermark-source', v);
                        onSetOpen && onSetOpen(v !== 'None');
                      }}
                      minWidth={160}
                    />
                  </div>
                );
              })()
            ) : (
              roles.map(r => {
                const enabled = !!perRole[r.id]?.[feature.id]?.enabled;
                return (
                  <div key={r.id} className="flex justify-center">
                    <Toggle size="sm" checked={enabled}
                      onChange={() => onToggleEnabled(r.id)} />
                  </div>
                );
              })
            )}
          </div>
        </div>
      );
    };

    // ===== Compare-Cell radio group =====
    // Inside the Compare-All modal, "select" settings render as radio lists rather than
    // closed dropdowns. Horizontal comparison across roles is far easier when every option
    // is visible — you can scan a row and immediately spot which roles have which value
    // checked, without clicking each cell open. Other control types fall through to
    // SettingControl as-is.
    const CompareCellControl = ({ s, value, onChange, name }) => {
      if (s.type === 'select') {
        return (
          <div className="flex flex-col gap-0.5">
            {s.options.map(opt => {
              const checked = value === opt;
              return (
                <label key={opt} className="inline-flex items-center gap-2 text-[12px] cursor-pointer leading-tight py-0.5">
                  <span className={`radio-dot ${checked ? 'is-on' : ''}`} />
                  <input type="radio" name={name} checked={checked}
                    onChange={() => onChange(opt)} className="sr-only" />
                  <span style={{ color: 'var(--text-primary)' }}>{opt}</span>
                </label>
              );
            })}
          </div>
        );
      }
      return <SettingControl s={s} value={value} onChange={onChange} compact />;
    };

    // ===== Compare-All Modal =====
    // v4: the per-feature Compare Roles entry point is gone — replaced by a single
    // "Compare All" button beside ADD ROLE. This modal opens almost full-screen and shows
    // every feature × every role at once. It's a secondary scanning surface, not the
    // primary editing flow; opening / closing it is non-destructive (writes flow through
    // the same handlers as the stacked panels). Selects expand into radio lists for
    // easier horizontal scanning across roles.
    const CompareAllModal = ({
      features, roles, perRole, contacts = [],
      onClose, onUpdate, onUpdateShared, onToggleEnabled,
      onAddRole,
      openMenuRoleId, onMenuToggle,
      renamingRoleId, onStartRename, onCommitRename, onCancelRename,
      onRoleSaveLater, onRoleDuplicate, onRoleRemove, onRoleAddContact,
    }) => {
      useEffect(() => {
        const prev = document.body.style.overflow;
        document.body.style.overflow = 'hidden';
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        return () => { document.body.style.overflow = prev; window.removeEventListener('keydown', onKey); };
      }, []);
      // Features with settings default to collapsed so the modal opens clean.
      const [collapsed, setCollapsed] = useState(() => new Set(features.filter(f => f.settings.length > 0).map(f => f.id)));
      const toggleCollapse = (fId) => {
        setCollapsed(prev => {
          const next = new Set(prev);
          if (next.has(fId)) next.delete(fId); else next.add(fId);
          return next;
        });
      };
      const handleFeatureToggle = (feature, roleId) => {
        const wasEnabled = !!perRole[roleId]?.[feature.id]?.enabled;
        onToggleEnabled && onToggleEnabled(feature.id, roleId);
        if (!wasEnabled && feature.settings && feature.settings.length > 0) {
          setCollapsed(prev => {
            if (!prev.has(feature.id)) return prev;
            const next = new Set(prev);
            next.delete(feature.id);
            return next;
          });
        }
      };
      const refRoleId = roles[0].id;
      const SETTING_COL_WIDTH = 260;
      const ROLE_COL_WIDTH = 300;
      const minGridWidth = SETTING_COL_WIDTH + roles.length * ROLE_COL_WIDTH;

      return (
        <div className="fixed inset-0 z-[50] flex modal-backdrop"
          style={{ background: 'var(--bg)' }}>
          <div className="modal-card compare-all-fullscreen relative bg-white flex flex-col"
            style={{ width: '100vw', height: '100vh', maxWidth: 'none' }}>

            {/* Header */}
            <header className="flex items-center justify-between px-5 h-14 border-b shrink-0"
              style={{ borderColor: 'var(--card-border)' }}>
              <div className="flex items-center gap-2">
                <CompareIcon size={16} stroke={1.7} />
                <h2 className="text-[15px] font-extrabold tracking-tight" style={{ color: 'var(--text-primary)' }}>
                  Compare All — every feature across roles
                </h2>
                <span className="text-[12px] ml-2" style={{ color: 'var(--text-secondary)' }}>
                  {features.length} feature{features.length === 1 ? '' : 's'} · {roles.length} role{roles.length === 1 ? '' : 's'}
                </span>
              </div>
              <div className="flex items-center gap-2">
                {onAddRole && (
                  <button onClick={onAddRole}
                    className="add-role-btn flex items-center gap-2 text-[11px] font-bold tracking-wider px-4 py-2 rounded-full text-white whitespace-nowrap">
                    <UserIcon size={13} stroke={2} /> ADD ROLE
                  </button>
                )}
                <button onClick={onClose} className="p-2 rounded-md hover:bg-black/5"
                  aria-label="Close compare" style={{ color: 'var(--text-primary)' }}>
                  <CloseIcon size={20} />
                </button>
              </div>
            </header>

            {/* Body */}
            <div className="compare-grid-scroll flex-1" style={{ overflowY: 'auto' }}>
              <div style={{ minWidth: minGridWidth }}>

                {/* Sticky column header row with full ColumnHeader per role */}
                <div className="grid items-stretch" style={{
                  gridTemplateColumns: `${SETTING_COL_WIDTH}px repeat(${roles.length}, ${ROLE_COL_WIDTH}px)`,
                  background: 'var(--soft-bg)',
                  borderBottom: '1px solid var(--card-border)',
                  position: 'sticky', top: 0, zIndex: 3,
                }}>
                  <div className="pl-5 text-[11px] font-bold uppercase tracking-wider flex items-center"
                    style={{
                      color: 'var(--text-secondary)',
                      background: 'var(--soft-bg)',
                      borderRight: '1px solid var(--card-border)',
                      position: 'sticky', left: 0, zIndex: 4,
                      padding: '10px 16px',
                    }}>
                    Feature / Setting
                  </div>
                  {roles.map((r, i) => (
                    <div key={r.id} className="flex items-center justify-center"
                      style={{
                        borderRight: i === roles.length - 1 ? 'none' : '1px solid var(--card-border)',
                        padding: '8px 12px',
                      }}>
                      <ColumnHeader role={r}
                        contactCount={contacts.filter(c => c.roleId === r.id).length}
                        isMenuOpen={openMenuRoleId === r.id}
                        onMenuToggle={() => onMenuToggle && onMenuToggle(openMenuRoleId === r.id ? null : r.id)}
                        isRenaming={renamingRoleId === r.id}
                        onCommitRename={(name) => onCommitRename && onCommitRename(r.id, name)}
                        onCancelRename={() => onCancelRename && onCancelRename()}
                        onRename={() => { onStartRename && onStartRename(r.id); onMenuToggle && onMenuToggle(null); }}
                        onDuplicate={() => { onRoleDuplicate && onRoleDuplicate(r.id); onMenuToggle && onMenuToggle(null); }}
                        onRemove={() => { onRoleRemove && onRoleRemove(r.id); onMenuToggle && onMenuToggle(null); }}
                        onSaveLater={() => { onRoleSaveLater && onRoleSaveLater(r); onMenuToggle && onMenuToggle(null); }}
                        onAddContact={() => onRoleAddContact && onRoleAddContact(r.id)}
                      />
                    </div>
                  ))}
                </div>

                {/* Per-feature sections */}
                {features.map((feature, fIdx) => {
                  const settings = feature.settings || [];
                  const hasSettings = settings.length > 0;
                  const isCollapsed = collapsed.has(feature.id);
                  return (
                    <div key={feature.id}>
                      <div onClick={() => hasSettings && toggleCollapse(feature.id)}
                        className={`grid items-stretch${hasSettings ? ' compare-feature-header-expandable' : ''}`}
                        style={{
                          gridTemplateColumns: `${SETTING_COL_WIDTH}px repeat(${roles.length}, ${ROLE_COL_WIDTH}px)`,
                          background: '#fff',
                          borderTop: fIdx === 0 ? 'none' : '6px solid var(--soft-bg)',
                          borderBottom: '1px solid var(--card-border)',
                          position: 'sticky', top: 56, zIndex: 2,
                          cursor: hasSettings ? 'pointer' : 'default',
                        }}>
                        <div
                          className="pl-3 pr-3 flex items-center gap-2 compare-feature-header-sticky"
                          style={{
                            background: '#fff',
                            borderRight: '1px solid var(--card-border)',
                            position: 'sticky', left: 0, zIndex: 3,
                            padding: '10px 12px',
                            userSelect: 'none',
                          }}>
                          <span style={{
                            color: 'var(--brand)',
                            visibility: hasSettings ? 'visible' : 'hidden',
                            transform: isCollapsed ? 'rotate(-90deg)' : 'none',
                            transition: 'transform 0.15s',
                            display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                            width: 16, height: 16,
                          }}>
                            <ChevronDown size={14} />
                          </span>
                          {feature.icon && (
                            <span className="flex items-center justify-center shrink-0" style={{ width: 18, height: 18, color: 'var(--text-secondary)' }}>
                              <FeatureIcon name={feature.icon} />
                            </span>
                          )}
                          <div>
                            <span className="text-[13px] font-extrabold uppercase tracking-wider" style={{ color: 'var(--text-primary)', letterSpacing: '0.04em' }}>
                              {feature.name}
                            </span>
                            {feature.appliesToAll && (
                              <div className="text-[11px] italic" style={{ color: 'var(--text-tertiary)' }}>Applies to all roles</div>
                            )}
                          </div>
                        </div>
                        {feature.sharedToggle ? (
                          (() => {
                            const enabled = !!perRole[refRoleId]?.[feature.id]?.enabled;
                            return (
                              <div className="flex items-center justify-start"
                                style={{ gridColumn: `span ${roles.length}`, padding: '10px 16px' }}
                                onClick={e => e.stopPropagation()}>
                                <Toggle size="sm" checked={enabled}
                                  onChange={() => handleFeatureToggle(feature, refRoleId)} />
                              </div>
                            );
                          })()
                        ) : feature.appliesToAll ? (
                          (() => {
                            const sharedSource = getSharedValue(perRole, roles, feature.id, 'watermark-source');
                            const hasValue = sharedSource && sharedSource !== 'None';
                            return (
                              <div className="flex items-center justify-start text-[12px]"
                                style={{ gridColumn: `span ${roles.length}`, color: 'var(--text-primary)', padding: '10px 16px' }}>
                                {hasValue && <span style={{ fontWeight: 500 }}>{sharedSource}</span>}
                              </div>
                            );
                          })()
                        ) : (
                          roles.map((r, i) => {
                            const enabled = !!perRole[r.id]?.[feature.id]?.enabled;
                            return (
                              <div key={r.id} className="flex items-center gap-2"
                                style={{
                                  borderRight: i === roles.length - 1 ? 'none' : '1px solid var(--card-border)',
                                  padding: '10px 16px',
                                }}
                                onClick={e => e.stopPropagation()}>
                                <Toggle size="sm" checked={enabled}
                                  onChange={() => handleFeatureToggle(feature, r.id)} />
                                <span className="text-[11px] font-bold uppercase tracking-wider"
                                  style={{ color: enabled ? 'var(--brand)' : 'var(--text-tertiary)' }}>
                                  {enabled ? 'On' : 'Off'}
                                </span>
                              </div>
                            );
                          })
                        )}
                      </div>

                      {/* Per-setting rows */}
                      {hasSettings && !isCollapsed && settings.map((s, sIdx) => {
                        const isChild = !!s.dependsOn;
                        const isLast = sIdx === settings.length - 1;
                        if (s.optional) {
                          if (s.dependsOn) {
                            const parentValue = perRole[refRoleId]?.[feature.id]?.values?.[s.dependsOn.settingId];
                            if (!s.dependsOn.values.includes(parentValue)) return null;
                          }
                          const value = perRole[refRoleId]?.[feature.id]?.values?.[s.id];
                          return (
                            <div key={s.id} className="flex items-stretch" style={{
                              borderBottom: isLast ? 'none' : '1px solid var(--card-border)',
                              background: '#fff',
                            }}>
                              <div className="flex items-center gap-1.5 text-[12px] shrink-0"
                                style={{
                                  width: SETTING_COL_WIDTH,
                                  color: 'var(--text-primary)', fontWeight: 600,
                                  background: '#fff',
                                  borderRight: '1px solid var(--card-border)',
                                  position: 'sticky', left: 0, zIndex: 1,
                                  padding: '8px 12px 8px 20px',
                                }}>
                                <span className="truncate" title={s.label || feature.name}>{s.label || feature.name}</span>
                              </div>
                              <div className="compare-cell flex items-center gap-3" style={{ padding: '8px 16px', width: 400, minWidth: 0 }}>
                                <SettingControl s={s} value={value} onChange={(v) => onUpdateShared(feature.id, s.id, v)} compact />
                                <span className="text-[11px] italic shrink-0" style={{ color: 'var(--text-tertiary)' }}>
                                  Applies to all roles
                                </span>
                              </div>
                            </div>
                          );
                        }
                        if (s.dependsOn && !roles.some(r => isSettingVisibleForRole(s, r.id, feature.id, perRole))) {
                          return null;
                        }
                        const rowBg = isChild ? 'var(--soft-bg)' : '#fff';
                        return (
                          <div key={s.id} className="grid" style={{
                            gridTemplateColumns: `${SETTING_COL_WIDTH}px repeat(${roles.length}, ${ROLE_COL_WIDTH}px)`,
                            borderBottom: isLast ? 'none' : '1px solid var(--card-border)',
                            background: rowBg,
                            alignItems: 'stretch',
                          }}>
                            <div className="pl-5 pr-3 flex items-start gap-1.5 text-[12px]"
                              style={{
                                color: 'var(--text-primary)', fontWeight: isChild ? 500 : 600,
                                background: rowBg,
                                borderRight: '1px solid var(--card-border)',
                                position: 'sticky', left: 0, zIndex: 1,
                                padding: '10px 12px 10px 20px',
                              }}>
                              {isChild && <span aria-hidden="true" style={{ color: 'var(--brand)', opacity: 0.7 }}>↳</span>}
                              <span className="truncate" title={s.label}>{s.label}</span>
                            </div>
                            {roles.map((r, i) => {
                              const enabled = !!perRole[r.id]?.[feature.id]?.enabled;
                              const visible = isSettingVisibleForRole(s, r.id, feature.id, perRole);
                              const disabledStyle = enabled ? null : { opacity: 0.5, pointerEvents: 'none' };
                              const value = perRole[r.id]?.[feature.id]?.values?.[s.id];
                              return (
                                <div key={r.id} className="compare-cell flex justify-start items-start"
                                  style={{
                                    ...disabledStyle,
                                    borderRight: i === roles.length - 1 ? 'none' : '1px solid var(--card-border)',
                                    padding: '10px 16px',
                                  }}>
                                  {visible ? (
                                    <CompareCellControl s={s} value={value}
                                      onChange={(v) => onUpdate(feature.id, r.id, s.id, v)}
                                      name={`cmp-${feature.id}-${s.id}-${r.id}`} />
                                  ) : (
                                    <span className="text-[11px] italic" style={{ color: 'var(--text-tertiary)' }}>—</span>
                                  )}
                                </div>
                              );
                            })}
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Footer */}
            <footer className="flex items-center justify-center px-5 py-3 border-t shrink-0"
              style={{ borderColor: 'var(--card-border)' }}>
              <button onClick={onClose}
                className="text-[12px] font-bold tracking-wider uppercase px-6 py-2 rounded-full text-white transition-all"
                style={{ background: 'var(--brand)', boxShadow: 'var(--shadow-sm)' }}>
                Done
              </button>
            </footer>
          </div>
        </div>
      );
    };


    // ===== Mobile Feature Settings Modal =====
    // Full-screen sheet that hosts a feature's settings when triggered from the mobile
    // matrix. Uses the same MultiRoleSettingsBlock / SimpleSettingsBlock components so
    // changes flow back through the same update callbacks. Lock body scroll while open.
    const MobileFeatureSettingsModal = ({ feature, roles, perRole, onClose, onUpdate, onUpdateShared }) => {
      useEffect(() => {
        const prev = document.body.style.overflow;
        document.body.style.overflow = 'hidden';
        return () => { document.body.style.overflow = prev; };
      }, []);
      const isMultiRole = roles.length > 1;
      return (
        <div className="fixed inset-0 z-50 flex flex-col bg-white" role="dialog" aria-modal="true">
          <header className="flex items-center justify-between px-3 h-14 border-b shrink-0"
            style={{ borderColor: 'var(--card-border)' }}>
            <button onClick={onClose} className="p-2 -ml-1 rounded-md" aria-label="Close" style={{ color: 'var(--text-primary)' }}>
              <CloseIcon size={20} />
            </button>
            <div className="flex items-center gap-2 flex-1 justify-center">
              {feature.icon && (
                <span className="flex items-center justify-center" style={{ width: 20, height: 20 }}>
                  <FeatureIcon name={feature.icon} />
                </span>
              )}
              <h2 className="text-[15px] font-extrabold tracking-tight truncate" style={{ color: 'var(--text-primary)' }}>
                {feature.name}
              </h2>
            </div>
            {/* Spacer to balance the close button so the title stays centered */}
            <div style={{ width: 36 }} />
          </header>
          <div className="flex-1 overflow-y-auto" style={{ background: 'var(--soft-bg)' }}>
            {isMultiRole ? (
              <MultiRoleSettingsBlock feature={feature} roles={roles} perRole={perRole}
                onUpdate={onUpdate} onUpdateShared={onUpdateShared} />
            ) : (
              <SimpleSettingsBlock feature={feature} role={roles[0]} perRole={perRole}
                onUpdate={onUpdate} />
            )}
          </div>
          <footer className="border-t bg-white p-3 shrink-0" style={{ borderColor: 'var(--card-border)' }}>
            <button onClick={onClose}
              className="w-full text-[12px] font-bold tracking-wider px-4 py-3 rounded-full text-white transition-all"
              style={{ background: 'var(--brand)', boxShadow: 'var(--shadow-sm)' }}>
              DONE
            </button>
          </footer>
        </div>
      );
    };

    // ===== Contacts view =====
    const InfoCircle = ({ size = 13 }) => (
      <svg width={size} height={size} viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="8" cy="8" r="6.5" />
        <path d="M8 7.2v3.6M8 5.5v.01" />
      </svg>
    );
    const GearIcon = ({ size = 14 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="3" />
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
      </svg>
    );

    // Mobile section nav — replaces the inner sidebar on small screens.
    const MobileSectionNav = ({ activeSection, onSelectSection, contactsCount }) => (
      <div className="mobile-section-nav mobile-only mb-4 rounded-md p-1 bg-white border overflow-x-auto"
        style={{ borderColor: 'var(--card-border)' }}>
        {[
          { id: 'access', label: 'Access' },
          { id: 'features', label: 'Features' },
          { id: 'contacts', label: `Contacts (${contactsCount})` },
        ].map(item => {
          const active = activeSection === item.id;
          return (
            <button key={item.id} onClick={() => onSelectSection(item.id)}
